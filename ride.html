<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pumped BMX: Procedural Worlds</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { 
        width: 100%; height: 100%; 
        background-color: #000; 
        overflow: hidden; 
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    #gameCanvas {
        display: block;
        width: 100%;
        height: 100%;
    }
    #ui-layer {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;
    }
    .btn {
        pointer-events: auto; position: absolute;
        background: rgba(0,0,0,0.5); border: 2px solid #fff; color: #fff;
        padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer;
        backdrop-filter: blur(4px);
    }
    #muteBtn { top: 20px; right: 20px; z-index: 100; }
    
    #portrait-lock {
        display: none; position: fixed; inset: 0; background: #111; color: #00e5ff;
        z-index: 9999; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px;
    }
    #portrait-lock svg { width: 80px; height: 80px; fill: currentColor; margin-bottom: 20px; animation: rotatePhone 2s infinite ease-in-out; }
    @keyframes rotatePhone { 0% { transform: rotate(0deg); } 50% { transform: rotate(-90deg); } 100% { transform: rotate(-90deg); } }
    @media screen and (orientation: portrait) { #gameCanvas, #ui-layer { display: none; } #portrait-lock { display: flex; } }
</style>
</head>
<body>

<div id="portrait-lock">
    <svg viewBox="0 0 24 24"><path d="M16 1H8C6.9 1 6 1.9 6 3v18c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V3c0-1.1-.9-2-2-2zm0 18H8V5h8v14z"/></svg>
    <h2>Rotate Device</h2><p>Landscape mode required.</p>
</div>

<canvas id="gameCanvas"></canvas>
<div id="ui-layer">
    <button id="muteBtn" class="btn">🔊 SOUND</button>
</div>

<script>
/** HIGH-RES CANVAS SETUP **/
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d', { alpha: false });
let W, H, DPR;

function resize() {
    DPR = window.devicePixelRatio || 1;
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    ctx.scale(DPR, DPR);
}
window.addEventListener('resize', resize);
resize();

/** PROCEDURAL AUDIO ENGINE **/
const audio = {
    ctx: null, master: null, muted: false,
    rollOsc: null, rollFilter: null, windNoise: null, windFilter: null,
    
    init() {
        if (this.ctx) return;
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        this.master = this.ctx.createGain();
        this.master.gain.value = 0.5;
        this.master.connect(this.ctx.destination);
        
        document.getElementById('muteBtn').addEventListener('click', () => {
            this.muted = !this.muted;
            this.master.gain.value = this.muted ? 0 : 0.5;
            document.getElementById('muteBtn').innerText = this.muted ? '🔇 MUTED' : '🔊 SOUND';
        });

        // Continuous Rolling Sound
        let bufferSize = this.ctx.sampleRate * 2;
        let noiseBuffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        let output = noiseBuffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;
        
        this.rollOsc = this.ctx.createBufferSource();
        this.rollOsc.buffer = noiseBuffer;
        this.rollOsc.loop = true;
        this.rollFilter = this.ctx.createBiquadFilter();
        this.rollFilter.type = 'lowpass';
        let rollGain = this.ctx.createGain();
        rollGain.gain.value = 0.8;
        this.rollOsc.connect(this.rollFilter).connect(rollGain).connect(this.master);
        this.rollOsc.start();

        // Wind Sound
        this.windNoise = this.ctx.createBufferSource();
        this.windNoise.buffer = noiseBuffer;
        this.windNoise.loop = true;
        this.windFilter = this.ctx.createBiquadFilter();
        this.windFilter.type = 'bandpass';
        this.windFilter.Q.value = 0.5;
        let windGain = this.ctx.createGain();
        windGain.gain.value = 1.2;
        this.windNoise.connect(this.windFilter).connect(windGain).connect(this.master);
        this.windNoise.start();
    },
    updateContinuous(speed, grounded, airborneTime) {
        if (!this.ctx) return;
        let safeSpeed = Math.max(0.1, speed);
        // Tire Rolling
        if (grounded) {
            this.rollFilter.frequency.setTargetAtTime(Math.min(2000, 100 + safeSpeed * 0.5), this.ctx.currentTime, 0.1);
        } else {
            this.rollFilter.frequency.setTargetAtTime(10, this.ctx.currentTime, 0.1);
        }
        // Wind
        let windFreq = airborneTime > 0 ? Math.min(3000, 300 + safeSpeed * 1.5) : 100;
        this.windFilter.frequency.setTargetAtTime(windFreq, this.ctx.currentTime, 0.2);
    },
    playImpact(velocity) {
        if (!this.ctx || this.muted) return;
        let osc = this.ctx.createOscillator();
        let gain = this.ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(150, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.2);
        gain.gain.setValueAtTime(Math.min(1, velocity * 0.001), this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.2);
        osc.connect(gain).connect(this.master);
        osc.start(); osc.stop(this.ctx.currentTime + 0.2);
    },
    playTrick() {
        if (!this.ctx || this.muted) return;
        let osc = this.ctx.createOscillator();
        let gain = this.ctx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(600, this.ctx.currentTime);
        osc.frequency.linearRampToValueAtTime(1200, this.ctx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);
        osc.connect(gain).connect(this.master);
        osc.start(); osc.stop(this.ctx.currentTime + 0.3);
    }
};

const hex2rgb = (hex) => {
    let v = parseInt(hex.slice(1), 16);
    return { r: (v >> 16) & 255, g: (v >> 8) & 255, b: v & 255 };
};
const lerpColor = (c1, c2, t) => {
    let r1 = hex2rgb(c1), r2 = hex2rgb(c2);
    let r = Math.round(r1.r + (r2.r - r1.r) * t);
    let g = Math.round(r1.g + (r2.g - r1.g) * t);
    let b = Math.round(r1.b + (r2.b - r1.b) * t);
    return `rgb($${r},$${g},${b})`;
};

const BIOMES = [

    { name: "Desert", top: "#FFC107", dirt: "#8D6E63", skyT: "#E65100", skyB: "#FFB300", weather: "sand", bg: "cacti" },
    { name: "Snowy Mountains", top: "#FFFFFF", dirt: "#607D8B", skyT: "#0D47A1", skyB: "#81D4FA", weather: "snow", bg: "pines" },
    { name: "Beach", top: "#FFE082", dirt: "#D84315", skyT: "#01579B", skyB: "#00BCD4", weather: "none", bg: "palms" },
    { name: "City Pumptrack", top: "#9E9E9E", dirt: "#424242", skyT: "#37474F", skyB: "#90A4AE", weather: "rain", bg: "city" }
];

function getBiome(x) {
    let cycle = 15000; // px per biome
    let pos = x % (cycle * BIOMES.length);
    let idx = Math.floor(pos / cycle);
    let nextIdx = (idx + 1) % BIOMES.length;
    let blend = (pos % cycle) / cycle;
    
    // Hard transition starts at 80% of the biome
    let t = Math.max(0, (blend - 0.8) * 5); 
    
    let b1 = BIOMES[idx];
    let b2 = BIOMES[nextIdx];
    
    return {
        name: t < 0.5 ? b1.name : b2.name,
        top: lerpColor(b1.top, b2.top, t),
        dirt: lerpColor(b1.dirt, b2.dirt, t),
        skyT: lerpColor(b1.skyT, b2.skyT, t),
        skyB: lerpColor(b1.skyB, b2.skyB, t),
        weather: t < 0.5 ? b1.weather : b2.weather,
        bg: t < 0.5 ? b1.bg : b2.bg
    };
}

function hash(n) { return (Math.sin(n * 12.9898) * 43758.5453) % 1; }
