<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Downhill Ride</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none;font-family:'Segoe UI',sans-serif}
canvas{display:block;width:100%;height:100%}
#muteBtn{position:absolute;top:12px;right:12px;z-index:100;background:rgba(0,0,0,.6);border:2px solid rgba(255,255,255,.4);color:#fff;padding:8px 14px;border-radius:8px;font-weight:bold;cursor:pointer;font-size:14px;pointer-events:auto;touch-action:manipulation}
#portrait-lock{display:none;position:fixed;inset:0;background:#1a1a2e;color:#0ff;z-index:9999;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:20px}
#portrait-lock h2{margin:12px 0 6px}
@media screen and (orientation:portrait){canvas{display:none!important}#portrait-lock{display:flex!important}}

<body>
<div id="portrait-lock"><h2>↻ Rotate Your Device</h2><p>Landscape mode required</p></div>
<canvas id="c"></canvas>
<button id="muteBtn">🔊</button>
<script>
const cv=document.getElementById('c'),cx=cv.getContext('2d',{alpha:false});
let W,H;
function resize(){
  W=innerWidth;H=innerHeight;
  cv.width=W*2;cv.height=H*2;
  cx.setTransform(2,0,0,2,0,0);
}
addEventListener('resize',resize);resize();

// ══════════════════ AUDIO ══════════════════
const SND={
  ctx:null,master:null,musicGain:null,sfxGain:null,
  muted:false,hubTimer:0,musicTime:0,musicStarted:false,
  
  init(){
    if(this.ctx)return;
    try{
      this.ctx=new(window.AudioContext||window.webkitAudioContext)();
      this.master=this.ctx.createGain();this.master.gain.value=0.6;
      this.master.connect(this.ctx.destination);
      this.sfxGain=this.ctx.createGain();this.sfxGain.gain.value=0.5;
      this.sfxGain.connect(this.master);
      this.musicGain=this.ctx.createGain();this.musicGain.gain.value=0.25;
      this.musicGain.connect(this.master);
    }catch(e){}
  },
  resume(){if(this.ctx&&this.ctx.state==='suspended')this.ctx.resume()},
  
  hubClick(){
    if(!this.ctx||this.muted)return;
    let o=this.ctx.createOscillator(),g=this.ctx.createGain(),t=this.ctx.currentTime;
    o.type='square';o.frequency.setValueAtTime(3200+Math.random()*800,t);
    o.frequency.exponentialRampToValueAtTime(800,t+.008);
    g.gain.setValueAtTime(.08,t);g.gain.exponentialRampToValueAtTime(.001,t+.012);
    o.connect(g);g.connect(this.sfxGain);o.start(t);o.stop(t+.015);
  },
  
  updateHub(speed,grounded,dt){
    if(!grounded||speed<50)return;
    this.hubTimer-=dt;
    if(this.hubTimer<=0){
      this.hubClick();
      this.hubTimer=Math.max(.015,.18-speed*.00012);
    }
  },
  
  impact(vel){
    if(!this.ctx||this.muted)return;
    let t=this.ctx.currentTime,o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type='sine';o.frequency.setValueAtTime(120,t);
    o.frequency.exponentialRampToValueAtTime(30,t+.15);
    g.gain.setValueAtTime(Math.min(.4,Math.abs(vel)*.0005),t);
    g.gain.exponentialRampToValueAtTime(.001,t+.15);
    o.connect(g);g.connect(this.sfxGain);o.start(t);o.stop(t+.2);
  },
  
  trick(){
    if(!this.ctx||this.muted)return;
    let t=this.ctx.currentTime;
    [600,900,1200].forEach((f,i)=>{
      let o=this.ctx.createOscillator(),g=this.ctx.createGain();
      o.type='triangle';o.frequency.value=f;
      let st=t+i*.05;
      g.gain.setValueAtTime(0,st);g.gain.linearRampToValueAtTime(.12,st+.02);
      g.gain.exponentialRampToValueAtTime(.001,st+.2);
      o.connect(g);g.connect(this.sfxGain);o.start(st);o.stop(st+.25);
    });
  },
  
  // Ambient piano music (The Witness style)
  startMusic(){
    if(!this.ctx||this.musicStarted)return;
    this.musicStarted=true;
    this.musicTime=this.ctx.currentTime+.5;
    this.scheduleMusic();
  },
  
  scheduleMusic(){
    if(!this.ctx)return;
    let ct=this.ctx.currentTime;
    while(this.musicTime<ct+8){
      this.playBar();
    }
    if(state==='play')setTimeout(()=>this.scheduleMusic(),3000);
  },
  
  playBar(){
    const BPM=66,BEAT=60/BPM;
    const PROG=[
      [220,329.63,440],[174.61,261.63,349.23],
      [261.63,329.63,523.25],[196,293.66,392],
      [220,261.63,440],[174.61,349.23,440],
      [261.63,392,523.25],[196,293.66,392]
    ];
    for(let c=0;c<PROG.length;c++){
      let chord=PROG[c];
      let ct=this.musicTime+c*BEAT*4;
      // Arpeggio
      for(let n=0;n<chord.length;n++){
        this.pianoNote(chord[n],ct+n*BEAT*1.2,BEAT*3);
      }
      // Sub bass pad
      this.padNote(chord[0]/2,ct,BEAT*4);
    }
    this.musicTime+=PROG.length*BEAT*4;
  },
  
  pianoNote(freq,time,dur){
    if(!this.ctx)return;
    let o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type='triangle';o.frequency.value=freq;
    g.gain.setValueAtTime(0,time);
    g.gain.linearRampToValueAtTime(.08,time+.04);
    g.gain.setValueAtTime(.06,time+dur*.3);
    g.gain.exponentialRampToValueAtTime(.001,time+dur);
    o.connect(g);g.connect(this.musicGain);
    o.start(time);o.stop(time+dur+.05);
    // Slight detune for warmth
    let o2=this.ctx.createOscillator(),g2=this.ctx.createGain();
    o2.type='sine';o2.frequency.value=freq*1.003;
    g2.gain.setValueAtTime(0,time);
    g2.gain.linearRampToValueAtTime(.03,time+.04);
    g2.gain.exponentialRampToValueAtTime(.001,time+dur);
    o2.connect(g2);g2.connect(this.musicGain);
    o2.start(time);o2.stop(time+dur+.05);
  },
  
  padNote(freq,time,dur){
    if(!this.ctx)return;
    let o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type='sine';o.frequency.value=freq;
    g.gain.setValueAtTime(0,time);
    g.gain.linearRampToValueAtTime(.04,time+.3);
    g.gain.exponentialRampToValueAtTime(.001,time+dur);
    o.connect(g);g.connect(this.musicGain);
    o.start(time);o.stop(time+dur+.1);
  },
  
  stopMusic(){this.musicStarted=false},
  
  toggle(){
    this.muted=!this.muted;
    if(this.master)this.master.gain.value=this.muted?0:.6;
    document.getElementById('muteBtn').textContent=this.muted?'🔇':'🔊';
  }
};

document.getElementById('muteBtn').addEventListener('click',e=>{
  e.stopPropagation();SND.init();SND.toggle();
});

// ══════════════════ BIOMES ══════════════════
const hex2rgb=h=>{let v=parseInt(h.slice(1),16);return{r:(v>>16)&255,g:(v>>8)&255,b:v&255}};
const lerpCol=(a,b,t)=>{let ra=hex2rgb(a),rb=hex2rgb(b);return`rgb(${Math.round(ra.r+(rb.r-ra.r)*t)},${Math.round(ra.g+(rb.g-ra.g)*t)},${Math.round(ra.b+(rb.b-ra.b)*t)})`};

const BIOMES=[
  {name:"Forest",grass:"#5BAF4A",dirt:"#6B3A1F",skyT:"#2255AA",skyB:"#88DDEE",wx:"leaves",bg:"trees"},
  {name:"Desert",grass:"#DDAA44",dirt:"#AA7744",skyT:"#CC6600",skyB:"#FFD080",wx:"sand",bg:"cacti"},
  {name:"Snow",grass:"#E8EEF0",dirt:"#778899",skyT:"#224488",skyB:"#AADDFF",wx:"snow",bg:"pines"},
  {name:"Beach",grass:"#FFD866",dirt:"#CC7733",skyT:"#0066AA",skyB:"#44CCDD",wx:"none",bg:"palms"},
  {name:"City",grass:"#999999",dirt:"#555555",skyT:"#334455",skyB:"#99AABB",wx:"rain",bg:"city"}
];

function getBiome(x){
  let c=18000,total=c*BIOMES.length;
  let pos=((x%total)+total)%total;
  let i=Math.floor(pos/c),ni=(i+1)%BIOMES.length;
  let blend=(pos%c)/c,t=Math.max(0,(blend-.8)*5);
  let b1=BIOMES[i],b2=BIOMES[ni];
  return{
    name:t<.5?b1.name:b2.name,
    grass:lerpCol(b1.grass,b2.grass,t),dirt:lerpCol(b1.dirt,b2.dirt,t),
    skyT:lerpCol(b1.skyT,b2.skyT,t),skyB:lerpCol(b1.skyB,b2.skyB,t),
    wx:t<.5?b1.wx:b2.wx,bg:t<.5?b1.bg:b2.bg
  };
}

function hash(n){return((Math.sin(n*127.1+311.7)*43758.5453)%1+1)%1}

// ══════════════════ TERRAIN ══════════════════
function tY(x){
  let y=350;
  // EASY START: Long smooth downhill for first 8000px
  if(x<8000){
    let t=x/8000;t=t*t*(3-2*t); // smooth step
    y+=t*1500;
    // Only tiny gentle bumps in intro
    y-=Math.sin(x*.001)*30*t;
    return y;
  }
  y+=1500+(x-8000)*.025; // Continuous gentle downhill after intro
  
  // PROGRESSIVE DIFFICULTY: bumps get bigger over time
  let diff=Math.min(3,(x-8000)/30000); // 0→3 over 30000px
  let base=.3+diff*.7; // amplitude multiplier 0.3→2.4
  
  y-=Math.sin(x*.0012)*(180*base);
  y-=Math.sin(x*.0035)*(90*base);
  y-=Math.sin(x*.009)*(45*base);
  
  // Extra sharp bumps at high difficulty
  if(diff>1)y-=Math.sin(x*.018)*(20*(diff-1));
  if(diff>2)y-=Math.sin(x*.03)*(15*(diff-2));
  
  // City pumptrack bumps
  let b=getBiome(x);
  if(b.bg==='city')y-=Math.sin(x*.025)*25;
  
  return y;
}
function tA(x){return Math.atan2(tY(x+2)-tY(x-2),4)}
function normA(a){while(a>Math.PI)a-=Math.PI*2;while(a<-Math.PI)a+=Math.PI*2;return a}

// ══════════════════ GAME DATA ══════════════════
const GRV=1100,MIN_SPD=300;

const CHARS=[
  {name:"Rookie",col:"#4488FF",mass:1,size:1,desc:"Balanced rider",spd:3,air:3,trk:3},
  {name:"Heavy",col:"#FF4466",mass:1.3,size:1.15,desc:"Max momentum",spd:4,air:2,trk:2},
  {name:"Grom",col:"#44DD66",mass:.72,size:.82,desc:"Big air time",spd:2,air:5,trk:4}
];
const BIKES=[
  {name:'20" BMX',col:"#FFDD33",agil:5,spd:1800,wr:11,desc:"Fast spins",asp:5,wt:2,tp:4},
  {name:'24" Cruiser',col:"#AA66FF",agil:3.5,spd:1950,wr:13,desc:"All round",asp:3,wt:3,tp:3},
  {name:'DH MTB',col:"#FF6600",agil:2.2,spd:2200,wr:16,desc:"Top speed",asp:2,wt:5,tp:2}
];

let state='menu',selC=0,selB=0,best=+localStorage.getItem('dhr_best')||0;
let p={},cam={x:0,y:0},pts=[],ftx=[],wPts=[];
let keys={},tPump=false,tSpin=false,tiltLean=0,tiltOn=false,swpS=null;
let gpLean=0,gpPump=false,gpSpin=false;
let menuAnim=0,touchBlock=false;

function initP(){
  let c=CHARS[selC],b=BIKES[selB];
  p={x:100,y:tY(100),vx:MIN_SPD,vy:0,spd:MIN_SPD,ang:tA(100),av:0,
    gnd:true,airT:0,mass:c.mass,size:c.size,colC:c.col,
    agil:b.agil,maxS:b.spd,wr:b.wr,colB:b.col,
    sc:0,dist:0,cmb:1,jSc:0,spins:0,tRot:0,
    trk:null,trkPts:0,trkT:0,trkP:0};
  cam.x=p.x;cam.y=p.y-100;
  pts=[];ftx=[];
  wPts=[];for(let i=0;i<80;i++)wPts.push({x:Math.random()*W,y:Math.random()*H,s:1+Math.random()*2,o:.3+Math.random()*.5});
}

// ══════════════════ UPDATE ══════════════════
function update(dt){
  if(state!=='play')return;
  
  pollGamepad();
  
  let pump=keys.Space||tPump||gpPump;
  let spin=keys.KeyZ||tSpin||gpSpin;
  let lean=(keys.ArrowRight||keys.KeyL?1:0)-(keys.ArrowLeft||keys.KeyJ?1:0)+tiltLean+gpLean;
  lean=Math.max(-2,Math.min(2,lean));
  
  // Tricks
  if(!p.trk&&!p.gnd){
    if(keys.KeyW)sTrk('No-Hander',100);
    else if(keys.KeyS)sTrk('Tailwhip',150);
    else if(keys.KeyA)sTrk('Tabletop',120);
    else if(keys.KeyD)sTrk('Turndown',130);
    else if(keys.KeyQ)sTrk('Barspin',100);
    else if(keys.KeyE)sTrk('X-Up',80);
  }
  
  if(p.trk){
    p.trkT+=dt*1.5;
    p.trkP=p.trkT<=.5?p.trkT*2:1-((p.trkT-.5)*2);
    if(p.trkT>=1){aScr(p.trkPts,p.trk+'!');p.trk=null;p.trkP=0;SND.trick();}
  }

  if(p.gnd){
    p.airT=0;
    let a=tA(p.x),slope=Math.sin(a);
    let df=pump?2.8:.85;
    p.spd+=GRV*slope*df*dt;
    p.spd*=.9992;
    if(p.spd<MIN_SPD)p.spd+=(MIN_SPD-p.spd)*4*dt;
    if(p.spd>p.maxS)p.spd=p.maxS;
    
    p.vx=Math.cos(a)*p.spd;p.vy=Math.sin(a)*p.spd;
    p.x+=p.vx*dt;p.y=tY(p.x);p.ang=a;p.av=0;
    p.dist+=p.vx*dt;p.sc+=p.vx*dt*.01;
    
    if(pump&&p.spd>600&&Math.random()<.25)spDust(p.x,p.y);

    let nY=tY(p.x+p.vx*.1),pY=p.y+p.vy*.1;
    if(!pump&&pY<nY-1.5){p.gnd=false;p.tRot=0;p.spins=0;p.jSc=0;}
    
    SND.updateHub(p.spd,true,dt);
  }else{
    p.airT+=dt;
    p.vy+=GRV*p.mass*(pump?1.8:1)*dt;
    p.x+=p.vx*dt;p.y+=p.vy*dt;p.dist+=p.vx*dt;
    
    p.av+=lean*p.agil*dt*12;
    if(spin)p.av+=(p.av>=0?1:-1)*18*dt;
    p.av*=.975;
    
    let oldA=p.ang;p.ang+=p.av*dt;p.tRot+=(p.ang-oldA);
    
    let cs=Math.floor(Math.abs(p.tRot)/(Math.PI*2));
    if(cs>p.spins){p.spins=cs;aScr(cs*200,(cs*360)+'°!');p.cmb++;SND.trick();}

    let gy=tY(p.x);
    if(p.y>=gy){
      let ga=tA(p.x),diff=Math.abs(normA(p.ang-ga));
      if(p.trk&&p.trkP>.3)return gOver("TRICK CRASH!");
      if(diff>1.8||Math.abs(normA(p.ang))>2.5)return gOver("WIPEOUT!");
      
      p.gnd=true;p.y=gy;p.ang=ga;
      if(p.jSc>0){let t=Math.floor(p.jSc*p.cmb);p.sc+=t;
        spTxt('+'+t+' ('+p.cmb.toFixed(0)+'x)',p.x,p.y-110,'#4f4');}
      p.cmb=1;p.trk=null;p.trkP=0;
      let mag=Math.sqrt(p.vx*p.vx+p.vy*p.vy);
      p.spd=mag*Math.max(.5,1-diff/1.8);
      if(pump)p.spd+=350;
      SND.impact(p.vy);
      for(let i=0;i<12;i++)spDust(p.x,p.y);
    }
    SND.updateHub(p.spd,false,dt);
  }
  
  pts.forEach(pt=>{pt.x+=pt.vx*dt;pt.y+=pt.vy*dt;pt.vy+=400*dt;pt.life-=dt});
  pts=pts.filter(pt=>pt.life>0);
  ftx.forEach(ft=>{ft.y-=45*dt;ft.life-=dt});
  ftx=ftx.filter(ft=>ft.life>0);
  
  cam.x+=(p.x+W*.3-cam.x)*5*dt;
  cam.y+=(p.y-H*.15-cam.y)*6*dt;
}

function sTrk(n,pts){p.trk=n;p.trkPts=pts;p.trkT=0;p.cmb+=.5}
function aScr(pts,n){p.jSc+=pts;spTxt(n,p.x,p.y-50-Math.random()*30,'#fff')}
function spDust(x,y){
  let b=getBiome(x);
  pts.push({x:x+(Math.random()-.5)*25,y:y+(Math.random()-.5)*10,
    vx:(Math.random()-.5)*50-p.vx*.08,vy:-Math.random()*80-20,
    life:.3+Math.random()*.3,ml:.6,r:3+Math.random()*4,c:b.grass});
}
function spTxt(t,x,y,c){ftx.push({t,x,y,c,life:1.8,ml:1.8})}

function gOver(reason){
  state='gameover';p.sc=Math.floor(p.sc);
  if(p.sc>best){best=p.sc;localStorage.setItem('dhr_best',best)}
  spTxt(reason,p.x,p.y-60,'#f44');
  p.vx*=.3;p.vy=-500;p.av=12;SND.impact(800);SND.stopMusic();
}

// ══════════════════ DRAWING ══════════════════
function draw(){
  let b=state==='menu'?BIOMES[0]:getBiome(cam.x);
  
  // SKY
  let sky=cx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,b.skyT);sky.addColorStop(1,b.skyB);
  cx.fillStyle=sky;cx.fillRect(0,0,W,H);
  
  // Sun
  cx.fillStyle='rgba(255,240,180,.85)';
  cx.beginPath();cx.arc(W*.75,H*.25,45,0,Math.PI*2);cx.fill();
  cx.fillStyle='rgba(255,240,180,.15)';
  cx.beginPath();cx.arc(W*.75,H*.25,80,0,Math.PI*2);cx.fill();

  if(state==='menu')return drawMenu();

  cx.save();cx.translate(W*.5-cam.x,H*.6-cam.y);

  drawBgLayers(b);
  drawTerrain(b);
  
  // Particles
  for(let pt of pts){
    cx.globalAlpha=pt.life/pt.ml;cx.fillStyle=pt.c||'#ccc';
    cx.fillRect(pt.x-pt.r/2,pt.y-pt.r/2,pt.r,pt.r); // Blocky!
  }
  cx.globalAlpha=1;

  drawBike();

  for(let ft of ftx){
    cx.globalAlpha=ft.life/ft.ml;cx.font='bold 22px sans-serif';
    cx.textAlign='center';cx.fillStyle=ft.c;
    cx.fillText(ft.t,ft.x,ft.y);
  }
  cx.globalAlpha=1;
  cx.restore();

  drawWeather(b.wx);
  if(state==='play')drawHUD(b);
  if(state==='gameover')drawGO();
}

function drawBgLayers(b){
  // Far mountains (blocky/stepped)
  cx.fillStyle='rgba(0,0,0,.12)';
  let sx=cam.x-W,ex=cam.x+W;
  cx.beginPath();cx.moveTo(sx,cam.y+H);
  for(let x=sx;x<=ex;x+=80){
    let px=x*.12;
    let py=tY(cam.x)*.12+Math.sin(px*.0015)*350+Math.sin(px*.005)*120-150;
    py=Math.round(py/30)*30; // Step it for blocky look
    cx.lineTo(x,py);
  }
  cx.lineTo(ex,cam.y+H);cx.fill();

  // Midground scenery
  let st=Math.floor((cam.x-W)*.35/180)*180;
  for(let x=st;x<st+W/.35+400;x+=180){
    let h=hash(x);if(h<.55)continue;
    let px=x/.35,py=tY(px);
    cx.save();cx.translate(px,py);
    
    if(b.bg==='trees'||b.bg==='pines'){
      // Blocky tree
      cx.fillStyle='#553322';cx.fillRect(-4,-h*80-15,8,h*80+15);
      cx.fillStyle=b.bg==='pines'?'#88BBAA':'#338833';
      let th=h*55+25;
      cx.fillRect(-20,-h*80-th,40,th); // Square canopy!
      cx.fillRect(-14,-h*80-th-12,28,12);
    }else if(b.bg==='cacti'){
      cx.fillStyle='#55AA44';cx.fillRect(-6,-h*60-15,12,h*60+15);
      cx.fillRect(-20,-h*45,16,10);cx.fillRect(8,-h*30,16,10);
      cx.fillRect(-20,-h*45-15,10,15);cx.fillRect(14,-h*30-15,10,15);
    }else if(b.bg==='palms'){
      cx.fillStyle='#887755';cx.fillRect(-3,-h*110,6,h*110);
      cx.fillStyle='#44AA44';
      for(let i=0;i<4;i++){
        let a=i*Math.PI/2-.3;
        cx.save();cx.translate(0,-h*110);cx.rotate(a);
        cx.fillRect(-4,-3,50,6);cx.restore();
      }
    }else if(b.bg==='city'){
      cx.fillStyle=h>.8?'#333':'#555';
      let bw=50+h*30,bh=120+h*180;
      cx.fillRect(-bw/2,-bh,bw,bh);
      cx.fillStyle='#FFD';
      for(let wy=-bh+15;wy<-15;wy+=25){
        for(let wx=-bw/2+8;wx<bw/2-8;wx+=18){
          if(hash(wy*wx)>.4)cx.fillRect(wx,wy,10,12);
        }
      }
    }
    cx.restore();
  }
}

function drawTerrain(b){
  let sx=cam.x-W,ex=cam.x+W;
  
  // Main terrain fill (layered blocky style)
  cx.beginPath();cx.moveTo(sx,cam.y+H+200);
  for(let x=sx;x<=ex;x+=8)cx.lineTo(x,tY(x));
  cx.lineTo(ex,cam.y+H+200);cx.closePath();
  
  // Multi-layer fill
  let tg=cx.createLinearGradient(0,cam.y-100,0,cam.y+H);
  tg.addColorStop(0,b.dirt);tg.addColorStop(1,'#1a0a00');
  cx.fillStyle=tg;cx.fill();
  
  // Grass top layer (thick blocky stripe)
  cx.lineWidth=14;cx.strokeStyle=b.grass;cx.lineCap='butt';cx.lineJoin='bevel';
  cx.beginPath();
  for(let x=sx;x<=ex;x+=8){
    if(x===sx)cx.moveTo(x,tY(x));else cx.lineTo(x,tY(x));
  }
  cx.stroke();
  
  // Dirt sub-layer line
  cx.lineWidth=6;cx.strokeStyle='rgba(0,0,0,.2)';
  cx.beginPath();
  for(let x=sx;x<=ex;x+=8){
    let yy=tY(x)+12;
    if(x===sx)cx.moveTo(x,yy);else cx.lineTo(x,yy);
  }
  cx.stroke();
}

function drawBike(){
  cx.save();cx.translate(p.x,p.y);
  if(state==='gameover'){p.y+=p.vy*.016;p.vy+=GRV*.016;p.x+=p.vx*.016;p.ang+=p.av*.016}
  cx.rotate(p.ang);

  let wr=p.wr,wb=32,s=p.size,tp=p.trkP||0;
  let fR=p.trk==='Tailwhip'?tp*Math.PI*2:0;
  let bR=p.trk==='Barspin'?tp*Math.PI*2:p.trk==='Turndown'?tp*Math.PI*.8:p.trk==='X-Up'?tp*Math.PI:0;
  let sY=p.trk==='Tabletop'?1-tp*.6:p.trk==='Turndown'?1-tp*.35:1;

  cx.scale(1,sY);

  // Wheels (blocky style - thick outlines)
  cx.strokeStyle='#333';cx.lineWidth=5;
  cx.beginPath();cx.arc(-wb,-wr,wr,0,Math.PI*2);cx.stroke();
  cx.beginPath();cx.arc(wb,-wr,wr,0,Math.PI*2);cx.stroke();
  // Hub dots
  cx.fillStyle='#888';
  cx.fillRect(-wb-2,-wr-2,4,4);cx.fillRect(wb-2,-wr-2,4,4);

  let bbX=-3,bbY=-wr,hX=16,hY=-wr-26,sX=-16,sY2=-wr-20;

  // Frame
  cx.save();cx.translate(hX,hY);cx.rotate(fR);cx.translate(-hX,-hY);
  cx.strokeStyle=p.colB;cx.lineWidth=4;cx.lineCap='round';cx.lineJoin='round';
  cx.beginPath();
  cx.moveTo(hX,hY);cx.lineTo(bbX,bbY);cx.lineTo(-wb,-wr);
  cx.lineTo(sX,sY2);cx.lineTo(bbX,bbY);
  cx.moveTo(sX,sY2);cx.lineTo(hX,hY);cx.stroke();
  cx.restore();

  // Fork & Bars
  cx.save();cx.translate(hX,hY);cx.rotate(bR);
  cx.strokeStyle='#444';cx.lineWidth=4;
  cx.beginPath();cx.moveTo(0,0);cx.lineTo(wb-hX,-wr-hY);cx.stroke();
  cx.beginPath();cx.moveTo(0,0);cx.lineTo(0,-16);cx.stroke();
  cx.strokeStyle='#ddd';cx.lineWidth=3;
  cx.beginPath();cx.moveTo(-10,-16);cx.lineTo(10,-16);cx.stroke();
  let htxL=hX+(-10*Math.cos(bR)-(-16)*Math.sin(bR));
  let htyL=hY+(-10*Math.sin(bR)+(-16)*Math.cos(bR));
  cx.restore();

  // Rider
  let cr=(keys.Space||tPump||gpPump)&&state!=='gameover'?10:0;
  let hipX=sX,hipY=sY2-6+cr;
  let shX=hipX+12,shY=hipY-(20*s)+cr;
  let hdX=shX+5,hdY=shY-(12*s);

  if(p.trk==='No-Hander'){shY+=10*tp;htxL=shX-16*tp;htyL=shY-22*tp}

  cx.strokeStyle=p.colC;cx.lineWidth=7*s;cx.lineCap='round';
  cx.beginPath();cx.moveTo(hipX,hipY);cx.lineTo(shX,shY);cx.stroke(); // Torso
  
  cx.strokeStyle='#444';cx.lineWidth=6*s;
  cx.beginPath();cx.moveTo(hipX,hipY);cx.lineTo(bbX+8,bbY-8);cx.lineTo(bbX,bbY);cx.stroke(); // Leg

  cx.strokeStyle=p.colC;cx.lineWidth=5*s;
  cx.beginPath();cx.moveTo(shX,shY);cx.lineTo(htxL,htyL);cx.stroke(); // Arm

  // Head (blocky!)
  cx.fillStyle='#FFA726';
  cx.fillRect(hdX-7*s,hdY-7*s,14*s,14*s);
  // Helmet
  cx.fillStyle='#333';
  cx.fillRect(hdX-8*s,hdY-8*s,16*s,8*s);

  cx.restore();
}

function drawWeather(type){
  if(type==='none'||!wPts.length)return;
  let col=type==='snow'?'#EEF':type==='sand'?'#DC8':type==='rain'?'rgba(180,200,255,.5)':'#6A4';
  cx.fillStyle=col;
  wPts.forEach(pt=>{
    let spY=type==='rain'?18:type==='snow'?1.5:2.5;
    pt.y+=spY*pt.s;
    pt.x+=(type==='snow'?Math.sin(pt.y*.01)*1.5:type==='rain'?3:Math.sin(pt.y*.015)*3);
    if(p.vx)pt.x-=p.vx*.003;
    if(pt.y>H){pt.y=-5;pt.x=Math.random()*W}
    if(pt.x<0)pt.x=W;if(pt.x>W)pt.x=0;
    cx.globalAlpha=pt.o;
    if(type==='rain'){
      cx.strokeStyle=col;cx.lineWidth=1.5;
      cx.beginPath();cx.moveTo(pt.x,pt.y);cx.lineTo(pt.x+1.5,pt.y+12);cx.stroke();
    }else{
      cx.fillRect(pt.x,pt.y,pt.s*(type==='leaves'?3:2),pt.s*(type==='leaves'?3:2));
    }
  });
  cx.globalAlpha=1;
}

function drawPanel(x,y,w,h,title,items,sel,isChar){
  cx.fillStyle='rgba(30,30,40,.9)';cx.fillRect(x,y,w,h);
  cx.strokeStyle='rgba(255,255,255,.15)';cx.lineWidth=1;cx.strokeRect(x,y,w,h);
  
  cx.fillStyle='#aaa';cx.font='bold 13px sans-serif';cx.textAlign='center';
  cx.fillText(title,x+w/2,y+18);
  
  let item=items[sel];
  cx.fillStyle=item.col||item.color||'#fff';
  cx.font='bold 18px sans-serif';
  cx.fillText(item.name,x+w/2,y+42);
  cx.fillStyle='#888';cx.font='12px sans-serif';
  cx.fillText(item.desc,x+w/2,y+60);

  // Preview area
  let pvX=x+w/2,pvY=y+h*.48;
  cx.save();cx.translate(pvX,pvY);
  
  if(isChar){
    // Draw stick figure preview
    let s=item.size||1;
    cx.strokeStyle=item.col;cx.lineWidth=6*s;cx.lineCap='round';
    cx.beginPath();cx.moveTo(0,10);cx.lineTo(0,-15*s);cx.stroke(); // Body
    cx.strokeStyle='#444';cx.lineWidth=5*s;
    cx.beginPath();cx.moveTo(0,10);cx.lineTo(-10,25);cx.stroke(); // Leg L
    cx.beginPath();cx.moveTo(0,10);cx.lineTo(10,25);cx.stroke(); // Leg R
    cx.strokeStyle=item.col;cx.lineWidth=4*s;
    cx.beginPath();cx.moveTo(0,-15*s);cx.lineTo(-12,-5);cx.stroke(); // Arm L
    cx.beginPath();cx.moveTo(0,-15*s);cx.lineTo(12,-5);cx.stroke(); // Arm R
    cx.fillStyle='#FFA726';cx.fillRect(-7*s,-15*s-14*s,14*s,14*s); // Head
    cx.fillStyle='#333';cx.fillRect(-8*s,-15*s-15*s,16*s,8*s); // Helmet
  }else{
    // Draw bike preview
    let wr=item.wr||12;
    cx.strokeStyle='#444';cx.lineWidth=4;
    cx.beginPath();cx.arc(-22,-wr,wr,0,Math.PI*2);cx.stroke();
    cx.beginPath();cx.arc(22,-wr,wr,0,Math.PI*2);cx.stroke();
    cx.strokeStyle=item.col;cx.lineWidth=3;
    cx.beginPath();
    cx.moveTo(12,-wr-20);cx.lineTo(-2,-wr);cx.lineTo(-22,-wr);
    cx.lineTo(-12,-wr-16);cx.lineTo(-2,-wr);
    cx.moveTo(-12,-wr-16);cx.lineTo(12,-wr-20);
    cx.stroke();
    cx.strokeStyle='#aaa';cx.lineWidth=2;
    cx.beginPath();cx.moveTo(12,-wr-20);cx.lineTo(22,-wr);cx.stroke();
    cx.beginPath();cx.moveTo(12,-wr-20);cx.lineTo(12,-wr-32);cx.stroke();
    cx.beginPath();cx.moveTo(6,-wr-32);cx.lineTo(18,-wr-32);cx.stroke();
  }
  cx.restore();

  // Stats bars
  let stats=isChar?
    [{n:'SPD',v:item.spd},{n:'AIR',v:item.air},{n:'TRK',v:item.trk}]:
    [{n:'SPIN',v:item.asp},{n:'WEIGHT',v:item.wt},{n:'TOP SPD',v:item.tp}];
  
  let barY=y+h*.72;
  stats.forEach((st,i)=>{
    let by=barY+i*18;
    cx.fillStyle='#666';cx.font='10px sans-serif';cx.textAlign='left';
    cx.fillText(st.n,x+10,by+10);
    cx.fillStyle='#333';cx.fillRect(x+55,by+2,w-70,10);
    cx.fillStyle=item.col||'#fff';cx.fillRect(x+55,by+2,(w-70)*(st.v/5),10);
  });

  // Navigation arrows
  cx.fillStyle='rgba(255,255,255,.15)';
  cx.fillRect(x,y+h-35,w/2-5,30);
  cx.fillRect(x+w/2+5,y+h-35,w/2-5,30);
  cx.fillStyle='#fff';cx.font='bold 18px sans-serif';cx.textAlign='center';
  cx.fillText('◀',x+w/4,y+h-14);
  cx.fillText('▶',x+w*3/4,y+h-14);
}

let goRects={};

// ══════════════════ INPUT ══════════════════
function isMobile(){return('ontouchstart'in window)||navigator.maxTouchPoints>0}
function inRect(x,y,r){return r&&x>=r.x&&x<=r.x+r.w&&y>=r.y&&y<=r.y+r.h}

addEventListener('keydown',e=>{keys[e.code]=true;
  if(state==='menu'){
    if(e.code==='ArrowLeft'){selC=(selC+CHARS.length-1)%CHARS.length}
    if(e.code==='ArrowRight'){selC=(selC+1)%CHARS.length}
    if(e.code==='ArrowUp'){selB=(selB+BIKES.length-1)%BIKES.length}
    if(e.code==='ArrowDown'){selB=(selB+1)%BIKES.length}
    if(e.code==='Enter'||e.code==='Space'){startGame()}
  }
  e.preventDefault()
});
addEventListener('keyup',e=>{keys[e.code]=false});

function startGame(){
  SND.init();SND.resume();
  initP();state='play';
  SND.startMusic();
}

// Click handling (desktop)
cv.addEventListener('click',e=>{
  let x=e.clientX,y=e.clientY;
  handleUIClick(x,y);
});

// Touch handling 
let activeTouches={};

cv.addEventListener('touchstart',e=>{
  e.preventDefault();
  for(let t of e.changedTouches){
    let tx=t.clientX,ty=t.clientY,id=t.identifier;
    activeTouches[id]={x:tx,y:ty,sx:tx,sy:ty};
    
    if(state!=='play'){
      handleUIClick(tx,ty);
      continue;
    }
    
    SND.init();SND.resume();
    
    if(tx>W*.65){
      if(ty<H*.5){tSpin=true;activeTouches[id].zone='spin'}
      else{tPump=true;activeTouches[id].zone='pump'}
    }else if(tx<W*.35){
      swpS={x:tx,y:ty,id};
      activeTouches[id].zone='trick';
    }else{
      tPump=true;activeTouches[id].zone='pump';
    }
  }
},{passive:false});

cv.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(state!=='play')return;
  for(let t of e.changedTouches){
    if(!swpS||t.identifier!==swpS.id||p.gnd)continue;
    let dx=t.clientX-swpS.x,dy=t.clientY-swpS.y;
    if(Math.abs(dx)>30||Math.abs(dy)>30){
      if(Math.abs(dy)>Math.abs(dx)){
        dy<0?sTrk('No-Hander',100):sTrk('Tailwhip',150);
      }else{
        if(dx<0&&dy<-15)sTrk('Barspin',100);
        else if(dx>0&&dy<-15)sTrk('X-Up',80);
        else if(dx<0)sTrk('Tabletop',120);
        else sTrk('Turndown',130);
      }
      swpS=null;
    }
  }
},{passive:false});

cv.addEventListener('touchend',e=>{
  e.preventDefault();
  for(let t of e.changedTouches){
    let at=activeTouches[t.identifier];
    if(at){
      if(at.zone==='spin')tSpin=false;
      if(at.zone==='pump')tPump=false;
      delete activeTouches[t.identifier];
    }
  }
  // Re-check remaining touches
  tPump=false;tSpin=false;
  for(let t of e.touches){
    let at=activeTouches[t.identifier];
    if(at){
      if(at.zone==='spin')tSpin=true;
      if(at.zone==='pump')tPump=true;
    }
  }
},{passive:false});

cv.addEventListener('touchcancel',e=>{
  e.preventDefault();tPump=false;tSpin=false;swpS=null;activeTouches={};
},{passive:false});

function handleUIClick(x,y){
  if(state==='menu'){
    SND.init();SND.resume();
    if(inRect(x,y,menuRects.start))startGame();
    if(inRect(x,y,menuRects.tilt))requestTilt();
    if(inRect(x,y,menuRects.prevC))selC=(selC+CHARS.length-1)%CHARS.length;
    if(inRect(x,y,menuRects.nextC))selC=(selC+1)%CHARS.length;
    if(inRect(x,y,menuRects.prevB))selB=(selB+BIKES.length-1)%BIKES.length;
    if(inRect(x,y,menuRects.nextB))selB=(selB+1)%BIKES.length;
  }else if(state==='gameover'){
    if(inRect(x,y,goRects.restart))startGame();
    if(inRect(x,y,goRects.menu)){state='menu';SND.stopMusic()}
  }
}

function requestTilt(){
  if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){
    DeviceOrientationEvent.requestPermission().then(r=>{if(r==='granted')enableTilt()}).catch(()=>{});
  }else enableTilt();
}
function enableTilt(){
  tiltOn=true;
  addEventListener('deviceorientation',e=>{
    let g=e.gamma||0;
    if(g>35)g=35;if(g<-35)g=-35;
    tiltLean=g/35;
  });
}

// Gamepad
function pollGamepad(){
  gpLean=0;gpPump=false;gpSpin=false;
  let gps=navigator.getGamepads?navigator.getGamepads():[];
  for(let i=0;i<gps.length;i++){
    let g=gps[i];if(!g)continue;
    let lx=g.axes[0]||0;
    if(Math.abs(lx)>.15)gpLean=lx*1.5;
    gpPump=g.buttons[0]&&g.buttons[0].pressed;
    gpSpin=g.buttons[1]&&g.buttons[1].pressed;
    // Trick buttons
    if(!p.trk&&!p.gnd){
      if(g.buttons[2]&&g.buttons[2].pressed)sTrk('Tailwhip',150);
      if(g.buttons[3]&&g.buttons[3].pressed)sTrk('No-Hander',100);
    }
    break;
  }
}

// ══════════════════ GAME LOOP ══════════════════
let lastT=performance.now();
function loop(t){
  let dt=Math.min(.08,(t-lastT)/1000);lastT=t;
  resize(); // Re-apply transform each frame to handle DPR changes
  update(dt);draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
