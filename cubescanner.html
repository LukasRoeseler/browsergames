<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CuberScan Pro v2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cubejs/lib/cube.min.js"></script>
    <style>
        :root { 
            --accent: #00ff88; --bg: #050505; --panel: #121214; --text: #ffffff;
            --safe-bottom: max(5dvh, env(safe-area-inset-bottom));
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            margin: 0; background: var(--bg); color: var(--text);
            height: 100dvh; display: flex; flex-direction: column;
            overflow: hidden;
        }

        /* --- LAYOUT SECTIONS --- */
        header { 
            height: 60px; padding: 0 20px; display: flex; 
            justify-content: space-between; align-items: center; 
            background: var(--panel); border-bottom: 1px solid #222;
        }

        #scanner-section {
            position: relative; width: 100%; aspect-ratio: 1/1;
            background: #000; overflow: hidden; display: flex; justify-content: center;
        }

        #info-section {
            padding: 10px 15px; text-align: center; background: #1a1a1e;
        }

        #visualizer-section {
            flex: 1; position: relative; background: var(--bg);
        }

        footer {
            height: 80px; display: flex; justify-content: center; 
            align-items: center; gap: 15px; padding: 0 15px;
        }

        #safe-area-spacer { height: var(--safe-bottom); width: 100%; }

        /* --- UI ELEMENTS --- */
        video { height: 100%; width: 100%; object-fit: cover; }
        
        #roi-grid {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 75%; height: 75%; display: grid;
            grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr);
            border: 2px solid var(--accent); border-radius: 8px;
            box-shadow: 0 0 0 2000px rgba(0,0,0,0.5);
        }
        .roi-cell { border: 0.5px solid rgba(0, 255, 136, 0.3); }

        .instruction-title { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 0; }
        .instruction-help { font-size: 0.85rem; color: #aaa; margin: 4px 0 0; }

        #canvas3d { width: 100%; height: 100%; }

        button {
            flex: 1; max-width: 200px; height: 50px; border-radius: 12px; border: none;
            font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.1s;
        }
        #btn-scan { background: var(--accent); color: #000; }
        #btn-reset { background: #222; color: #fff; border: 1px solid #444; }
        button:active { transform: scale(0.95); opacity: 0.8; }

        .live-preview {
            position: absolute; top: 10px; right: 10px; width: 45px; height: 45px;
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px;
        }
        .dot { background: #333; border-radius: 1px; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 800; font-size: 1.2rem;">CUBER<span style="color:var(--accent)">SCAN</span></div>
    <div id="badge" style="font-size: 0.8rem; border: 1px solid var(--accent); padding: 2px 8px; border-radius: 10px;">Face 1/6</div>
</header>

<div id="scanner-section">
    <video id="video" autoplay playsinline></video>
    <div id="roi-grid">
        <div class="roi-cell"></div><div class="roi-cell"></div><div class="roi-cell"></div>
        <div class="roi-cell"></div><div class="roi-cell"></div><div class="roi-cell"></div>
        <div class="roi-cell"></div><div class="roi-cell"></div><div class="roi-cell"></div>
    </div>
    <div class="live-preview" id="live-dots">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
</div>

<div id="info-section">
    <p class="instruction-title" id="step-name">Initialisierung...</p>
    <p class="instruction-help" id="step-help">Kamera wird gestartet</p>
</div>

<div id="visualizer-section">
    <div id="canvas3d"></div>
</div>

<footer>
    <button id="btn-reset" onclick="resetScan()">RESET</button>
    <button id="btn-scan" onclick="captureFace()">SCAN FACE</button>
</footer>

<div id="safe-area-spacer"></div>

<canvas id="proc-canvas" width="300" height="300" style="display:none"></canvas>

<script>
/**
 * PROFESSOR & SPEEDCUBER LOGIC
 */
const STEPS = [
    { id: 'U', name: 'OBEN (Weiß)', help: 'Weiß oben, Grün vorne', color: 'white' },
    { id: 'R', name: 'RECHTS (Rot)', help: 'Weiß oben, Rot vorne', color: 'red' },
    { id: 'F', name: 'VORNE (Grün)', help: 'Weiß oben, Grün vorne', color: 'green' },
    { id: 'D', name: 'UNTEN (Gelb)', help: 'Grün oben, Gelb vorne', color: 'yellow' },
    { id: 'L', name: 'LINKS (Orange)', help: 'Weiß oben, Orange vorne', color: 'orange' },
    { id: 'B', name: 'HINTEN (Blau)', help: 'Weiß oben, Blau vorne', color: 'blue' }
];

const COLORS_3D = { 'U': 0xffffff, 'R': 0xff3b30, 'F': 0x4cd964, 'D': 0xffdd00, 'L': 0xff9500, 'B': 0x007aff };

let currentStep = 0;
let rawScanData = []; 
let centerAnchors = {}; 
let liveRGB = [];

// --- THREE.JS ENGINE ---
let scene, camera, renderer, cubeGroup;
function init3D() {
    scene = new THREE.Scene();
    const container = document.getElementById('visualizer-section');
    camera = new THREE.PerspectiveCamera(40, container.clientWidth / container.clientHeight, 0.1, 100);
    camera.position.set(5, 5, 5);

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    container.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.5;

    cubeGroup = new THREE.Group();
    const geom = new THREE.BoxGeometry(0.94, 0.94, 0.94);
    for(let x=-1; x<=1; x++){
        for(let y=-1; y<=1; y++){
            for(let z=-1; z<=1; z++){
                const mats = Array(6).fill(new THREE.MeshBasicMaterial({ color: 0x111111 }));
                const mesh = new THREE.Mesh(geom, mats);
                mesh.position.set(x, y, z);
                mesh.userData = { pos: [x,y,z] };
                cubeGroup.add(mesh);
            }
        }
    }
    scene.add(cubeGroup);
    animate();
}

function animate() {
    requestAnimationFrame(animate);
    if(renderer) renderer.render(scene, camera);
}

// --- SCANNER ENGINE ---
async function initCamera() {
    const video = document.getElementById('video');
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "environment", focusMode: "continuous", whiteBalanceMode: "continuous" } 
        });
        video.srcObject = stream;
        updateStepUI();
        requestAnimationFrame(analyzeLive);
    } catch(e) {
        alert("Kamera-Zugriff verweigert.");
    }
}

function analyzeLive() {
    const canvas = document.getElementById('proc-canvas');
    const ctx = canvas.getContext('2d');
    ctx.drawImage(document.getElementById('video'), 0, 0, 300, 300);
    
    const dots = document.querySelectorAll('.dot');
    const step = 300 / 3;
    const offset = step / 2;

    liveRGB = [];
    for(let i=0; i<9; i++) {
        let x = i % 3; let y = Math.floor(i / 3);
        const data = ctx.getImageData(x*step + offset - 10, y*step + offset - 10, 20, 20).data;
        let r=0, g=0, b=0;
        for(let j=0; j<data.length; j+=4) { r+=data[j]; g+=data[j+1]; b+=data[j+2]; }
        const rgb = { r: r/100, g: g/100, b: b/100 }; // 20x20=400, data/4=100
        liveRGB.push(rgb);
        dots[i].style.background = `rgb(${rgb.r},${rgb.g},${rgb.b})`;
    }
    requestAnimationFrame(analyzeLive);
}

function updateStepUI() {
    const s = STEPS[currentStep];
    document.getElementById('step-name').innerText = s.name;
    document.getElementById('step-help').innerText = s.help;
    document.getElementById('badge').innerText = `Face ${currentStep + 1}/6`;
}

function captureFace() {
    if(currentStep >= 6) return;
    
    // Anchor Point: Mitte dieser Seite (Index 4)
    centerAnchors[STEPS[currentStep].id] = liveRGB[4];
    rawScanData.push([...liveRGB]);

    // Sofort-Feedback im 3D-Modell (Raw-Colors)
    applyFaceTo3D(STEPS[currentStep].id, liveRGB, true);

    currentStep++;
    if(currentStep === 6) {
        finalizeLogic();
    } else {
        updateStepUI();
    }
}

function finalizeLogic() {
    let cubeString = "";
    for(let f=0; f<6; f++) {
        const faceColors = rawScanData[f].map(rgb => classifyByAnchor(rgb));
        cubeString += faceColors.join('');
        applyFaceTo3D(STEPS[f].id, faceColors, false);
    }

    try {
        const sol = Cube.fromString(cubeString).solve();
        document.getElementById('step-name').innerText = "LÖSUNG BEREIT";
        document.getElementById('step-help').innerHTML = `<b style="color:white; letter-spacing:1px">${sol}</b>`;
        document.getElementById('btn-scan').disabled = true;
    } catch(e) {
        alert("Scan unlogisch. Bitte Reset.");
    }
}

function classifyByAnchor(rgb) {
    let minDist = Infinity;
    let best = 'U';
    for(const [id, ref] of Object.entries(centerAnchors)) {
        const d = Math.sqrt(Math.pow(rgb.r-ref.r,2) + Math.pow(rgb.g-ref.g,2) + Math.pow(rgb.b-ref.b,2));
        if(d < minDist) { minDist = d; best = id; }
    }
    return best;
}

function applyFaceTo3D(faceId, data, isRaw) {
    cubeGroup.children.forEach(piece => {
        const [px, py, pz] = piece.userData.pos;
        const setMaterial = (sideIdx, stickerIdx) => {
            const val = isRaw ? `rgb(${data[stickerIdx].r},${data[stickerIdx].g},${data[stickerIdx].b})` : COLORS_3D[data[stickerIdx]];
            piece.material[sideIdx].color.set(val);
        };
        const g = (x, y) => x + y * 3;
        if(faceId === 'U' && py === 1)  setMaterial(2, g(px+1, pz+1));
        if(faceId === 'D' && py === -1) setMaterial(3, g(px+1, 2-(pz+1)));
        if(faceId === 'F' && pz === 1)  setMaterial(4, g(px+1, 2-(py+1)));
        if(faceId === 'B' && pz === -1) setMaterial(5, g(2-(px+1), 2-(py+1)));
        if(faceId === 'L' && px === -1) setMaterial(1, g(pz+1, 2-(py+1)));
        if(faceId === 'R' && px === 1)  setMaterial(0, g(2-(pz+1), 2-(py+1)));
    });
}

function resetScan() { location.reload(); }

window.onload = () => { init3D(); initCamera(); };
</script>
</body>
</html>
