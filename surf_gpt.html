<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Audio Rider</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none;user-select:none;-webkit-user-select:none}
canvas{display:block;width:100vw;height:100vh}
input[type=file]{display:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<input id="file" type="file" accept="audio/*">
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const fileInput=document.getElementById('file');

let W=0,H=0,DPR=Math.max(1,Math.min(2,devicePixelRatio||1));
function resize(){
  W=innerWidth;H=innerHeight;
  canvas.width=Math.floor(W*DPR);
  canvas.height=Math.floor(H*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
addEventListener('resize',resize,{passive:true}); resize();

const CFG={
  LANES:3,
  SEG_PER_SEC:18,
  LOOKAHEAD:24,
  TOUCH_SWIPE:28,
  MAX_DT:0.034
};

const state={
  mode:'menu',
  high:+localStorage.getItem('audio_rider_hi')||0,
  loadMsg:'',
  loadProg:0,
  songName:'',
  playTime:0,
  totalTime:0,
  died:false
};

let actx=null, analyser=null, sourceNode=null, currentBuffer=null, startCtxTime=0;
let realtimeFreq = new Uint8Array(128);
let audioEnergy=0, audioBass=0;

const game={
  track:[],
  totalCollectibles:0,
  pos:0,
  playerLane:1,
  playerX:1,
  score:0,
  combo:0,
  maxCombo:0,
  collected:0,
  hp:3,
  maxHp:5,
  mult:1,
  multTimer:0,
  flash:0,
  flashColor:'255,180,50',
  shake:0,
  particles:[],
  texts:[],
  time:0
};

const menuButtons={};
const keys={};
let touchStartX=null;

function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function lerp(a,b,t){return a+(b-a)*t}
function rrPath(x,y,w,h,r=6){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}
function drawButton(x,y,w,h,label,fill,stroke,id){
  menuButtons[id]={x,y,w,h};
  ctx.fillStyle=fill;
  ctx.strokeStyle=stroke;
  ctx.lineWidth=2;
  rrPath(x,y,w,h,10); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#fff';
  ctx.font=`bold ${Math.min(16,w*0.06)}px Arial`;
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText(label,x+w/2,y+h/2+1);
}
function hitBtn(mx,my,id){
  const b=menuButtons[id];
  return b && mx>=b.x && mx<=b.x+b.w && my>=b.y && my<=b.y+b.h;
}
function fmtTime(s){
  s=Math.max(0,s||0);
  const m=Math.floor(s/60), ss=Math.floor(s%60);
  return `${m}:${ss<10?'0':''}${ss}`;
}

function roadGeom(){
  const rw = (W>H?W*0.48:W*0.82);
  const rl = (W-rw)/2;
  const lw = rw/CFG.LANES;
  const py = H*0.84;
  const ty = H*0.02;
  const vh = py-ty;
  const pps = vh/CFG.LOOKAHEAD;
  return {rw,rl,rr:rl+rw,lw,py,ty,vh,pps};
}
function laneCenter(lane,r){ return r.rl + (lane+0.5)*r.lw; }

function ensureAudio(){
  if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)();
  if(!analyser && actx){
    analyser=actx.createAnalyser();
    analyser.fftSize=256;
    realtimeFreq = new Uint8Array(analyser.frequencyBinCount);
  }
}
function stopAudio(){
  if(sourceNode){
    try{sourceNode.stop()}catch(e){}
    try{sourceNode.disconnect()}catch(e){}
    sourceNode=null;
  }
}
function playBuffer(buf){
  ensureAudio();
  stopAudio();
  currentBuffer=buf;
  state.totalTime=buf.duration;
  if(actx.state==='suspended') actx.resume();
  sourceNode=actx.createBufferSource();
  sourceNode.buffer=buf;
  sourceNode.connect(analyser);
  analyser.connect(actx.destination);
  startCtxTime=actx.currentTime;
  sourceNode.start();
  sourceNode.onended=()=>{
    if(state.mode==='play'){
      finishGame(false);
    }
  };
}

function analyzeBuffer(buf){
  const sr=buf.sampleRate;
  let mono;
  if(buf.numberOfChannels>1){
    const c0=buf.getChannelData(0), c1=buf.getChannelData(1);
    mono=new Float32Array(c0.length);
    for(let i=0;i<c0.length;i++) mono[i]=(c0[i]+c1[i])*0.5;
  } else mono=buf.getChannelData(0);

  const win=Math.floor(sr*0.04);
  const hop=Math.floor(win*0.5);
  const frames=Math.max(1,Math.floor((mono.length-win)/hop));
  let en=new Array(frames), bass=new Array(frames);

  for(let f=0;f<frames;f++){
    const s=f*hop;
    let e=0, b=0, lp=0;
    for(let i=0;i<win;i++){
      const v=mono[s+i]||0;
      e+=v*v;
      lp = lp*0.92 + v*0.08;
      b += lp*lp;
    }
    en[f]=Math.sqrt(e/win);
    bass[f]=Math.sqrt(b/win);
  }
  const maxE=Math.max(...en,0.001), maxB=Math.max(...bass,0.001);
  en=en.map(v=>v/maxE);
  bass=bass.map(v=>v/maxB);

  const beats=[];
  const local=18;
  for(let i=local;i<frames-local;i++){
    let avg=0;
    for(let j=i-local;j<=i+local;j++) avg+=en[j];
    avg/=(local*2+1);
    if(en[i]>avg*1.35 && en[i]>=en[i-1] && en[i]>=en[i+1]) beats.push(i);
  }
  const minGap=Math.floor((0.09)/(hop/sr));
  const filtered=[];
  for(let i=0;i<beats.length;i++){
    if(!filtered.length || beats[i]-filtered[filtered.length-1]>=minGap) filtered.push(beats[i]);
  }

  return {energy:en,bass,bests:filtered,tpf:hop/sr};
}

function buildTrack(analysis,duration){
  const total = Math.ceil(duration*CFG.SEG_PER_SEC)+40;
  const track = Array.from({length:total},()=>({items:[], energy:0}));
  const beatSet = new Set();
  const beatEnergy = {};
  for(const bi of analysis.bests){
    const seg=Math.round(bi*analysis.tpf*CFG.SEG_PER_SEC);
    beatSet.add(seg);
    beatEnergy[seg]=analysis.energy[Math.min(bi,analysis.energy.length-1)]||0;
  }

  for(let i=0;i<total;i++){
    const t=i/CFG.SEG_PER_SEC;
    const fi=Math.min(analysis.energy.length-1,Math.max(0,Math.floor(t/analysis.tpf)));
    track[i].energy=analysis.energy[fi]||0;
  }

  let lastObstacle=-999;
  let collectibleCount=0;
  let obstacleCount=0;

  for(let i=0;i<total;i++){
    const seg=track[i];
    const used=new Set();

    if(beatSet.has(i) && i>2){
      const e=beatEnergy[i]||0;
      const n=e>0.65?2:1;
      for(let k=0;k<n;k++){
        let lane;
        do lane=Math.floor(Math.random()*CFG.LANES); while(used.has(lane));
        used.add(lane);
        seg.items.push({lane,type:'c',hit:false});
        collectibleCount++;
      }
    }

    if(!beatSet.has(i) && seg.energy>0.12 && Math.random()<0.32 && i-lastObstacle>=5){
      let lane=Math.floor(Math.random()*CFG.LANES);
      if(!used.has(lane)){
        seg.items.push({lane,type:'o',hit:false});
        used.add(lane);
        lastObstacle=i;
        obstacleCount++;
      }
    }

    if(i>0 && i%75===0 && Math.random()<0.55){
      let lane=Math.floor(Math.random()*CFG.LANES);
      if(!used.has(lane)){ seg.items.push({lane,type:'s',hit:false}); used.add(lane); }
    }

    if(i>0 && i%110===0 && Math.random()<0.48){
      let lane=Math.floor(Math.random()*CFG.LANES);
      if(!used.has(lane)){ seg.items.push({lane,type:'m',hit:false}); used.add(lane); }
    }
  }

  if(collectibleCount < total/35){
    for(let i=10;i<total;i+=8+Math.floor(Math.random()*5)){
      if(track[i].items.length===0){
        track[i].items.push({lane:Math.floor(Math.random()*CFG.LANES),type:'c',hit:false});
        collectibleCount++;
      }
    }
  }
  if(obstacleCount < total/80){
    for(let i=20;i<total;i+=25){
      const lanesUsed=track[i].items.map(it=>it.lane);
      let lane=Math.floor(Math.random()*CFG.LANES);
      if(!lanesUsed.includes(lane)){
        track[i].items.push({lane,type:'o',hit:false});
      }
    }
  }

  game.track=track;
  game.totalCollectibles=collectibleCount;
}

async function genSmokeSignal(){
  state.loadMsg='Generating Smoke Signal...'; state.loadProg=0.05;
  const dur=52, sr=44100, bpm=92, beat=60/bpm;
  const off=new OfflineAudioContext(1, Math.floor(sr*dur), sr);

  const noiseBuf=off.createBuffer(1,sr*2,sr);
  const nd=noiseBuf.getChannelData(0);
  for(let i=0;i<nd.length;i++) nd[i]=Math.random()*2-1;

  function tone(type,freq,t,d,vol,freqEnd){
    if(t>=dur) return;
    d=Math.min(d,dur-t-0.01); if(d<=0) return;
    const o=off.createOscillator(), g=off.createGain();
    o.type=type; o.frequency.setValueAtTime(freq,t);
    if(freqEnd) o.frequency.exponentialRampToValueAtTime(Math.max(0.5,freqEnd), t+d*0.85);
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(vol,t+0.003);
    g.gain.setValueAtTime(vol*0.8,t+d*0.6);
    g.gain.exponentialRampToValueAtTime(0.0001,t+d);
    o.connect(g); g.connect(off.destination);
    o.start(t); o.stop(t+d+0.02);
  }
  function noise(t,d,vol,hp=2000){
    if(t>=dur) return;
    d=Math.min(d,dur-t-0.01); if(d<=0) return;
    const s=off.createBufferSource(), g=off.createGain(), f=off.createBiquadFilter();
    s.buffer=noiseBuf; f.type='highpass'; f.frequency.value=hp;
    g.gain.setValueAtTime(vol,t);
    g.gain.exponentialRampToValueAtTime(0.0001,t+d);
    s.connect(f); f.connect(g); g.connect(off.destination);
    s.start(t,Math.random()*0.8); s.stop(t+d+0.01);
  }

  const bars=Math.floor(dur/(beat*4));

  // kick
  for(let b=0;b<bars;b++){
    const t=b*beat*4;
    tone('sine',155,t,0.28,0.5,28);
    tone('sine',62,t,0.14,0.2,22);
    tone('sine',155,t+beat*2,0.28,0.5,28);
    tone('sine',62,t+beat*2,0.14,0.2,22);
    if(b%4===3) tone('sine',155,t+beat*2.5,0.22,0.4,28);
    if(b>5 && b%3===0) tone('sine',155,t+beat*0.5,0.2,0.25,30);
  }
  state.loadProg=0.2;

  // snare
  for(let b=2;b<bars;b++){
    const t=b*beat*4;
    noise(t+beat,0.12,0.15,800); tone('triangle',185,t+beat,0.06,0.1);
    noise(t+beat*3,0.12,0.15,800); tone('triangle',185,t+beat*3,0.06,0.1);
  }
  state.loadProg=0.3;

  // hats
  for(let b=0;b<bars;b++){
    for(let i=0;i<8;i++){
      const swing=i%2?beat*0.08:0;
      const tt=b*beat*4 + i*beat*0.5 + swing;
      noise(tt, (i===4||i===6)?0.1:0.035, (i===4||i===6)?0.05:0.028, 5500);
    }
  }
  state.loadProg=0.4;

  const bassPatterns=[
    [[0,110,.45],[1.5,110,.2],[2,130.81,.35],[3,146.83,.18],[3.5,196,.3]],
    [[0,110,.38],[1,130.81,.25],[2,146.83,.35],[3,196,.12],[3.5,164.81,.28]],
    [[0,130.81,.42],[1.5,146.83,.2],[2,110,.38],[3,130.81,.25],[3.5,196,.2]],
    [[0,110,.55],[1.5,98,.18],[2,164.81,.28],[2.5,146.83,.18],[3,130.81,.35]]
  ];
  for(let b=0;b<bars;b++){
    const pat=bassPatterns[b%bassPatterns.length], t=b*beat*4;
    const vol=b<2?0.03:0.07;
    for(const [bo,fr,du] of pat){
      tone('sawtooth',fr,t+bo*beat,du*beat,vol);
      tone('square',fr*0.998,t+bo*beat,du*beat*0.6,vol*0.3);
    }
  }
  state.loadProg=0.55;

  const chords=[
    [220,261.63,329.63],
    [146.83,220,293.66],
    [164.81,246.94,329.63],
    [220,261.63,329.63]
  ];
  for(let b=4;b<bars;b++){
    const c=chords[b%chords.length], t=b*beat*4, vol=b<6?0.01:0.02;
    for(const fr of c){
      tone('triangle',fr,t,beat*3.5,vol);
      tone('sine',fr*2.005,t,beat*3,vol*0.4);
    }
  }
  state.loadProg=0.7;

  const lead=[440,0,523.25,587.33,0,523.25,440,0,392,440,523.25,0,587.33,659.25,587.33,523.25];
  for(let b=8;b<bars;b++){
    for(let i=0;i<16;i++){
      const note=lead[i];
      if(!note || Math.random()<0.3) continue;
      const t=b*beat*4+i*beat*0.25;
      tone('square',note,t,beat*0.42,0.022);
      tone('square',note*1.003,t,beat*0.38,0.01);
    }
  }
  state.loadProg=0.85;

  for(let i=0;i<180;i++) noise(Math.random()*dur,0.008,0.004,4000);
  const buf=await off.startRendering();
  state.loadProg=1;
  return buf;
}

async function genBasiqueGroove(){
  state.loadMsg='Generating Basique Groove...'; state.loadProg=0.05;
  const dur=55, sr=44100, bpm=105, beat=60/bpm;
  const off=new OfflineAudioContext(1, Math.floor(sr*dur), sr);

  const noiseBuf=off.createBuffer(1,sr*2,sr);
  const nd=noiseBuf.getChannelData(0);
  for(let i=0;i<nd.length;i++) nd[i]=Math.random()*2-1;

  function tone(type,freq,t,d,vol,freqEnd){
    if(t>=dur) return;
    d=Math.min(d,dur-t-0.01); if(d<=0) return;
    const o=off.createOscillator(), g=off.createGain();
    o.type=type; o.frequency.setValueAtTime(freq,t);
    if(freqEnd) o.frequency.exponentialRampToValueAtTime(Math.max(0.5,freqEnd), t+d*0.85);
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(vol,t+0.003);
    g.gain.setValueAtTime(vol*0.75,t+d*0.55);
    g.gain.exponentialRampToValueAtTime(0.0001,t+d);
    o.connect(g); g.connect(off.destination);
    o.start(t); o.stop(t+d+0.02);
  }
  function noise(t,d,vol,hp=2000){
    if(t>=dur) return;
    d=Math.min(d,dur-t-0.01); if(d<=0) return;
    const s=off.createBufferSource(), g=off.createGain(), f=off.createBiquadFilter();
    s.buffer=noiseBuf; f.type='highpass'; f.frequency.value=hp;
    g.gain.setValueAtTime(vol,t);
    g.gain.exponentialRampToValueAtTime(0.0001,t+d);
    s.connect(f); f.connect(g); g.connect(off.destination);
    s.start(t,Math.random()*0.8); s.stop(t+d+0.01);
  }
  function kick(t){ tone('sine',160,t,0.25,0.52,30); tone('sine',68,t,0.13,0.22); }
  function snr(t){ noise(t,0.12,0.16,900); tone('triangle',200,t,0.05,0.09); }
  function hh(t,open){ noise(t,open?0.1:0.035,open?0.055:0.028,5500); }

  const bars=Math.floor(dur/(beat*4));
  for(let b=0;b<bars;b++){
    const t=b*beat*4;
    kick(t);
    if(b>1) kick(t+beat*1.75);
    kick(t+beat*2);
    if(b%2===1 && b>3) kick(t+beat*3.5);
  }
  state.loadProg=0.18;

  for(let b=1;b<bars;b++){
    const t=b*beat*4;
    snr(t+beat); snr(t+beat*3);
    if(b>5 && b%3===0) snr(t+beat*3.5);
  }
  state.loadProg=0.28;

  for(let b=1;b<bars;b++){
    for(let i=0;i<8;i++){
      const swing=i%2?beat*0.07:0;
      hh(b*beat*4+i*beat*0.5+swing, i===4||i===6);
    }
  }
  state.loadProg=0.38;

  const bassPatterns=[
    [[0,110,.42],[1.5,130.81,.18],[2,146.83,.32],[3,130.81,.15],[3.5,98,.32]],
    [[0,110,.36],[1,146.83,.2],[2,185,.3],[2.75,146.83,.14],[3,130.81,.28]],
    [[0,130.81,.4],[1.5,110,.14],[2,196,.28],[3,164.81,.18],[3.5,146.83,.22]],
    [[0,110,.5],[1,130.81,.16],[1.5,110,.12],[2,146.83,.32],[3,185,.18],[3.5,164.81,.2]]
  ];
  for(let b=0;b<bars;b++){
    const pat=bassPatterns[b%bassPatterns.length], t=b*beat*4, vol=b<2?0.03:0.065;
    for(const [bo,fr,du] of pat){
      tone('sawtooth',fr,t+bo*beat,du*beat,vol);
      tone('square',fr*0.998,t+bo*beat,du*beat*0.5,vol*0.22);
    }
  }
  state.loadProg=0.5;

  const chords=[
    [220,261.63,329.63,392],
    [220,261.63,329.63,392],
    [146.83,196,261.63,329.63],
    [146.83,196,261.63,329.63],
    [196,246.94,293.66,349.23],
    [196,246.94,293.66,349.23],
    [261.63,329.63,392,493.88],
    [220,261.63,329.63,392]
  ];
  for(let b=3;b<bars;b++){
    const c=chords[b%chords.length], t=b*beat*4, vol=b<5?0.01:0.019;
    for(const fr of c){
      tone('triangle',fr,t,beat*2.5,vol);
      tone('sine',fr*2.003,t,beat*2,vol*0.3);
      tone('triangle',fr,t+beat*2.5,beat*1.2,vol*0.65);
    }
  }
  state.loadProg=0.64;

  const melodyA=[659.25,587.33,523.25,440,523.25,659.25,587.33,0,659.25,587.33,523.25,440,523.25,0,440,523.25];
  const melodyB=[659.25,783.99,880,659.25,783.99,659.25,587.33,523.25,659.25,783.99,659.25,587.33,523.25,440,0,523.25];
  for(let b=7;b<bars;b++){
    const mel = (Math.floor((b-7)/4)%2===0)? melodyA : melodyB;
    for(let i=0;i<8;i++){
      const note=mel[(b*8+i)%mel.length];
      if(!note || Math.random()<0.28) continue;
      const t=b*beat*4+i*beat*0.5;
      tone('square',note,t,beat*0.48,0.023);
      tone('square',note*1.004,t,beat*0.42,0.009);
    }
  }
  state.loadProg=0.78;

  for(let b=5;b<bars;b+=2){
    const t=b*beat*4;
    tone('square',659.25,t+beat*0.5,beat*0.12,0.015);
    tone('square',659.25,t+beat*2.5,beat*0.12,0.012);
  }
  for(let b=4;b<bars;b+=2){
    tone('sine',220,b*beat*4,beat*8,0.008);
    tone('sine',329.63,b*beat*4,beat*7,0.005);
  }
  for(let i=0;i<200;i++) noise(Math.random()*dur,0.007,0.004,3500);
  const buf=await off.startRendering();
  state.loadProg=1;
  return buf;
}

function resetGame(){
  game.pos=0;
  game.playerLane=1;
  game.playerX=1;
  game.score=0;
  game.combo=0;
  game.maxCombo=0;
  game.collected=0;
  game.hp=3;
  game.mult=1;
  game.multTimer=0;
  game.flash=0;
  game.shake=0;
  game.particles.length=0;
  game.texts.length=0;
  game.time=0;
  state.playTime=0;
  state.died=false;
}
function startFromBuffer(buf,name){
  resetGame();
  state.songName=name;
  currentBuffer=buf;
  const analysis=analyzeBuffer(buf);
  buildTrack(analysis,buf.duration);
  playBuffer(buf);
  state.mode='play';
}

function spawnParticles(lane,color,count=12){
  const r=roadGeom(), x=laneCenter(lane,r), y=r.py;
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2;
    const sp=80+Math.random()*200;
    game.particles.push({
      x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
      life:0.4+Math.random()*0.8,max:1,color,sz:2+Math.random()*5
    });
  }
}
function spawnText(text,lane,color){
  const r=roadGeom();
  game.texts.push({text,x:laneCenter(lane,r),y:r.py-30,life:2.5,color});
}
function hitItem(item){
  if(item.type==='c'){
    const pts=Math.floor((50+game.combo*12)*game.mult);
    game.score+=pts;
    game.combo++;
    game.maxCombo=Math.max(game.maxCombo,game.combo);
    game.collected++;
    game.flash=0.18; game.flashColor='255,180,50';
    spawnParticles(item.lane,'#ff8800',14);
    spawnText('+'+pts,item.lane,'#ffcc44');
  }else if(item.type==='o'){
    game.hp--;
    game.combo=0;
    game.mult=1;
    game.multTimer=0;
    game.flash=0.35; game.flashColor='255,40,80';
    game.shake=0.4;
    spawnParticles(item.lane,'#ff2255',18);
    spawnText('OUCH! -♥',item.lane,'#ff4477');
    if(game.hp<=0){
      finishGame(true);
    }
  }else if(item.type==='s'){
    game.hp=Math.min(game.maxHp,game.hp+1);
    spawnParticles(item.lane,'#00ffdd',10);
    spawnText('+♥',item.lane,'#66ffee');
  }else if(item.type==='m'){
    game.mult=2;
    game.multTimer=8;
    spawnParticles(item.lane,'#ffd700',12);
    spawnText('2× SCORE!',item.lane,'#ffee55');
  }
}
function finishGame(died){
  state.died=died;
  stopAudio();
  state.mode='results';
  if(game.score>state.high){
    state.high=Math.floor(game.score);
    localStorage.setItem('audio_rider_hi',state.high);
  }
}

function updateAudioMeters(){
  if(analyser && state.mode==='play'){
    analyser.getByteFrequencyData(realtimeFreq);
    let sum=0,b=0;
    for(let i=0;i<realtimeFreq.length;i++) sum+=realtimeFreq[i];
    for(let i=0;i<12;i++) b+=realtimeFreq[i]||0;
    audioEnergy=(sum/realtimeFreq.length)/255;
    audioBass=(b/12)/255;
  }else{
    audioEnergy*=0.95;
    audioBass*=0.95;
  }
}
function updateGame(dt){
  updateAudioMeters();
  if(state.mode!=='play') return;
  game.time+=dt;
  state.playTime = actx ? (actx.currentTime-startCtxTime) : state.playTime+dt;
  game.score += dt*1.5;

  if(game.multTimer>0){
    game.multTimer-=dt;
    if(game.multTimer<=0){ game.multTimer=0; game.mult=1; }
  }

  const nextPos=state.playTime*CFG.SEG_PER_SEC;
  const oldSeg=Math.floor(game.pos);
  const newSeg=Math.floor(nextPos);
  for(let s=Math.max(0,oldSeg); s<=Math.min(newSeg, game.track.length-1); s++){
    const seg=game.track[s];
    for(const item of seg.items){
      if(item.hit) continue;
      if(item.lane===Math.round(game.playerX)){
        item.hit=true;
        hitItem(item);
      }
    }
  }
  game.pos=nextPos;
  game.playerX += (game.playerLane-game.playerX)*0.15;

  for(let i=game.particles.length-1;i>=0;i--){
    const p=game.particles[i];
    p.x+=p.vx*dt; p.y+=p.vy*dt;
    p.life-=dt;
    if(p.life<=0) game.particles.splice(i,1);
  }
  for(let i=game.texts.length-1;i>=0;i--){
    const t=game.texts[i];
    t.y-=40*dt;
    t.life-=dt;
    if(t.life<=0) game.texts.splice(i,1);
  }
  game.flash=Math.max(0,game.flash-dt*2.8);
  game.shake=Math.max(0,game.shake-dt);

  if(game.pos>=game.track.length-1 && state.mode==='play'){
    finishGame(false);
  }
}

function drawBackground(){
  const bi=Math.floor(audioEnergy*20);
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,`rgb(${4+bi},${3+Math.floor(bi*0.2)},${12+bi})`);
  g.addColorStop(0.5,`rgb(${6+Math.floor(bi*1.2)},${4+Math.floor(bi*0.3)},${18+bi})`);
  g.addColorStop(1,`rgb(${4+bi},${3+Math.floor(bi*0.2)},${12+bi})`);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  const r=roadGeom();
  const gridA=0.02+audioEnergy*0.04;
  ctx.strokeStyle=`rgba(255,140,0,${gridA})`;
  ctx.lineWidth=1;
  const gridSp=38;
  const off=((game.pos||0)%1)*r.pps%gridSp;
  for(let y=-gridSp+off;y<H;y+=gridSp){
    ctx.beginPath();
    ctx.moveTo(r.rl-40,y);
    ctx.lineTo(r.rr+40,y);
    ctx.stroke();
  }
}
function drawRoad(){
  const r=roadGeom();
  const bi=Math.floor(audioEnergy*18);

  // side spectrum
  for(let side=-1;side<=1;side+=2){
    for(let i=0;i<50;i++){
      const fi=Math.floor(i/50*realtimeFreq.length);
      const v=(realtimeFreq[fi]||0)/255;
      const y=r.ty+i*(r.vh/50);
      const bx=side<0?r.rl-10:r.rr+10;
      const len=v*(W>H?W*0.06:W*0.045);
      const hue=20+v*50;
      ctx.fillStyle=`hsla(${hue},100%,50%,${0.06+v*0.2})`;
      ctx.fillRect(side<0?bx-len:bx, y, len, r.vh/50-1);
    }
  }

  ctx.fillStyle=`rgb(${10+bi},10,${16+bi})`;
  ctx.fillRect(r.rl,0,r.rw,H);

  const edA=0.25+audioBass*0.55;
  ctx.strokeStyle=`rgba(255,${Math.floor(130+audioBass*60)},0,${edA})`;
  ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(r.rl,0); ctx.lineTo(r.rl,H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(r.rr,0); ctx.lineTo(r.rr,H); ctx.stroke();

  ctx.globalAlpha=0.04+audioBass*0.08;
  let eg=ctx.createLinearGradient(r.rl-30,0,r.rl+20,0);
  eg.addColorStop(0,'transparent'); eg.addColorStop(0.5,'rgba(255,140,0,.3)'); eg.addColorStop(1,'transparent');
  ctx.fillStyle=eg; ctx.fillRect(r.rl-30,0,50,H);
  eg=ctx.createLinearGradient(r.rr-20,0,r.rr+30,0);
  eg.addColorStop(0,'transparent'); eg.addColorStop(0.5,'rgba(255,140,0,.3)'); eg.addColorStop(1,'transparent');
  ctx.fillStyle=eg; ctx.fillRect(r.rr-20,0,50,H);
  ctx.globalAlpha=1;

  const dashH=r.pps*0.4, gapH=r.pps*0.6;
  const dashOff=((game.pos%1)*r.pps)%(dashH+gapH);
  ctx.strokeStyle=`rgba(255,255,255,${0.08+audioEnergy*0.1})`;
  ctx.lineWidth=2;
  for(let l=1;l<CFG.LANES;l++){
    const x=r.rl+l*r.lw;
    for(let y=-dashH+dashOff;y<H;y+=dashH+gapH){
      if(y+dashH<0) continue;
      ctx.beginPath();
      ctx.moveTo(x,y); ctx.lineTo(x,Math.min(y+dashH,H)); ctx.stroke();
    }
  }

  if(audioEnergy>0.2){
    ctx.strokeStyle=`rgba(255,200,80,${(audioEnergy-0.2)*0.5})`;
    ctx.lineWidth=1;
    const cx=r.rl+r.rw/2;
    ctx.beginPath(); ctx.moveTo(cx,0); ctx.lineTo(cx,H); ctx.stroke();
  }
}
function drawItems(){
  const r=roadGeom();
  const base=Math.floor(game.pos);
  const frac=game.pos-base;

  for(let a=-2;a<=CFG.LOOKAHEAD+3;a++){
    const si=base+a;
    if(si<0||si>=game.track.length) continue;
    const seg=game.track[si];
    if(!seg.items.length) continue;
    const rel=a-frac;
    const sy=r.py-rel*r.pps;
    if(sy<-90||sy>H+60) continue;

    for(const it of seg.items){
      if(it.hit) continue;
      const cx=laneCenter(it.lane,r);
      const iw=r.lw*0.74;
      const ih=Math.max(32,r.pps*0.75);
      const ix=cx-iw/2;
      const iy=sy-ih;
      const pulse=0.85+0.15*Math.sin(game.time*7+a*0.4);

      if(it.type==='o'){
        ctx.globalAlpha=0.06*pulse;
        ctx.fillStyle='#ff0044';
        ctx.fillRect(r.rl+it.lane*r.lw,0,r.lw,H);
        ctx.globalAlpha=1;
      }

      ctx.globalAlpha = (it.type==='o'?0.2:it.type==='c'?0.14:0.12)*pulse;
      ctx.fillStyle = it.type==='c' ? '#ff8800' : it.type==='o' ? '#ff0044' : it.type==='s' ? '#00ddff' : '#ffd700';
      ctx.fillRect(ix-6,iy-6,iw+12,ih+12);
      ctx.globalAlpha=1;

      let grad;
      if(it.type==='c'){
        grad=ctx.createLinearGradient(ix,iy,ix,iy+ih);
        grad.addColorStop(0,'#ffbb44');
        grad.addColorStop(0.5,'#ff8800');
        grad.addColorStop(1,'#cc5500');
        ctx.fillStyle=grad;
        rrPath(ix,iy,iw,ih,6); ctx.fill();
        ctx.fillStyle='rgba(255,255,200,.18)';
        ctx.fillRect(ix+2,iy+2,iw-4,ih*0.28);
        ctx.strokeStyle='#ffcc55'; ctx.lineWidth=2;
        rrPath(ix,iy,iw,ih,6); ctx.stroke();
        ctx.fillStyle='#fff';
        ctx.font=`bold ${Math.min(16,ih*0.4)}px Arial`;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('■',cx,iy+ih*0.48);
      } else if(it.type==='o'){
        grad=ctx.createLinearGradient(ix,iy,ix,iy+ih);
        grad.addColorStop(0,'#ff3366');
        grad.addColorStop(0.5,'#ee1144');
        grad.addColorStop(1,'#880022');
        ctx.fillStyle=grad;
        rrPath(ix,iy,iw,ih,6); ctx.fill();
        ctx.fillStyle='rgba(0,0,0,.12)';
        for(let s=0;s<6;s+=2) ctx.fillRect(ix+2,iy+s*ih/6,iw-4,ih/12);
        const pad=Math.min(iw,ih)*0.22;
        ctx.strokeStyle='#fff'; ctx.lineWidth=Math.max(3,ih*0.08);
        ctx.beginPath(); ctx.moveTo(ix+pad,iy+pad); ctx.lineTo(ix+iw-pad,iy+ih-pad); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(ix+iw-pad,iy+pad); ctx.lineTo(ix+pad,iy+ih-pad); ctx.stroke();
        ctx.strokeStyle=`rgba(255,50,80,${0.6*pulse})`; ctx.lineWidth=2.5;
        rrPath(ix-1,iy-1,iw+2,ih+2,7); ctx.stroke();
        ctx.fillStyle='rgba(255,255,255,.75)';
        ctx.font=`bold ${Math.min(12,ih*0.22)}px Arial`;
        ctx.textAlign='center'; ctx.fillText('✕',cx,iy+ih*0.28);
      } else if(it.type==='s'){
        grad=ctx.createLinearGradient(ix,iy,ix,iy+ih);
        grad.addColorStop(0,'#33ffee'); grad.addColorStop(1,'#006666');
        ctx.fillStyle=grad;
        rrPath(ix,iy,iw,ih,6); ctx.fill();
        ctx.fillStyle='rgba(255,255,255,.15)';
        ctx.fillRect(ix+2,iy+2,iw-4,ih*0.25);
        ctx.strokeStyle='#00ffcc'; ctx.lineWidth=2;
        rrPath(ix,iy,iw,ih,6); ctx.stroke();
        ctx.fillStyle='#fff';
        ctx.font=`bold ${Math.min(18,ih*0.45)}px Arial`;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('♥',cx,iy+ih*0.5);
      } else if(it.type==='m'){
        grad=ctx.createLinearGradient(ix,iy,ix,iy+ih);
        grad.addColorStop(0,'#ffee55'); grad.addColorStop(1,'#aa7700');
        ctx.fillStyle=grad;
        rrPath(ix,iy,iw,ih,6); ctx.fill();
        ctx.fillStyle='rgba(255,255,255,.15)';
        ctx.fillRect(ix+2,iy+2,iw-4,ih*0.25);
        ctx.strokeStyle='#ffcc00'; ctx.lineWidth=2;
        rrPath(ix,iy,iw,ih,6); ctx.stroke();
        ctx.fillStyle='#fff';
        ctx.font=`bold ${Math.min(16,ih*0.4)}px Arial`;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('2×',cx,iy+ih*0.5);
      }
    }
  }
}
function drawShip(){
  const r=roadGeom();
  const px=laneCenter(Math.round(game.playerX),r)+(game.playerX-Math.round(game.playerX))*r.lw;
  const py=r.py;
  const sz=22+audioEnergy*6;

  ctx.globalAlpha=0.04;
  ctx.fillStyle='#ff8800';
  ctx.fillRect(r.rl+Math.round(game.playerX)*r.lw,0,r.lw,H);
  ctx.globalAlpha=1;

  for(let i=0;i<6;i++){
    const tx=px+(Math.random()-0.5)*sz*0.3;
    const ty=py+5+i*6+Math.random()*8;
    ctx.fillStyle=`rgba(255,${90+i*22},0,${0.4-i*0.06})`;
    ctx.beginPath();
    ctx.arc(tx,ty,Math.max(1,sz*(0.22-i*0.028)),0,Math.PI*2);
    ctx.fill();
  }

  const g=ctx.createLinearGradient(px-sz,py,px+sz,py);
  g.addColorStop(0,'#882200');
  g.addColorStop(0.3,'#ff7700');
  g.addColorStop(0.5,'#ffaa33');
  g.addColorStop(0.7,'#ff7700');
  g.addColorStop(1,'#882200');
  ctx.fillStyle=g;
  ctx.beginPath();
  ctx.moveTo(px,py-sz);
  ctx.lineTo(px-sz*0.88,py+sz*0.22);
  ctx.lineTo(px-sz*0.3,py+sz*0.1);
  ctx.lineTo(px,py+sz*0.4);
  ctx.lineTo(px+sz*0.3,py+sz*0.1);
  ctx.lineTo(px+sz*0.88,py+sz*0.22);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle='rgba(255,200,100,.4)';
  ctx.lineWidth=1.5;
  ctx.stroke();

  ctx.fillStyle=`rgba(255,255,255,${0.3+audioEnergy*0.6})`;
  ctx.beginPath();
  ctx.arc(px,py-sz*0.08,sz*0.18,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle='rgba(255,160,40,.7)';
  ctx.beginPath(); ctx.arc(px-sz*0.62,py+sz*0.18,2.4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(px+sz*0.62,py+sz*0.18,2.4,0,Math.PI*2); ctx.fill();

  if(game.hp===game.maxHp){
    ctx.strokeStyle=`rgba(0,255,220,${0.15+0.1*Math.sin(game.time*4)})`;
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.arc(px,py,sz*1.15,0,Math.PI*2);
    ctx.stroke();
  }
}
function drawParticlesAndTexts(){
  for(const p of game.particles){
    ctx.globalAlpha=Math.max(0,p.life/p.max);
    ctx.fillStyle=p.color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha=1;

  for(const t of game.texts){
    ctx.globalAlpha=Math.min(1,t.life/2.5);
    ctx.font='bold 18px Arial';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.lineWidth=3;
    ctx.strokeStyle='#000';
    ctx.fillStyle=t.color;
    ctx.strokeText(t.text,t.x,t.y);
    ctx.fillText(t.text,t.x,t.y);
  }
  ctx.globalAlpha=1;
}
function drawBottomSpectrum(){
  const h=25;
  const barW=Math.max(1,W/(realtimeFreq.length*1.3));
  for(let i=0;i<realtimeFreq.length;i++){
    const v=(realtimeFreq[i]||0)/255;
    const hue=15 + (i/realtimeFreq.length)*30;
    ctx.fillStyle=`hsla(${hue},100%,50%,${0.08+v*0.22})`;
    ctx.fillRect(i*barW*1.3+2,H-2-v*h,barW,v*h);
  }
}
function drawHUD(){
  ctx.textBaseline='top';
  ctx.lineWidth=3;
  ctx.strokeStyle='rgba(0,0,0,.55)';

  ctx.font='bold 22px Arial';
  ctx.fillStyle='#fff';
  let y=10;
  const scoreText='Score: '+Math.floor(game.score);
  ctx.strokeText(scoreText,12,y); ctx.fillText(scoreText,12,y); y+=26;

  if(game.combo>1){
    ctx.font='bold 20px Arial';
    ctx.fillStyle=game.combo>25?'#FFD700':game.combo>12?'#ff8844':'#ffee55';
    const txt=game.combo+'x Combo';
    ctx.strokeText(txt,12,y); ctx.fillText(txt,12,y); y+=24;
  }
  if(game.mult>1){
    ctx.font='bold 17px Arial';
    ctx.fillStyle='#ffd700';
    const txt='2× SCORE! '+Math.ceil(game.multTimer)+'s';
    ctx.strokeText(txt,12,y); ctx.fillText(txt,12,y);
  }

  let hearts='';
  for(let i=0;i<game.maxHp;i++) hearts += i<game.hp ? '❤️' : '🖤';
  ctx.font='20px Arial';
  ctx.fillStyle='#fff';
  ctx.fillText(hearts,10,H-28);

  ctx.textAlign='right';
  ctx.font='13px Arial';
  ctx.fillStyle='#888';
  const tt=fmtTime(state.playTime)+' / '+fmtTime(state.totalTime);
  ctx.strokeText(tt,W-12,10); ctx.fillText(tt,W-12,10);
  ctx.font='11px Arial';
  ctx.fillStyle='#aa8';
  ctx.strokeText(state.songName,W-12,28); ctx.fillText(state.songName,W-12,28);

  const pgW=Math.min(170,W*0.28), pgH=4, pgX=W-12-pgW, pgY=46;
  ctx.fillStyle='#1a1a1a'; ctx.fillRect(pgX,pgY,pgW,pgH);
  ctx.fillStyle='#ff8800'; ctx.fillRect(pgX,pgY,pgW*(state.totalTime?state.playTime/state.totalTime:0),pgH);
  ctx.fillStyle='#666';
  ctx.fillText(`${game.collected}/${game.totalCollectibles} blocks`,W-12,pgY+10);

  if(state.playTime<5){
    ctx.globalAlpha=1-state.playTime/5;
    ctx.textAlign='center';
    ctx.font='bold 15px Arial';
    ctx.fillStyle='rgba(255,180,80,.9)';
    ctx.fillText('← Swipe or Arrow Keys to move →',W/2,roadGeom().py+45);
    ctx.globalAlpha=1;
  }
}
function renderPlay(){
  ctx.save();
  if(game.shake>0) ctx.translate((Math.random()-0.5)*20*game.shake,(Math.random()-0.5)*20*game.shake);
  drawBackground();
  drawRoad();
  drawItems();
  drawShip();
  drawParticlesAndTexts();
  drawBottomSpectrum();
  ctx.restore();

  if(game.flash>0){
    ctx.fillStyle=`rgba(${game.flashColor},${game.flash})`;
    ctx.fillRect(0,0,W,H);
  }
  drawHUD();
}

function renderLoading(){
  ctx.fillStyle='#040412'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.font='bold 20px Arial'; ctx.fillStyle='#f90';
  ctx.fillText(state.loadMsg||'Loading...',W/2,H*0.38);

  const bw=Math.min(300,W*0.7), bh=12, bx=W/2-bw/2, by=H*0.48;
  ctx.fillStyle='#1a1a2a'; rrPath(bx,by,bw,bh,6); ctx.fill();
  ctx.fillStyle='#f80'; rrPath(bx,by,bw*Math.max(0.01,state.loadProg),bh,6); ctx.fill();
  ctx.strokeStyle='#f80'; ctx.lineWidth=1; rrPath(bx,by,bw,bh,6); ctx.stroke();

  ctx.font='12px Arial'; ctx.fillStyle='#667';
  ctx.fillText(Math.floor(state.loadProg*100)+'%',W/2,by+18);

  ctx.strokeStyle='#f80'; ctx.lineWidth=3;
  ctx.beginPath();
  ctx.arc(W/2,H*0.28,16,performance.now()*0.004,performance.now()*0.004+Math.PI*1.2);
  ctx.stroke();
}
function renderResults(){
  drawBackground();

  ctx.textAlign='center'; ctx.textBaseline='top';
  const fs=Math.min(34,W*0.065);
  ctx.font=`bold ${fs}px Arial`;
  ctx.lineWidth=4; ctx.strokeStyle='#000';
  ctx.fillStyle=state.died?'#ff4444':'#ff8800';
  const title=state.died?'GAME OVER':'RIDE COMPLETE';
  ctx.strokeText(title,W/2,H*0.09);
  ctx.fillText(title,W/2,H*0.09);

  ctx.font='12px Arial'; ctx.fillStyle='#778';
  ctx.fillText(state.songName,W/2,H*0.09+fs+6);

  const sy=H*0.23;
  ctx.font=`bold ${Math.min(28,W*0.054)}px Arial`;
  ctx.fillStyle='#fff';
  ctx.strokeText('Score: '+Math.floor(game.score),W/2,sy);
  ctx.fillText('Score: '+Math.floor(game.score),W/2,sy);

  ctx.font='16px Arial'; ctx.fillStyle='#aab';
  const pct=game.totalCollectibles?Math.floor(game.collected/game.totalCollectibles*100):0;
  ctx.fillText(`Blocks: ${game.collected} / ${game.totalCollectibles} (${pct}%)`,W/2,sy+34);
  ctx.fillText(`Max Combo: ${game.maxCombo}x`,W/2,sy+56);
  if(state.died){
    ctx.fillStyle='#f66';
    ctx.fillText('Health depleted!',W/2,sy+78);
  }
  if(Math.floor(game.score)>=state.high && game.score>0){
    ctx.fillStyle='#FFD700';
    ctx.font='bold 17px Arial';
    ctx.fillText('★ NEW BEST! ★',W/2,sy+(state.died?100:80));
  }

  let rating='D', rc='#f55';
  if(pct>=90){rating='S★'; rc='#FFD700'}
  else if(pct>=75){rating='A'; rc='#0f8'}
  else if(pct>=60){rating='B'; rc='#0af'}
  else if(pct>=40){rating='C'; rc='#fa0'}
  const rY=sy+(state.died?130:112);
  ctx.font=`bold ${Math.min(46,W*0.088)}px Arial`;
  ctx.fillStyle=rc; ctx.strokeStyle='#000';
  ctx.strokeText(rating,W/2,rY); ctx.fillText(rating,W/2,rY);

  const bW=Math.min(240,W*0.55), bH=Math.min(42,H*0.052), by=rY+30;
  drawButton(W/2-bW/2,by,bW,bH,'▶  PLAY AGAIN','#4a2200','#ff8800','rp');
  drawButton(W/2-bW/2,by+bH+10,bW,bH,'🏠  MAIN MENU','#1a1a45','#6666cc','hm');
}

function render(){
  ctx.clearRect(0,0,W,H);
  if(state.mode==='menu') renderMenu();
  else if(state.mode==='loading') renderLoading();
  else if(state.mode==='play') renderPlay();
  else if(state.mode==='results') renderResults();
}

async function startBuiltIn(which){
  state.mode='loading';
  state.loadProg=0;
  try{
    ensureAudio();
    let buf,name;
    if(which===1){
      name='Smoke Signal';
      buf=await genSmokeSignal();
    }else{
      name='Basique Groove';
      buf=await genBasiqueGroove();
    }
    startFromBuffer(buf,name);
  }catch(err){
    state.loadMsg='Error: '+err.message;
    setTimeout(()=>state.mode='menu',1500);
  }
}
async function handleUpload(file){
  try{
    ensureAudio();
    state.mode='loading';
    state.loadMsg='Decoding audio...';
    state.loadProg=0.2;
    const ab=await file.arrayBuffer();
    state.loadProg=0.45;
    const buf=await actx.decodeAudioData(ab.slice(0));
    state.loadProg=0.8;
    const name=file.name.replace(/\.[^.]+$/,'');
    startFromBuffer(buf,name);
  }catch(err){
    state.loadMsg='Error: '+err.message;
    setTimeout(()=>state.mode='menu',1500);
  }
}

function handlePointer(x,y){
  if(state.mode==='menu'){
    if(hitBtn(x,y,'s1')) startBuiltIn(1);
    else if(hitBtn(x,y,'s2')) startBuiltIn(2);
    else if(hitBtn(x,y,'upl')) fileInput.click();
  }else if(state.mode==='results'){
    if(hitBtn(x,y,'rp') && currentBuffer) startFromBuffer(currentBuffer,state.songName);
    else if(hitBtn(x,y,'hm')) state.mode='menu';
  }
}

addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(state.mode==='play'){
    if(e.code==='ArrowLeft'||e.code==='KeyA') game.playerLane=clamp(game.playerLane-1,0,2);
    if(e.code==='ArrowRight'||e.code==='KeyD') game.playerLane=clamp(game.playerLane+1,0,2);
  }
  e.preventDefault();
});
addEventListener('keyup',e=>{ keys[e.code]=false; e.preventDefault(); });

canvas.addEventListener('click',e=>{
  const r=canvas.getBoundingClientRect();
  handlePointer(e.clientX-r.left,e.clientY-r.top);
});

canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.changedTouches[0];
  const r=canvas.getBoundingClientRect();
  if(state.mode==='play'){
    touchStartX=t.clientX;
  }else{
    handlePointer(t.clientX-r.left,t.clientY-r.top);
  }
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(state.mode!=='play' || touchStartX===null) return;
  const t=e.changedTouches[0];
  const dx=t.clientX-touchStartX;
  if(Math.abs(dx)>CFG.TOUCH_SWIPE){
    if(dx>0) game.playerLane=clamp(game.playerLane+1,0,2);
    else game.playerLane=clamp(game.playerLane-1,0,2);
    touchStartX=t.clientX;
  }
},{passive:false});
canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  if(state.mode==='play' && touchStartX!==null){
    const t=e.changedTouches[0];
    const dx=t.clientX-touchStartX;
    if(Math.abs(dx)>CFG.TOUCH_SWIPE){
      if(dx>0) game.playerLane=clamp(game.playerLane+1,0,2);
      else game.playerLane=clamp(game.playerLane-1,0,2);
    }
  }
  touchStartX=null;
},{passive:false});
canvas.addEventListener('touchcancel',e=>{
  e.preventDefault();
  touchStartX=null;
},{passive:false});

fileInput.addEventListener('change',e=>{
  const f=e.target.files[0];
  if(f) handleUpload(f);
  fileInput.value='';
});

let last=0;
function loop(ts){
  if(!last) last=ts;
  const dt=Math.min(CFG.MAX_DT,(ts-last)/1000);
  last=ts;
  updateGame(dt);
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
