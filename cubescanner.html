<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CuberScan Pro v2.1</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cubejs/lib/cube.min.js"></script>
    <style>
        :root { 
            --accent: #00ff88; --bg: #050505; --panel: #121214; --text: #ffffff;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        /* Bulletproof Mobile Lock */
        body, html { 
            font-family: -apple-system, system-ui, sans-serif; 
            margin: 0; padding: 0; background: var(--bg); color: var(--text);
            /* Sperrt den Screen, verhindert Gummiband-Scrollen im Opera/Android */
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* --- STRIKTE HIERARCHIE --- */
        
        /* 1. Header (Fixe 60px) */
        header { 
            flex: 0 0 60px; padding: 0 20px; display: flex; 
            justify-content: space-between; align-items: center; 
            background: var(--panel); border-bottom: 1px solid #222; z-index: 10;
        }

        /* 2. Mittlerer Bereich (Nimmt exakt den restlichen Platz ein) */
        main {
            flex: 1 1 auto;
            display: flex; flex-direction: column;
            overflow: hidden; /* Nichts darf hier ausbrechen */
        }

        /* 2a. Scanner-Bereich (Maximal 45% der restlichen Höhe) */
        #scanner-wrapper {
            flex: 0 0 45%; 
            display: flex; justify-content: center; align-items: center;
            background: #000; position: relative; padding: 10px;
        }

        .video-box {
            height: 100%; max-width: 100%; aspect-ratio: 1/1; 
            position: relative; border-radius: 12px; overflow: hidden;
        }

        video { height: 100%; width: 100%; object-fit: cover; }
        
        #roi-grid {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 75%; height: 75%; display: grid;
            grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr);
            border: 2px solid var(--accent); border-radius: 8px;
            box-shadow: 0 0 0 2000px rgba(0,0,0,0.5); pointer-events: none;
        }
        .roi-cell { border: 0.5px solid rgba(0, 255, 136, 0.3); }

        .live-preview {
            position: absolute; top: 10px; right: 10px; width: 45px; height: 45px;
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; z-index: 5;
        }
        .dot { background: #333; border-radius: 1px; }

        /* 2b. Info Text (Fixe Größe, bricht nicht um) */
        #info-section {
            flex: 0 0 50px; display: flex; flex-direction: column; justify-content: center;
            align-items: center; background: #1a1a1e; border-top: 1px solid #333;
        }
        .instruction-title { color: var(--accent); font-weight: bold; font-size: 1rem; margin: 0; }
        .instruction-help { font-size: 0.8rem; color: #aaa; margin: 2px 0 0; }

        /* 2c. 3D Würfel (Nimmt den verbleibenden Platz in 'main' ein) */
        #visualizer-section {
            flex: 1 1 auto; position: relative; background: var(--bg); min-height: 80px;
        }
        #canvas3d { width: 100%; height: 100%; outline: none; }

        /* 3. Footer / Buttons (Absolut sicher am Boden verankert) */
        footer {
            flex: 0 0 auto; 
            display: flex; justify-content: center; align-items: center; gap: 15px; 
            /* env() berücksichtigt die Gesten-Balken unten auf modernen Androids */
            padding: 15px 15px calc(15px + env(safe-area-inset-bottom)); 
            background: var(--panel); border-top: 1px solid #222; z-index: 10;
        }

        button {
            flex: 1; max-width: 200px; height: 50px; border-radius: 12px; border: none;
            font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.1s;
        }
        #btn-scan { background: var(--accent); color: #000; box-shadow: 0 4px 15px rgba(0, 255, 136, 0.2); }
        #btn-reset { background: #222; color: #fff; border: 1px solid #444; }
        button:active { transform: scale(0.95); opacity: 0.8; }
        button:disabled { background: #333; color: #666; box-shadow: none; pointer-events: none; }

    </style>
</head>
<body>

<header>
    <div style="font-weight: 800; font-size: 1.2rem; letter-spacing: -0.5px;">CUBER<span style="color:var(--accent)">SCAN</span></div>
    <div id="badge" style="font-size: 0.75rem; border: 1px solid var(--accent); padding: 4px 10px; border-radius: 12px;">Face 1/6</div>
</header>

<main>
    <div id="scanner-wrapper">
        <div class="video-box">
            <video id="video" autoplay playsinline></video>
            <div id="roi-grid">
                <div class="roi-cell"></div><div class="roi-cell"></div><div class="roi-cell"></div>
                <div class="roi-cell"></div><div class="roi-cell"></div><div class="roi-cell"></div>
                <div class="roi-cell"></div><div class="roi-cell"></div><div class="roi-cell"></div>
            </div>
            <div class="live-preview" id="live-dots">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
        </div>
    </div>

    <div id="info-section">
        <p class="instruction-title" id="step-name">Initialisierung...</p>
        <p class="instruction-help" id="step-help">Kamera wird gestartet</p>
    </div>

    <div id="visualizer-section">
        <div id="canvas3d"></div>
    </div>
</main>

<footer>
    <button id="btn-reset" onclick="resetScan()">RESET</button>
    <button id="btn-scan" onclick="captureFace()">SCAN FACE</button>
</footer>

<canvas id="proc-canvas" width="300" height="300" style="display:none"></canvas>

<script>
// --- LOGIC BLEIBT UNVERÄNDERT ZUR VORHERIGEN PRO-VERSION ---
const STEPS = [
    { id: 'U', name: 'OBEN (Weiß)', help: 'Weiß oben, Grün vorne', color: 'white' },
    { id: 'R', name: 'RECHTS (Rot)', help: 'Weiß oben, Rot vorne', color: 'red' },
    { id: 'F', name: 'VORNE (Grün)', help: 'Weiß oben, Grün vorne', color: 'green' },
    { id: 'D', name: 'UNTEN (Gelb)', help: 'Grün oben, Gelb vorne', color: 'yellow' },
    { id: 'L', name: 'LINKS (Orange)', help: 'Weiß oben, Orange vorne', color: 'orange' },
    { id: 'B', name: 'HINTEN (Blau)', help: 'Weiß oben, Blau vorne', color: 'blue' }
];

const COLORS_3D = { 'U': 0xffffff, 'R': 0xff3b30, 'F': 0x4cd964, 'D': 0xffdd00, 'L': 0xff9500, 'B': 0x007aff };

let currentStep = 0;
let rawScanData = []; 
let centerAnchors = {}; 
let liveRGB = [];

let scene, camera, renderer, cubeGroup;

function init3D() {
    scene = new THREE.Scene();
    const container = document.getElementById('visualizer-section');
    // Nutze exakte Container-Maße, um Verzerrungen zu vermeiden
    const width = container.clientWidth;
    const height = container.clientHeight || 150; // Fallback Höhe
    
    camera = new THREE.PerspectiveCamera(40, width / height, 0.1, 100);
    camera.position.set(4.5, 4.5, 5);

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(width, height);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Bessere Performance auf Handys
    document.getElementById('canvas3d').appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.enablePan = false;
    controls.enableZoom = false; // Verhindert ungewolltes Zoomen beim Wischen
    controls.autoRotate = true;
    controls.autoRotateSpeed = 1.0;

    cubeGroup = new THREE.Group();
    const geom = new THREE.BoxGeometry(0.95, 0.95, 0.95);
    for(let x=-1; x<=1; x++){
        for(let y=-1; y<=1; y++){
            for(let z=-1; z<=1; z++){
                const mats = Array(6).fill(new THREE.MeshBasicMaterial({ color: 0x181818 }));
                const mesh = new THREE.Mesh(geom, mats);
                mesh.position.set(x, y, z);
                mesh.userData = { pos: [x,y,z] };
                cubeGroup.add(mesh);
            }
        }
    }
    scene.add(cubeGroup);
    
    // Resize Event Listener für den Fall, dass das Gerät gedreht wird
    window.addEventListener('resize', () => {
        const w = container.clientWidth;
        const h = container.clientHeight;
        renderer.setSize(w, h);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
    });

    animate();
}

function animate() {
    requestAnimationFrame(animate);
    if(renderer) renderer.render(scene, camera);
}

async function initCamera() {
    const video = document.getElementById('video');
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "environment" } // Auto-Fokus entfernt, da Opera da manchmal zickt
        });
        video.srcObject = stream;
        updateStepUI();
        requestAnimationFrame(analyzeLive);
    } catch(e) {
        document.getElementById('step-name').innerText = "Kamera-Fehler";
        document.getElementById('step-help').innerText = "Bitte Berechtigung erteilen.";
    }
}

function analyzeLive() {
    const canvas = document.getElementById('proc-canvas');
    const ctx = canvas.getContext('2d');
    const video = document.getElementById('video');
    
    if (video.videoWidth > 0) {
        // Berechne den korrekten Square-Crop aus der Mitte des Videos
        const size = Math.min(video.videoWidth, video.videoHeight);
        const startX = (video.videoWidth - size) / 2;
        const startY = (video.videoHeight - size) / 2;
        
        ctx.drawImage(video, startX, startY, size, size, 0, 0, 300, 300);
        
        const dots = document.querySelectorAll('.dot');
        const step = 300 / 3;
        const offset = step / 2;

        liveRGB = [];
        for(let i=0; i<9; i++) {
            let x = i % 3; let y = Math.floor(i / 3);
            const data = ctx.getImageData(x*step + offset - 10, y*step + offset - 10, 20, 20).data;
            let r=0, g=0, b=0;
            for(let j=0; j<data.length; j+=4) { r+=data[j]; g+=data[j+1]; b+=data[j+2]; }
            const rgb = { r: r/100, g: g/100, b: b/100 };
            liveRGB.push(rgb);
            dots[i].style.background = `rgb(${rgb.r},${rgb.g},${rgb.b})`;
        }
    }
    requestAnimationFrame(analyzeLive);
}

function updateStepUI() {
    const s = STEPS[currentStep];
    document.getElementById('step-name').innerText = s.name;
    document.getElementById('step-help').innerText = s.help;
    document.getElementById('badge').innerText = `Face ${currentStep + 1}/6`;
}

function captureFace() {
    if(currentStep >= 6) return;
    
    centerAnchors[STEPS[currentStep].id] = liveRGB[4];
    rawScanData.push([...liveRGB]);
    applyFaceTo3D(STEPS[currentStep].id, liveRGB, true);

    currentStep++;
    if(currentStep === 6) {
        finalizeLogic();
    } else {
        updateStepUI();
    }
}

function finalizeLogic() {
    let cubeString = "";
    for(let f=0; f<6; f++) {
        const faceColors = rawScanData[f].map(rgb => classifyByAnchor(rgb));
        cubeString += faceColors.join('');
        applyFaceTo3D(STEPS[f].id, faceColors, false);
    }

    try {
        const sol = Cube.fromString(cubeString).solve();
        document.getElementById('step-name').innerText = "WÜRFEL BERECHNET";
        document.getElementById('step-help').innerHTML = `<b style="color:var(--accent); font-size:1.1rem; letter-spacing:1px">${sol}</b>`;
        document.getElementById('btn-scan').innerText = "FERTIG";
        document.getElementById('btn-scan').disabled = true;
    } catch(e) {
        document.getElementById('step-name').innerText = "FEHLER";
        document.getElementById('step-help').innerText = "Scan unlogisch. Bitte Reset drücken.";
        document.getElementById('step-name').style.color = "#ff3b30";
    }
}

function classifyByAnchor(rgb) {
    let minDist = Infinity;
    let best = 'U';
    for(const [id, ref] of Object.entries(centerAnchors)) {
        // Leicht verbesserte Gewichtung für Rot/Orange-Erkennung bei schlechtem Licht
        const d = Math.sqrt(
            2 * Math.pow(rgb.r-ref.r,2) + 
            3 * Math.pow(rgb.g-ref.g,2) + 
            1.5 * Math.pow(rgb.b-ref.b,2)
        );
        if(d < minDist) { minDist = d; best = id; }
    }
    return best;
}

function applyFaceTo3D(faceId, data, isRaw) {
    cubeGroup.children.forEach(piece => {
        const [px, py, pz] = piece.userData.pos;
        const setMaterial = (sideIdx, stickerIdx) => {
            const val = isRaw ? `rgb(${Math.round(data[stickerIdx].r)},${Math.round(data[stickerIdx].g)},${Math.round(data[stickerIdx].b)})` : COLORS_3D[data[stickerIdx]];
            piece.material[sideIdx].color.set(val);
        };
        const g = (x, y) => x + y * 3;
        if(faceId === 'U' && py === 1)  setMaterial(2, g(px+1, pz+1));
        if(faceId === 'D' && py === -1) setMaterial(3, g(px+1, 2-(pz+1)));
        if(faceId === 'F' && pz === 1)  setMaterial(4, g(px+1, 2-(py+1)));
        if(faceId === 'B' && pz === -1) setMaterial(5, g(2-(px+1), 2-(py+1)));
        if(faceId === 'L' && px === -1) setMaterial(1, g(pz+1, 2-(py+1)));
        if(faceId === 'R' && px === 1)  setMaterial(0, g(2-(pz+1), 2-(py+1)));
    });
}

function resetScan() { location.reload(); }

window.onload = () => { 
    init3D(); 
    initCamera(); 
};
</script>
</body>
</html>
