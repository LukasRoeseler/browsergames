<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gemini Cube Pro Fix</title>
    <style>
        :root { --bg: #2c3e50; --panel: #34495e; }
        * { touch-action: manipulation; user-select: none; box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* Layout */
        #top-bar { padding: 10px; display: flex; justify-content: space-between; background: rgba(0,0,0,0.3); z-index: 10; }
        #main-container { flex: 1; display: flex; position: relative; justify-content: center; align-items: center; overflow: hidden; }
        
        /* Cube 3D */
        .scene { width: 180px; height: 180px; perspective: 1000px; z-index: 5; }
        .cube { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transform: rotateX(-20deg) rotateY(-30deg); }
        .face { position: absolute; width: 180px; height: 180px; display: grid; gap: 2px; padding: 2px; background: #000; border: 1px solid #000; }
        
        /* Faces Positions */
        .f { transform: translateZ(90px); } .b { transform: rotateY(180deg) translateZ(90px); }
        .u { transform: rotateX(90deg) translateZ(90px); } .d { transform: rotateX(-90deg) translateZ(90px); }
        .l { transform: rotateY(-90deg) translateZ(90px); } .r { transform: rotateY(90deg) translateZ(90px); }
        
        .sticker { border-radius: 3px; width: 100%; height: 100%; }
        .white { background: #fff; } .yellow { background: #ff0; } .green { background: #0f0; }
        .blue { background: #00f; } .orange { background: #f90; } .red { background: #f00; }

        /* Shadow/Ghost View */
        #shadow-wall { position: absolute; display: flex; gap: 15px; opacity: 0.4; bottom: 20px; pointer-events: none; }
        .mini-face { display: grid; gap: 1px; background: #000; padding: 1px; width: 60px; height: 60px; }

        /* Controls */
        #controls { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; padding: 15px; background: var(--panel); }
        button { padding: 12px 2px; border: none; border-radius: 6px; background: #546e7a; color: white; font-weight: bold; cursor: pointer; }
        button:active { background: #3498db; transform: scale(0.95); }
        .wide { grid-column: span 3; background: #27ae60; }
        
        #menu { position: absolute; top: 50px; right: 10px; background: #2c3e50; border: 1px solid #7f8c8d; padding: 15px; display: none; z-index: 20; border-radius: 8px; }

        @media (orientation: landscape) {
            body { flex-direction: row; }
            #controls { width: 220px; height: 100%; grid-template-columns: repeat(2, 1fr); }
            #shadow-wall { right: 20px; flex-direction: column; bottom: auto; top: 50%; transform: translateY(-50%); }
        }
    </style>
</head>
<body>

    <div id="top-bar">
        <div id="scramble-info">Petrus Sub-20 Mode</div>
        <button onclick="toggleMenu()">Options ⚙️</button>
    </div>

    <div id="main-container">
        <div id="shadow-wall">
            <div id="shadow-b" class="mini-face"></div>
            <div id="shadow-l" class="mini-face"></div>
            <div id="shadow-d" class="mini-face"></div>
        </div>

        <div class="scene">
            <div class="cube" id="cube-visual">
                <div class="face u" id="face-u"></div>
                <div class="face d" id="face-d"></div>
                <div class="face f" id="face-f"></div>
                <div class="face b" id="face-b"></div>
                <div class="face l" id="face-l"></div>
                <div class="face r" id="face-r"></div>
            </div>
        </div>
    </div>

    <div id="menu">
        <button onclick="changeType(2)">2x2</button>
        <button onclick="changeType(3)">3x3</button>
        <p><small>Swipe zum Drehen der Ansicht</small></p>
    </div>

    <div id="controls">
        <button class="wide" onclick="scramble()">SCRAMBLE</button>
        <button class="wide" onclick="resetCube()">SOLVE/RESET</button>
        <button onclick="handleMove('U')">U</button><button onclick="handleMove('D')">D</button>
        <button onclick="handleMove('L')">L</button><button onclick="handleMove('R')">R</button>
        <button onclick="handleMove('F')">F</button><button onclick="handleMove('B')">B</button>
        <button onclick="handleMove('U\'')">U'</button><button onclick="handleMove('D\'')">D'</button>
        <button onclick="handleMove('L\'')">L'</button><button onclick="handleMove('R\'')">R'</button>
        <button onclick="handleMove('F\'')">F'</button><button onclick="handleMove('B\'')">B'</button>
    </div>

<script>
    let size = 3;
    let cubeState = {};
    let rotX = -20, rotY = -30;

    function toggleMenu() {
        const m = document.getElementById('menu');
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
    }

    function changeType(s) {
        size = s;
        resetCube();
        toggleMenu();
    }

    function resetCube() {
        const faces = ['U','D','F','B','L','R'];
        const colors = ['white','yellow','green','blue','orange','red'];
        faces.forEach((f, i) => cubeState[f] = Array(size*size).fill(colors[i]));
        render();
    }

    function render() {
        ['u','d','f','b','l','r'].forEach(f => {
            const el = document.getElementById(`face-${f}`);
            el.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
            el.innerHTML = cubeState[f.toUpperCase()].map(c => `<div class="sticker ${c}"></div>`).join('');
            
            // Shadow update
            const shadow = document.getElementById(`shadow-${f}`);
            if(shadow) {
                shadow.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
                shadow.innerHTML = el.innerHTML;
            }
        });
    }

    // --- Drehlogik ---
    function rotateArray(arr) {
        const newArr = new Array(size * size);
        for(let r=0; r<size; r++) {
            for(let c=0; c<size; c++) {
                newArr[c * size + (size - 1 - r)] = arr[r * size + c];
            }
        }
        return newArr;
    }

    function handleMove(m) {
        if(m.includes("'")) {
            for(let i=0; i<3; i++) executeMove(m[0]);
        } else {
            executeMove(m);
        }
        render();
    }

    function executeMove(m) {
        cubeState[m] = rotateArray(cubeState[m]);
        let s = cubeState;
        let t = [];
        const last = size - 1;

        if(m === 'U') {
            for(let i=0; i<size; i++) {
                t[i] = s.F[i];
                s.F[i] = s.R[i]; s.R[i] = s.B[i]; s.B[i] = s.L[i]; s.L[i] = t[i];
            }
        } else if(m === 'D') {
            for(let i=0; i<size; i++) {
                let idx = last * size + i;
                t[i] = s.F[idx];
                s.F[idx] = s.L[idx]; s.L[idx] = s.B[idx]; s.B[idx] = s.R[idx]; s.R[idx] = t[i];
            }
        } else if(m === 'R') {
            for(let i=0; i<size; i++) {
                let fIdx = i * size + last, bIdx = (last - i) * size;
                t[i] = s.F[fIdx];
                s.F[fIdx] = s.D[fIdx]; s.D[fIdx] = s.B[bIdx]; s.B[bIdx] = s.U[fIdx]; s.U[fIdx] = t[i];
            }
        } else if(m === 'L') {
            for(let i=0; i<size; i++) {
                let fIdx = i * size, bIdx = (last - i) * size + last;
                t[i] = s.F[fIdx];
                s.F[fIdx] = s.U[fIdx]; s.U[fIdx] = s.B[bIdx]; s.B[bIdx] = s.D[fIdx]; s.D[fIdx] = t[i];
            }
        } else if(m === 'F') {
            for(let i=0; i<size; i++) {
                t[i] = s.U[last*size + i];
                s.U[last*size + i] = s.L[(last-i)*size + last];
                s.L[(last-i)*size + last] = s.D[i];
                s.D[i] = s.R[i*size];
                s.R[i*size] = t[i];
            }
        } else if(m === 'B') {
            for(let i=0; i<size; i++) {
                t[i] = s.U[i];
                s.U[i] = s.R[i*size + last];
                s.R[i*size + last] = s.D[last*size + (last-i)];
                s.D[last*size + (last-i)] = s.L[(last-i)*size];
                s.L[(last-i)*size] = t[i];
            }
        }
    }

    // --- View Rotation ---
    let isDragging = false;
    const container = document.getElementById('main-container');
    container.addEventListener('pointerdown', () => isDragging = true);
    window.addEventListener('pointerup', () => isDragging = false);
    window.addEventListener('pointermove', (e) => {
        if(!isDragging) return;
        rotY += e.movementX * 0.6;
        rotX -= e.movementY * 0.6;
        document.getElementById('cube-visual').style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
    });

    function scramble() {
        const ms = ['U','D','L','R','F','B'];
        let seq = [];
        for(let i=0; i<15; i++) {
            let move = ms[Math.floor(Math.random()*6)];
            seq.push(move);
            handleMove(move);
        }
        document.getElementById('scramble-info').innerText = seq.join(' ');
    }

    resetCube();
</script>
</body>
</html>
