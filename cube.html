<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gemini Cube Ultra</title>
    <style>
        :root { --bg: #2c3e50; --panel: #34495e; --accent: #3498db; }
        * { touch-action: none; user-select: none; box-sizing: border-box; }
        
        body { 
            background: var(--bg); color: white; font-family: sans-serif;
            margin: 0; display: flex; flex-direction: column; height: 100vh;
        }

        /* --- Layout --- */
        #top-bar { padding: 10px; display: flex; justify-content: space-between; background: rgba(0,0,0,0.2); }
        #scramble-info { text-align: center; color: #f1c40f; font-weight: bold; padding: 5px; font-size: 0.9rem; }

        #main-container { 
            flex: 1; display: flex; position: relative; 
            flex-direction: column; align-items: center; justify-content: center;
        }

        /* --- Cube & Shadow --- */
        .scene { width: 180px; height: 180px; perspective: 1000px; position: relative; z-index: 2; }
        .cube { 
            width: 100%; height: 100%; position: relative; transform-style: preserve-3d;
            transform: rotateX(-20deg) rotateY(-30deg); transition: transform 0.1s linear;
        }

        /* Schatten-Projektion an der "Wand" */
        #shadow-wall {
            position: absolute; width: 300px; height: 300px;
            background: rgba(255,255,255,0.03); border-radius: 50%;
            display: flex; gap: 10px; justify-content: center; align-items: center;
            filter: blur(2px); pointer-events: none; z-index: 1;
        }
        .mini-face { scale: 0.4; opacity: 0.6; display: grid; gap: 2px; background: #000; padding: 2px; }

        .face { position: absolute; width: 180px; height: 180px; display: grid; gap: 2px; padding: 2px; background: #000; }
        .f { transform: translateZ(90px); } .b { transform: rotateY(180deg) translateZ(90px); }
        .u { transform: rotateX(90deg) translateZ(90px); } .d { transform: rotateX(-90deg) translateZ(90px); }
        .l { transform: rotateY(-90deg) translateZ(90px); } .r { transform: rotateY(90deg) translateZ(90px); }
        
        .sticker { border-radius: 3px; }
        .white { background: #fff; } .yellow { background: #ff0; } .green { background: #0f0; }
        .blue { background: #00f; } .orange { background: #f90; } .red { background: #f00; }

        /* --- Controls --- */
        #controls { 
            display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; 
            padding: 15px; background: var(--panel); border-radius: 20px 20px 0 0;
        }

        button { padding: 15px 2px; border: none; border-radius: 8px; background: #546e7a; color: white; font-weight: bold; }
        button:active { background: var(--accent); }
        .wide { grid-column: span 3; background: #27ae60; }

        /* --- Mobile Responsiveness --- */
        @media (orientation: landscape) {
            body { flex-direction: row; }
            #controls { width: 250px; height: 100%; grid-template-columns: repeat(2, 1fr); border-radius: 0; }
            #main-container { flex: 1; }
        }

        /* --- Options Menu --- */
        #menu { 
            position: absolute; top: 50px; right: 10px; background: #34495e; 
            padding: 15px; border-radius: 10px; display: none; z-index: 100;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="top-bar">
        <span>Gemini Cube</span>
        <button onclick="toggleMenu()" style="padding: 5px 15px;">Options ⚙️</button>
    </div>

    <div id="scramble-info">Ready to solve...</div>

    <div id="main-container">
        <div id="shadow-wall">
            <div id="shadow-b" class="mini-face"></div>
            <div id="shadow-l" class="mini-face"></div>
            <div id="shadow-d" class="mini-face"></div>
        </div>

        <div class="scene" id="touch-area">
            <div class="cube" id="cube-visual">
                <div class="face u" id="face-u"></div>
                <div class="face d" id="face-d"></div>
                <div class="face f" id="face-f"></div>
                <div class="face b" id="face-b"></div>
                <div class="face l" id="face-l"></div>
                <div class="face r" id="face-r"></div>
            </div>
        </div>
    </div>

    <div id="menu">
        <h4>Würfel-Typ</h4>
        <button onclick="changeType(2)">2x2</button>
        <button onclick="changeType(3)">3x3</button>
        <button onclick="changeType(4)">4x4</button>
        <hr>
        <label><input type="checkbox" id="showShadow" checked onchange="render()"> Schatten anzeigen</label>
    </div>

    <div id="controls">
        <button class="wide" onclick="scramble()">SCRAMBLE</button>
        <button class="wide" onclick="resetCube()">SOLVE/RESET</button>
        <button onclick="move('U')">U</button><button onclick="move('D')">D</button>
        <button onclick="move('L')">L</button><button onclick="move('R')">R</button>
        <button onclick="move('F')">F</button><button onclick="move('B')">B</button>
        <button onclick="move('U\'')">U'</button><button onclick="move('D\'')">D'</button>
        <button onclick="move('L\'')">L'</button><button onclick="move('R\'')">R'</button>
        <button onclick="move('F\'')">F'</button><button onclick="move('B\'')">B'</button>
    </div>

<script>
    let size = 3;
    let cubeState = {};
    let rotX = -20, rotY = -30;

    function toggleMenu() {
        const m = document.getElementById('menu');
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
    }

    function changeType(s) {
        size = s;
        resetCube();
        toggleMenu();
    }

    function resetCube() {
        const faces = ['U','D','F','B','L','R'];
        const colors = ['white','yellow','green','blue','orange','red'];
        faces.forEach((f, i) => cubeState[f] = Array(size*size).fill(colors[i]));
        render();
    }

    function render() {
        const faces = ['u','d','f','b','l','r'];
        faces.forEach(f => {
            const el = document.getElementById(`face-${f}`);
            el.className = `face ${f} grid-${size}`;
            el.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
            el.innerHTML = cubeState[f.toUpperCase()].map(c => `<div class="sticker ${c}"></div>`).join('');
        });

        // Schatten-Update (Back, Left, Down)
        const wall = document.getElementById('shadow-wall');
        if(document.getElementById('showShadow').checked) {
            wall.style.display = 'flex';
            ['b','l','d'].forEach(f => {
                const sEl = document.getElementById(`shadow-${f}`);
                sEl.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
                sEl.innerHTML = cubeState[f.toUpperCase()].map(c => `<div class="sticker ${c}"></div>`).join('');
            });
        } else { wall.style.display = 'none'; }
    }

    // --- Touch Control ---
    let isDragging = false;
    const area = document.getElementById('main-container');
    area.addEventListener('pointerdown', () => isDragging = true);
    window.addEventListener('pointerup', () => isDragging = false);
    window.addEventListener('pointermove', (e) => {
        if(!isDragging) return;
        rotY += e.movementX * 0.5;
        rotX -= e.movementY * 0.5;
        document.getElementById('cube-visual').style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
    });

    // --- Logic Moves (simplified for 3x3/2x2 demo) ---
    function move(m) {
        // Hier greift die Logik aus dem vorherigen Schritt
        // Zur Demo: Kurzer visueller Shake als Feedback
        const visual = document.getElementById('cube-visual');
        visual.style.transition = "none";
        setTimeout(() => visual.style.transition = "transform 0.1s", 10);
        render(); // In der echten App hier State-Rotation einfügen
    }

    function scramble() {
        const moves = ['U','R','F','L','D','B'];
        let res = [];
        for(let i=0; i<9; i++) res.push(moves[Math.floor(Math.random()*6)]);
        document.getElementById('scramble-info').innerText = res.join(' ');
        render();
    }

    resetCube();
</script>
</body>
</html>
