#portrait-lock{display:none;position:fixed;inset:0;background:#1a1a2e;color:#0ff;z-index:9999;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:20px}

<script>
const cv=document.getElementById('c'),cx=cv.getContext('2d',{alpha:false});
let W,H;
function resize(){W=innerWidth;H=innerHeight;cv.width=W*2;cv.height=H*2;cx.setTransform(2,0,0,2,0,0)}
addEventListener('resize',resize);resize();

/*═══════════════ UTILS ═══════════════*/
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function lerp(a,b,t){return a+(b-a)*t}
function hash(n){return((Math.sin(n*127.1+311.7)*43758.5453)%1+1)%1}
const hex2rgb=h=>{let v=parseInt(h.slice(1),16);return[(v>>16)&255,(v>>8)&255,v&255]};
function lerpCol(a,b,t){let ra=hex2rgb(a),rb=hex2rgb(b);return`rgb(${Math.round(lerp(ra[0],rb[0],t))},${Math.round(lerp(ra[1],rb[1],t))},${Math.round(lerp(ra[2],rb[2],t))})`}

/*═══════════════ AUDIO ENGINE ═══════════════*/
const SND={
  ctx:null,master:null,sfx:null,musBase:null,musMel:null,musBass:null,musDrum:null,
  muted:false,hubT:0,mT:0,mStarted:false,flowGain:0,

  init(){
    if(this.ctx)return;
    try{
      this.ctx=new(window.AudioContext||window.webkitAudioContext)();
      this.master=this.ctx.createGain();this.master.gain.value=.5;this.master.connect(this.ctx.destination);
      this.sfx=this.ctx.createGain();this.sfx.gain.value=.4;this.sfx.connect(this.master);
      this.musBase=this.ctx.createGain();this.musBase.gain.value=.2;this.musBase.connect(this.master);
      this.musMel=this.ctx.createGain();this.musMel.gain.value=.15;this.musMel.connect(this.master);
      this.musBass=this.ctx.createGain();this.musBass.gain.value=0;this.musBass.connect(this.master);
      this.musDrum=this.ctx.createGain();this.musDrum.gain.value=0;this.musDrum.connect(this.master);
    }catch(e){}
  },
  resume(){if(this.ctx&&this.ctx.state==='suspended')this.ctx.resume()},

  // Hub click sound - metallic tick
  hubClick(){
    if(!this.ctx||this.muted)return;
    let t=this.ctx.currentTime,o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type='square';o.frequency.setValueAtTime(2800+Math.random()*600,t);
    o.frequency.exponentialRampToValueAtTime(600,t+.009);
    g.gain.setValueAtTime(.06,t);g.gain.exponentialRampToValueAtTime(.001,t+.012);
    o.connect(g);g.connect(this.sfx);o.start(t);o.stop(t+.015);
  },
  updateHub(spd,gnd,dt){
    if(!gnd||spd<80)return;
    this.hubT-=dt;
    if(this.hubT<=0){this.hubClick();this.hubT=Math.max(.012,.2-spd*.00015)}
  },
  impact(v){
    if(!this.ctx||this.muted)return;
    let t=this.ctx.currentTime,o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type='sine';o.frequency.setValueAtTime(110,t);o.frequency.exponentialRampToValueAtTime(25,t+.15);
    g.gain.setValueAtTime(clamp(Math.abs(v)*.0004,0,.35),t);g.gain.exponentialRampToValueAtTime(.001,t+.18);
    o.connect(g);g.connect(this.sfx);o.start(t);o.stop(t+.2);
  },
  trick(){
    if(!this.ctx||this.muted)return;
    let t=this.ctx.currentTime;
    [600,900,1200].forEach((f,i)=>{let o=this.ctx.createOscillator(),g=this.ctx.createGain();
      o.type='triangle';o.frequency.value=f;let s=t+i*.04;
      g.gain.setValueAtTime(0,s);g.gain.linearRampToValueAtTime(.1,s+.02);g.gain.exponentialRampToValueAtTime(.001,s+.18);
      o.connect(g);g.connect(this.sfx);o.start(s);o.stop(s+.22)});
  },
  perfectPump(){
    if(!this.ctx||this.muted)return;
    let t=this.ctx.currentTime,o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type='sine';o.frequency.setValueAtTime(440,t);o.frequency.linearRampToValueAtTime(880,t+.08);
    g.gain.setValueAtTime(.15,t);g.gain.exponentialRampToValueAtTime(.001,t+.15);
    o.connect(g);g.connect(this.sfx);o.start(t);o.stop(t+.18);
  },
  stinger(){
    if(!this.ctx||this.muted)return;
    let t=this.ctx.currentTime;
    [523,659,784].forEach(f=>{let o=this.ctx.createOscillator(),g=this.ctx.createGain();
      o.type='triangle';o.frequency.value=f;
      g.gain.setValueAtTime(.08,t);g.gain.exponentialRampToValueAtTime(.001,t+.5);
      o.connect(g);g.connect(this.musBase);o.start(t);o.stop(t+.55)});
  },
  // Reactive music
  startMusic(){
    if(!this.ctx||this.mStarted)return;this.mStarted=true;
    this.mT=this.ctx.currentTime+.5;this.schedLoop();
  },
  schedLoop(){
    if(!this.mStarted||!this.ctx)return;
    let ct=this.ctx.currentTime;
    while(this.mT<ct+10)this.playBars();
    if(state==='play')setTimeout(()=>this.schedLoop(),4000);
  },
  playBars(){
    let BPM=68,BT=60/BPM;
    const PR=[[220,329.63,440],[174.61,261.63,349.23],[261.63,329.63,523.25],[196,293.66,392],
              [220,261.63,440],[174.61,349.23,440],[261.63,392,523.25],[196,293.66,392]];
    for(let c=0;c<PR.length;c++){
      let ct=this.mT+c*BT*4,ch=PR[c];
      // Base pad
      this.noteOn(ch[0]/2,ct,BT*4,'sine',.035,this.musBase);
      // Arpeggio melody
      for(let n=0;n<ch.length;n++){
        this.noteOn(ch[n],ct+n*BT*1.2,BT*2.8,'triangle',.06,this.musMel);
        this.noteOn(ch[n]*1.003,ct+n*BT*1.2,BT*2.5,'sine',.02,this.musMel);
      }
      // Bass layer (reactive)
      this.noteOn(ch[0]/4,ct,BT*4,'sawtooth',.04,this.musBass);
      // Drum layer (reactive) - kick
      this.drumHit(ct,80,.08);this.drumHit(ct+BT*2,80,.06);
      // Hi-hat
      for(let h=0;h<8;h++)this.hatHit(ct+h*BT*.5,.015);
    }
    this.mT+=PR.length*BT*4;
  },
  noteOn(freq,t,dur,type,vol,dest){
    if(!this.ctx||t<0)return;
    let o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+.03);
    g.gain.setValueAtTime(vol*.7,t+dur*.4);g.gain.exponentialRampToValueAtTime(.0001,t+dur);
    o.connect(g);g.connect(dest);o.start(t);o.stop(t+dur+.02);
  },
  drumHit(t,freq,vol){
    if(!this.ctx)return;
    let o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type='sine';o.frequency.setValueAtTime(freq,t);o.frequency.exponentialRampToValueAtTime(20,t+.12);
    g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(.001,t+.12);
    o.connect(g);g.connect(this.musDrum);o.start(t);o.stop(t+.15);
  },
  hatHit(t,vol){
    if(!this.ctx)return;
    let o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type='square';o.frequency.value=6000+Math.random()*2000;
    g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(.0001,t+.03);
    o.connect(g);g.connect(this.musDrum);o.start(t);o.stop(t+.04);
  },
  // Feature 12: Reactive music update
  updateReactive(flow,airborne){
    if(!this.ctx)return;
    let t=this.ctx.currentTime;
    let bassV=flow>2?.04:0, drumV=flow>3?.06:0;
    let melV=airborne?.05:.15;
    this.musBass.gain.setTargetAtTime(bassV,t,.3);
    this.musDrum.gain.setTargetAtTime(drumV,t,.3);
    this.musMel.gain.setTargetAtTime(melV,t,.2);
  },
  stopMusic(){this.mStarted=false},
  toggle(){this.muted=!this.muted;if(this.master)this.master.gain.value=this.muted?0:.5;
    document.getElementById('muteBtn').textContent=this.muted?'🔇':'🔊'}
};
document.getElementById('muteBtn').addEventListener('click',e=>{e.stopPropagation();SND.init();SND.toggle()});

/*═══════════════ BIOMES ═══════════════*/
const BIOMES=[
  {name:"Forest",grass:"#5BAF4A",dirt:"#5B3320",skyT:"#2255AA",skyB:"#88DDEE",wx:"leaves",bg:"trees"},
  {name:"Desert",grass:"#DDAA44",dirt:"#AA7744",skyT:"#CC6600",skyB:"#FFD080",wx:"sand",bg:"cacti"},
  {name:"Snow",grass:"#E0E8F0",dirt:"#778899",skyT:"#224488",skyB:"#AADDFF",wx:"snow",bg:"pines"},
  {name:"Beach",grass:"#FFD866",dirt:"#CC7733",skyT:"#0066AA",skyB:"#44CCDD",wx:"none",bg:"palms"},
  {name:"City",grass:"#999",dirt:"#555",skyT:"#334455",skyB:"#99AABB",wx:"rain",bg:"city"}
];
function getBiome(x){
  let c=18000,total=c*BIOMES.length,pos=((x%total)+total)%total;
  let i=Math.floor(pos/c),ni=(i+1)%BIOMES.length,blend=(pos%c)/c;
  let t=clamp((blend-.8)*5,0,1),b1=BIOMES[i],b2=BIOMES[ni];
  return{name:t<.5?b1.name:b2.name,grass:lerpCol(b1.grass,b2.grass,t),dirt:lerpCol(b1.dirt,b2.dirt,t),
    skyT:lerpCol(b1.skyT,b2.skyT,t),skyB:lerpCol(b1.skyB,b2.skyB,t),wx:t<.5?b1.wx:b2.wx,bg:t<.5?b1.bg:b2.bg}
}
function isCityZone(x){let c=18000,pos=((x%(c*5))+(c*5))%(c*5);return Math.floor(pos/c)===4}

/*═══════════════ FEATURE 10: TIME OF DAY ═══════════════*/
function getTimeOfDay(dist){
  let d=dist/100; // meters
  const keys=[
    {d:0,t:'#FF8855',b:'#FFCC88'},{d:50,t:'#FF7744',b:'#FFB866'},
    {d:150,t:'#2255BB',b:'#88DDFF'},{d:300,t:'#CC6633',b:'#FFAA66'},
    {d:400,t:'#883355',b:'#DD5544'},{d:500,t:'#111133',b:'#223355'},
    {d:700,t:'#111133',b:'#223355'},{d:800,t:'#FF8855',b:'#FFCC88'}
  ];
  d=d%800;
  for(let i=0;i<keys.length-1;i++){
    if(d>=keys[i].d&&d<keys[i+1].d){
      let t2=(d-keys[i].d)/(keys[i+1].d-keys[i].d);
      return{t:lerpCol(keys[i].t,keys[i+1].t,t2),b:lerpCol(keys[i].b,keys[i+1].b,t2),night:d>450&&d<750}
    }
  }
  return{t:keys[0].t,b:keys[0].b,night:false}
}

/*═══════════════ FEATURE 11: TERRAIN CACHE ═══════════════*/
const tCache=new Map();
function clearCache(){tCache.clear()}

/*═══════════════ FEATURE 5: TERRAIN SEGMENTS ═══════════════*/
function segOff(x){
  if(x<10000)return 0;
  let zs=1800,zone=Math.floor(x/zs),local=(x%zs)/zs;
  let h=hash(zone*137+42);
  if(h<.35)return 0;
  let env=local<.12?local/.12:local>.88?(1-local)/.12:1;
  env=env*env*(3-2*env);
  let diff=clamp((x-8000)/30000,0,3),amp=55+diff*35;
  let type=Math.floor(h*7)%7;
  switch(type){
    case 0:return-env*(local<.25?Math.sin(local/.25*Math.PI)*amp:local<.5?amp:local<.6?amp*(1-(local-.5)*10):local<.8?-amp*.2:Math.sin((local-.8)/.2*Math.PI)*amp*.3);
    case 1:return-env*Math.sin(local*Math.PI*4)*amp*.55;
    case 2:return local<.4?-env*Math.sin(local/.4*Math.PI)*amp*.5:env*amp*.35*clamp((local-.4)/.15,0,1);
    case 3:return-env*Math.sin(local*Math.PI*6)*amp*.35;
    case 4:return local<.35?-env*Math.sin(local/.35*Math.PI*.5)*amp:-env*amp*Math.cos((local-.35)/.65*Math.PI*.5);
    case 5:return local<.5?-env*Math.sin(local/.5*Math.PI)*amp*.6:-env*amp*.7;
    default:return-env*Math.sin(local*Math.PI)*amp*1.1;
  }
}

/*═══════════════ TERRAIN ═══════════════*/
function tY(x){
  let key=Math.round(x/3)*3;
  if(tCache.has(key))return tCache.get(key);
  let y=350;
  if(x<8000){let t=x/8000;t=t*t*(3-2*t);y+=t*1500;y-=Math.sin(x*.001)*25*t;
  }else{
    y+=1500+(x-8000)*.025;
    let diff=clamp((x-8000)/30000,0,3),base=.3+diff*.7;
    y-=Math.sin(x*.0012)*(170*base)+Math.sin(x*.0035)*(85*base)+Math.sin(x*.009)*(40*base);
    if(diff>1)y-=Math.sin(x*.018)*(18*(diff-1));
    if(diff>2)y-=Math.sin(x*.03)*(12*(diff-2));
    if(isCityZone(x))y-=Math.sin(x*.025)*22;
    y-=segOff(x);
  }
  tCache.set(key,y);if(tCache.size>4000){let mn=key-6000;for(let[k]of tCache)if(k<mn){tCache.delete(k);break}}
  return y;
}
function tA(x){return Math.atan2(tY(x+2)-tY(x-2),4)}
function tCurv(x){return(tY(x+8)-2*tY(x)+tY(x-8))/64}
function normA(a){while(a>Math.PI)a-=Math.PI*2;while(a<-Math.PI)a+=Math.PI*2;return a}

/*═══════════════ FEATURE 7: COLLECTIBLES ═══════════════*/
const collSet=new Set();
const COLL_SP=280;
function collAt(slot){
  let h=hash(slot*73+31);
  if(h<.5)return null;
  let cx=slot*COLL_SP+COLL_SP/2,ty=tY(cx),ht=45+h*90;
  return{x:cx,y:ty-ht,type:h>.82?'star':'ring'}
}

/*═══════════════ FEATURE 8: GHOST REPLAY ═══════════════*/
let ghostRec=[],ghostBest=null,ghostTimer=0;
try{let g=localStorage.getItem('dhr_ghost');if(g)ghostBest=JSON.parse(g)}catch(e){}

/*═══════════════ GAME DATA ═══════════════*/
const GRV=1100,MIN_SPD=300;
const CHARS=[
  {name:"Rookie",col:"#4488FF",mass:1,size:1,desc:"Balanced",s1:3,s2:3,s3:3},
  {name:"Heavy",col:"#FF4466",mass:1.3,size:1.15,desc:"Momentum",s1:4,s2:2,s3:2},
  {name:"Grom",col:"#44DD66",mass:.72,size:.82,desc:"Big air",s1:2,s2:5,s3:4}
];
const BIKES=[
  {name:'20" BMX',col:"#FFD733",agil:5,spd:1800,wr:11,desc:"Fast spin",s1:5,s2:2,s3:4},
  {name:'24" Cruiser',col:"#AA66FF",agil:3.5,spd:1950,wr:13,desc:"All round",s1:3,s2:3,s3:3},
  {name:'DH MTB',col:"#FF6600",agil:2.2,spd:2200,wr:16,desc:"Top speed",s1:2,s2:5,s3:2}
];

let state='menu',selC=0,selB=0,best=+localStorage.getItem('dhr_best2')||0;
let p={},cam={x:0,y:0,zoom:1,shakeX:0,shakeY:0};
let particles=[],ftx=[],wPts=[],speedLines=[],afterimages=[];
let keys={},tPump=false,tSpin=false,tiltLean=0,tiltOn=false,swpS=null;
let gpLean=0,gpPump=false,gpSpin=false;
let menuAnim=0,menuRects={},goRects={};
let prevPump=false,hitStop=0,timeScale=1;

// Feature 6: Flow multiplier
let flow=1,flowDisplay=1,flowDecay=0;

function initP(){
  let c=CHARS[selC],b=BIKES[selB];
  p={x:100,y:tY(100),vx:MIN_SPD,vy:0,spd:MIN_SPD,ang:tA(100),av:0,
    gnd:true,airT:0,mass:c.mass,size:c.size,colC:c.col,
    agil:b.agil,maxS:b.spd,wr:b.wr,colB:b.col,
    sc:0,dist:0,cmb:1,jSc:0,spins:0,tRot:0,
    trk:null,trkPts:0,trkT:0,trkP:0,wobble:0,wobbleT:0,
    collectedStars:0,collectedRings:0};
  cam={x:p.x,y:p.y-100,zoom:1,shakeX:0,shakeY:0};
  particles=[];ftx=[];speedLines=[];afterimages=[];
  flow=1;flowDisplay=1;flowDecay=0;hitStop=0;timeScale=1;
  collSet.clear();clearCache();
  ghostRec=[];ghostTimer=0;
  wPts=[];for(let i=0;i<80;i++)wPts.push({x:Math.random()*W,y:Math.random()*H,s:1+Math.random()*2,o:.3+Math.random()*.5});
}

/*═══════════════ UPDATE ═══════════════*/
function update(realDt){
  if(state!=='play')return;

  // Feature 8: Hit-stop
  if(hitStop>0){hitStop-=realDt;return}

  pollGamepad();

  // Feature 9: Slow-mo in big air
  timeScale=1;
  if(!p.gnd&&p.airT>1.5)timeScale=Math.max(.55,1-(p.airT-1.5)*.18);
  let dt=realDt*timeScale;

  let pump=keys.Space||tPump||gpPump;
  let spin=keys.KeyZ||tSpin||gpSpin;
  let lean=(keys.ArrowRight||keys.KeyL?1:0)-(keys.ArrowLeft||keys.KeyJ?1:0)+tiltLean+gpLean;
  lean=clamp(lean,-2,2);

  let pumpJust=pump&&!prevPump;prevPump=pump;

  // Tricks
  if(!p.trk&&!p.gnd){
    if(keys.KeyW)sTrk('No-Hander',100);
    else if(keys.KeyS)sTrk('Tailwhip',150);
    else if(keys.KeyA)sTrk('Tabletop',120);
    else if(keys.KeyD)sTrk('Turndown',130);
    else if(keys.KeyQ)sTrk('Barspin',100);
    else if(keys.KeyE)sTrk('X-Up',80);
  }

  if(p.trk){
    p.trkT+=dt*1.5;
    p.trkP=p.trkT<=.5?p.trkT*2:1-((p.trkT-.5)*2);
    if(p.trkT>=1){
      aScr(Math.floor(p.trkPts*flow),p.trk+'!');
      p.trk=null;p.trkP=0;SND.trick();
      flow+=1;hitStop=.035; // Feature 8: hit-stop
    }
  }

  // Wobble decay (Feature 3)
  if(p.wobble>0){p.wobbleT+=dt*18;p.wobble*=.92;if(p.wobble<.01)p.wobble=0}

  if(p.gnd){
    p.airT=0;
    let a=tA(p.x),slope=Math.sin(a);
    let df=pump?2.8:.85;

    // Feature 1: Perfect pump timing
    if(pumpJust){
      let curv=tCurv(p.x);
      if(curv>.006&&slope>.03){
        p.spd+=280;flow+=.5;
        spTxt('PERFECT!',p.x,p.y-85,'#ff0');
        SND.perfectPump();
        for(let i=0;i<6;i++)particles.push({x:p.x+(Math.random()-.5)*30,y:p.y-10,
          vx:(Math.random()-.5)*60,vy:-Math.random()*100-30,life:.4+Math.random()*.3,ml:.7,r:3,c:'#FFD700'});
      }
    }

    p.spd+=GRV*slope*df*dt;
    p.spd*=.9992;
    if(p.spd<MIN_SPD)p.spd+=(MIN_SPD-p.spd)*4*dt;
    if(p.spd>p.maxS)p.spd=p.maxS;

    p.vx=Math.cos(a)*p.spd;p.vy=Math.sin(a)*p.spd;
    p.x+=p.vx*dt;p.y=tY(p.x);p.ang=a+(p.wobble?Math.sin(p.wobbleT)*p.wobble:0);p.av=0;
    p.dist+=Math.abs(p.vx*dt);p.sc+=Math.abs(p.vx*dt)*.01;

    if(pump&&p.spd>600&&Math.random()<.25)spDust(p.x,p.y);

    let nY=tY(p.x+p.vx*.1),pY=p.y+p.vy*.1;
    if(!pump&&pY<nY-1.5){p.gnd=false;p.tRot=0;p.spins=0;p.jSc=0}

    SND.updateHub(p.spd,true,dt);

    // Feature 6: Flow decay on ground without pumping
    if(!pump){flowDecay+=dt;if(flowDecay>.8){flow=Math.max(1,flow-.3*dt)}}
    else flowDecay=0;

  }else{
    p.airT+=dt;
    p.vy+=GRV*p.mass*(pump?1.8:1)*dt;
    p.x+=p.vx*dt;p.y+=p.vy*dt;p.dist+=Math.abs(p.vx*dt);

    p.av+=lean*p.agil*dt*12;
    if(spin)p.av+=(p.av>=0?1:-1)*18*dt;
    p.av*=.975;

    let oldA=p.ang;p.ang+=p.av*dt;p.tRot+=(p.ang-oldA);

    let cs=Math.floor(Math.abs(p.tRot)/(Math.PI*2));
    if(cs>p.spins){p.spins=cs;aScr(Math.floor(cs*200*flow),(cs*360)+'°!');p.cmb++;flow+=1;SND.trick()}

    // Feature 8: Afterimage during tricks
    if(p.trk)afterimages.push({x:p.x,y:p.y,ang:p.ang,a:.4,t:performance.now()});
    while(afterimages.length>6)afterimages.shift();

    // Landing check
    let gy=tY(p.x);
    if(p.y>=gy){
      let ga=tA(p.x),diff=Math.abs(normA(p.ang-ga)),abA=Math.abs(normA(p.ang));

      if(p.trk&&p.trkP>.3)return gOver("TRICK CRASH!");
      if(diff>1.8||abA>2.5)return gOver("WIPEOUT!");

      // Feature 3: Graded landing
      let landQual;
      if(diff<.09){landQual='perfect';p.spd+=200;flow+=.5;
        spTxt('SMOOTH!',p.x,p.y-95,'#0f0');
        for(let i=0;i<10;i++)particles.push({x:p.x+(Math.random()-.5)*40,y:p.y,
          vx:(Math.random()-.5)*80,vy:-Math.random()*60,life:.5,ml:.5,r:2,c:'#8f8'});
      }else if(diff<.3){landQual='good';
      }else if(diff<.6){landQual='sketchy';p.spd*=.85;p.wobble=.15;p.wobbleT=0;flow=Math.max(1,flow-.5);
        spTxt('SKETCHY!',p.x,p.y-80,'#fa0');
      }else{landQual='rough';p.spd*=.65;p.wobble=.25;p.wobbleT=0;flow=Math.max(1,flow-1);
        spTxt('ROUGH!',p.x,p.y-80,'#f66')}

      p.gnd=true;p.y=gy;p.ang=ga;

      if(p.jSc>0){let t=Math.floor(p.jSc*p.cmb*flow);p.sc+=t;
        spTxt('+'+t+' ('+p.cmb.toFixed(0)+'x)',p.x,p.y-120,'#4f4');
        if(t>500)SND.stinger()}
      p.cmb=1;p.trk=null;p.trkP=0;afterimages=[];

      let mag=Math.sqrt(p.vx*p.vx+p.vy*p.vy);
      if(landQual==='perfect'||landQual==='good'){
        let pen=Math.max(.6,1-diff/1.5);p.spd=mag*pen;if(pump)p.spd+=350;
      }

      SND.impact(p.vy);
      for(let i=0;i<12;i++)spDust(p.x,p.y);
    }
    SND.updateHub(p.spd,false,dt);
  }

  // Feature 7: Collectible pickup
  let slotL=Math.floor((p.x-40)/COLL_SP),slotR=Math.floor((p.x+40)/COLL_SP);
  for(let s=slotL;s<=slotR;s++){
    if(collSet.has(s))continue;
    let co=collAt(s);if(!co)continue;
    let dx=p.x-co.x,dy=p.y-co.y;
    if(Math.abs(dx)<30&&Math.abs(dy)<50){
      collSet.add(s);
      if(co.type==='star'){p.sc+=Math.floor(250*flow);p.collectedStars++;
        spTxt('★+'+Math.floor(250*flow),co.x,co.y-20,'#FFD700');flow+=.3}
      else{p.sc+=Math.floor(100*flow);p.collectedRings++;
        spTxt('+'+Math.floor(100*flow),co.x,co.y-20,'#0ff')}
      for(let i=0;i<8;i++)particles.push({x:co.x,y:co.y,vx:(Math.random()-.5)*80,vy:(Math.random()-.5)*80,
        life:.4,ml:.4,r:3,c:co.type==='star'?'#FFD700':'#0ff'});
      SND.trick();
    }
  }

  // Feature 2: Speed lines
  if(p.spd>500){let n=Math.floor((p.spd-500)/200);
    for(let i=0;i<n&&speedLines.length<40;i++)
      speedLines.push({x:W+Math.random()*50,y:Math.random()*H,len:15+Math.random()*30+p.spd*.02,life:.2+Math.random()*.15,ml:.35})}
  speedLines.forEach(l=>{l.x-=p.spd*.7*dt;l.life-=dt});
  speedLines=speedLines.filter(l=>l.life>0);

  // Particles
  particles.forEach(pt=>{pt.x+=pt.vx*dt;pt.y+=pt.vy*dt;pt.vy+=350*dt;pt.life-=dt});
  particles=particles.filter(pt=>pt.life>0);
  ftx.forEach(ft=>{ft.y-=42*dt;ft.life-=dt});
  ftx=ftx.filter(ft=>ft.life>0);

  // Feature 6: Flow display
  flowDisplay+=(flow-flowDisplay)*5*dt;
  flow=Math.max(1,Math.min(10,flow));

  // Feature 4: Dynamic camera
  let targetZoom=1;
  if(!p.gnd){let airH=tY(p.x)-p.y;targetZoom=1+clamp(airH*.0006,0,.25)}
  cam.zoom+=(targetZoom-cam.zoom)*3*dt;

  let leadY=p.gnd?0:p.vy*.12;
  let targetX=p.x+W*.3/cam.zoom,targetY=p.y-H*.18+leadY;
  cam.x+=(targetX-cam.x)*5*dt;cam.y+=(targetY-cam.y)*6*dt;
  cam.shakeX*=Math.pow(.001,dt);cam.shakeY*=Math.pow(.001,dt);

  // Feature 12: Reactive music
  SND.updateReactive(flow,!p.gnd);

  // Feature 9: Ghost recording
  ghostTimer+=dt;
  if(ghostTimer>.1){ghostTimer=0;ghostRec.push([Math.round(p.x),Math.round(p.y),Math.round(p.ang*100)/100])}
}

function sTrk(n,pts){if(p.trk)return;p.trk=n;p.trkPts=pts;p.trkT=0;p.cmb+=.5}
function aScr(pts,n){p.jSc+=pts;spTxt(n,p.x,p.y-50-Math.random()*30,'#fff')}
function spDust(x,y){let b=getBiome(x);particles.push({x:x+(Math.random()-.5)*25,y:y+(Math.random()-.5)*10,
  vx:(Math.random()-.5)*50-p.vx*.07,vy:-Math.random()*70-15,life:.3+Math.random()*.3,ml:.6,r:3+Math.random()*4,c:b.grass})}
function spTxt(t,x,y,c){ftx.push({t,x,y,c,life:1.8,ml:1.8})}

function gOver(reason){
  state='gameover';p.sc=Math.floor(p.sc);
  if(p.sc>best){best=p.sc;localStorage.setItem('dhr_best2',best);
    // Feature 9: Save ghost
    if(ghostRec.length>0){try{localStorage.setItem('dhr_ghost',JSON.stringify(ghostRec.slice(0,3000)))}catch(e){}
      ghostBest=ghostRec.slice()}}
  spTxt(reason,p.x,p.y-60,'#f44');p.vx*=.3;p.vy=-500;p.av=12;SND.impact(800);SND.stopMusic();
}

/*═══════════════ DRAWING ═══════════════*/
function draw(){
  let b=state==='menu'?BIOMES[0]:getBiome(cam.x);
  let tod=getTimeOfDay(p.dist||0);
  let useSkyT=state==='menu'?b.skyT:tod.t;
  let useSkyB=state==='menu'?b.skyB:tod.b;

  // Sky
  let sky=cx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,useSkyT);sky.addColorStop(1,useSkyB);
  cx.fillStyle=sky;cx.fillRect(0,0,W,H);

  // Stars at night
  if(tod.night&&state!=='menu'){
    cx.fillStyle='rgba(255,255,255,.7)';
    for(let i=0;i<60;i++){let sx=((i*173+p.dist*.005)%W+W)%W,sy=(i*91)%(H*.4);
      cx.fillRect(sx,sy,1.5,1.5)}}

  // Sun/Moon
  cx.fillStyle=tod.night?'rgba(200,210,230,.7)':'rgba(255,240,180,.8)';
  cx.beginPath();cx.arc(W*.75,H*.22,40,0,Math.PI*2);cx.fill();
  cx.fillStyle=tod.night?'rgba(200,210,230,.08)':'rgba(255,240,180,.12)';
  cx.beginPath();cx.arc(W*.75,H*.22,70,0,Math.PI*2);cx.fill();

  if(state==='menu')return drawMenu();

  // Feature 4: Camera with zoom
  cx.save();
  let sx=cam.shakeX*(Math.random()-.5)*2,sy=cam.shakeY*(Math.random()-.5)*2;
  cx.translate(W/2+sx,H/2+sy);
  cx.scale(1/cam.zoom,1/cam.zoom);
  cx.translate(-W/2,-H/2);
  cx.translate(W*.5-cam.x,H*.55-cam.y);

  drawBgLayers(b);drawTerrain(b);

  // Feature 7: Draw collectibles
  let vL=Math.floor((cam.x-W)/COLL_SP)-1,vR=Math.ceil((cam.x+W*2)/COLL_SP)+1;
  for(let s=vL;s<=vR;s++){
    if(collSet.has(s))continue;
    let co=collAt(s);if(!co)continue;
    let pulse=.85+.15*Math.sin(performance.now()*.005+s);
    cx.globalAlpha=.8;
    if(co.type==='star'){
      cx.fillStyle='#FFD700';cx.font='bold 22px sans-serif';cx.textAlign='center';
      cx.fillText('★',co.x,co.y+7);
      cx.fillStyle='rgba(255,215,0,.15)';cx.beginPath();cx.arc(co.x,co.y,18*pulse,0,Math.PI*2);cx.fill();
    }else{
      cx.strokeStyle='#0ff';cx.lineWidth=3;
      cx.beginPath();cx.arc(co.x,co.y,12*pulse,0,Math.PI*2);cx.stroke();
      cx.fillStyle='rgba(0,255,255,.08)';cx.beginPath();cx.arc(co.x,co.y,16*pulse,0,Math.PI*2);cx.fill();
    }
    cx.globalAlpha=1;
  }

  // Feature 9: Draw ghost
  if(ghostBest&&ghostBest.length>0){
    let gi=Math.floor(p.dist/100*.1*10); // Approximate index
    for(let i=Math.max(0,gi-2);i<Math.min(ghostBest.length,gi+3);i++){
      let g=ghostBest[i];if(!g)continue;
      cx.globalAlpha=.2;cx.fillStyle='#88f';
      cx.save();cx.translate(g[0],g[1]);cx.rotate(g[2]);
      cx.fillRect(-15,-8,30,16);cx.restore();
    }
    cx.globalAlpha=1;
  }

  // Particles
  for(let pt of particles){cx.globalAlpha=pt.life/pt.ml;cx.fillStyle=pt.c||'#ccc';
    cx.fillRect(pt.x-pt.r/2,pt.y-pt.r/2,pt.r,pt.r)}
  cx.globalAlpha=1;

  // Feature 8: Afterimages
  for(let i=0;i<afterimages.length;i++){
    let ai=afterimages[i],a2=.1*(i/afterimages.length);
    cx.globalAlpha=a2;cx.save();cx.translate(ai.x,ai.y);cx.rotate(ai.ang);
    cx.strokeStyle=p.colB;cx.lineWidth=3;
    cx.beginPath();cx.moveTo(-25,-p.wr);cx.lineTo(25,-p.wr);cx.stroke();
    cx.restore()
  }
  cx.globalAlpha=1;

  drawBike();

  for(let ft of ftx){cx.globalAlpha=ft.life/ft.ml;cx.font='bold 22px sans-serif';
    cx.textAlign='center';cx.fillStyle=ft.c;cx.fillText(ft.t,ft.x,ft.y)}
  cx.globalAlpha=1;
  cx.restore();

  // Feature 2: Speed lines (screen space)
  cx.strokeStyle='rgba(255,255,255,.35)';cx.lineWidth=1.5;
  for(let l of speedLines){cx.globalAlpha=l.life/l.ml;
    cx.beginPath();cx.moveTo(l.x,l.y);cx.lineTo(l.x+l.len,l.y);cx.stroke()}
  cx.globalAlpha=1;

  // Feature 4: Chromatic aberration at extreme speed
  if(p.spd>1400){let str=clamp((p.spd-1400)/600,0,.3);
    cx.fillStyle=`rgba(255,0,0,${str*.04})`;cx.fillRect(0,0,W*.02,H);
    cx.fillStyle=`rgba(0,0,255,${str*.04})`;cx.fillRect(W*.98,0,W*.02,H)}

  drawWeather(b.wx);
  if(state==='play')drawHUD(b);
  if(state==='gameover')drawGO();
}

function drawBgLayers(b){
  cx.fillStyle='rgba(0,0,0,.1)';
  let sx=cam.x-W*cam.zoom,ex=cam.x+W*2*cam.zoom;
  cx.beginPath();cx.moveTo(sx,cam.y+H*cam.zoom);
  for(let x=sx;x<=ex;x+=90){let px=x*.1,py=tY(cam.x)*.1+Math.sin(px*.0012)*380-120;
    py=Math.round(py/25)*25;cx.lineTo(x,py)}
  cx.lineTo(ex,cam.y+H*cam.zoom);cx.fill();

  let st=Math.floor((cam.x-W*cam.zoom)*.35/200)*200;
  for(let x=st;x<st+W*cam.zoom/.35+400;x+=200){
    let h=hash(x);if(h<.55)continue;
    let px=x/.35,py=tY(px);
    cx.save();cx.translate(px,py);
    if(b.bg==='trees'||b.bg==='pines'){
      cx.fillStyle='#442211';cx.fillRect(-4,-h*80-15,8,h*80+15);
      cx.fillStyle=b.bg==='pines'?'#7AA89A':'#2D7A2D';
      let th=h*50+22;cx.fillRect(-18,-h*80-th,36,th);cx.fillRect(-12,-h*80-th-10,24,10);
    }else if(b.bg==='cacti'){
      cx.fillStyle='#4A9A3A';cx.fillRect(-6,-h*55-12,12,h*55+12);
      cx.fillRect(-22,-h*42,18,9);cx.fillRect(7,-h*28,18,9);
      cx.fillRect(-22,-h*42-16,9,16);cx.fillRect(16,-h*28-16,9,16);
    }else if(b.bg==='palms'){
      cx.fillStyle='#7A6040';cx.fillRect(-3,-h*100,6,h*100);
      cx.fillStyle='#3A9A3A';for(let i=0;i<4;i++){cx.save();cx.translate(0,-h*100);cx.rotate(i*Math.PI/2-.3);
        cx.fillRect(-3,-2,45,5);cx.restore()}
    }else if(b.bg==='city'){
      cx.fillStyle=h>.8?'#333':'#555';let bw=45+h*28,bh=110+h*170;cx.fillRect(-bw/2,-bh,bw,bh);
      cx.fillStyle='#FFD';for(let wy=-bh+15;wy<-15;wy+=22){for(let wx=-bw/2+7;wx<bw/2-7;wx+=16){
        if(hash(wy*wx)>.4)cx.fillRect(wx,wy,8,10)}}}
    cx.restore()
  }
}

function drawTerrain(b){
  let sx=cam.x-W*cam.zoom,ex=cam.x+W*2*cam.zoom;
  cx.beginPath();cx.moveTo(sx,cam.y+H*cam.zoom+200);
  for(let x=sx;x<=ex;x+=6)cx.lineTo(x,tY(x));
  cx.lineTo(ex,cam.y+H*cam.zoom+200);cx.closePath();
  let tg=cx.createLinearGradient(0,cam.y-80,0,cam.y+H*cam.zoom);
  tg.addColorStop(0,b.dirt);tg.addColorStop(1,'#1a0800');
  cx.fillStyle=tg;cx.fill();
  cx.lineWidth=12;cx.strokeStyle=b.grass;cx.lineCap='butt';cx.lineJoin='bevel';
  cx.beginPath();for(let x=sx;x<=ex;x+=6){x===sx?cx.moveTo(x,tY(x)):cx.lineTo(x,tY(x))}cx.stroke();
  cx.lineWidth=4;cx.strokeStyle='rgba(0,0,0,.2)';
  cx.beginPath();for(let x=sx;x<=ex;x+=6){let yy=tY(x)+10;x===sx?cx.moveTo(x,yy):cx.lineTo(x,yy)}cx.stroke();
}

function drawBike(){
  cx.save();cx.translate(p.x,p.y);
  if(state==='gameover'){p.y+=p.vy*.016;p.vy+=GRV*.016;p.x+=p.vx*.016;p.ang+=p.av*.016}
  cx.rotate(p.ang);

  let wr=p.wr,wb=30,s=p.size,tp=p.trkP||0;
  let fR=p.trk==='Tailwhip'?tp*Math.PI*2:0;
  let bR=p.trk==='Barspin'?tp*Math.PI*2:p.trk==='Turndown'?tp*Math.PI*.8:p.trk==='X-Up'?tp*Math.PI:0;
  let sY=p.trk==='Tabletop'?1-tp*.6:p.trk==='Turndown'?1-tp*.35:1;
  cx.scale(1,sY);

  cx.strokeStyle='#333';cx.lineWidth=5;
  cx.beginPath();cx.arc(-wb,-wr,wr,0,Math.PI*2);cx.stroke();
  cx.beginPath();cx.arc(wb,-wr,wr,0,Math.PI*2);cx.stroke();
  cx.fillStyle='#888';cx.fillRect(-wb-2,-wr-2,4,4);cx.fillRect(wb-2,-wr-2,4,4);

  let bbX=-3,bbY=-wr,hX=15,hY=-wr-24,sX2=-15,sY2=-wr-18;

  cx.save();cx.translate(hX,hY);cx.rotate(fR);cx.translate(-hX,-hY);
  cx.strokeStyle=p.colB;cx.lineWidth=4;cx.lineCap='round';cx.lineJoin='round';
  cx.beginPath();cx.moveTo(hX,hY);cx.lineTo(bbX,bbY);cx.lineTo(-wb,-wr);cx.lineTo(sX2,sY2);cx.lineTo(bbX,bbY);
  cx.moveTo(sX2,sY2);cx.lineTo(hX,hY);cx.stroke();cx.restore();

  cx.save();cx.translate(hX,hY);cx.rotate(bR);
  cx.strokeStyle='#444';cx.lineWidth=4;cx.beginPath();cx.moveTo(0,0);cx.lineTo(wb-hX,-wr-hY);cx.stroke();
  cx.beginPath();cx.moveTo(0,0);cx.lineTo(0,-15);cx.stroke();
  cx.strokeStyle='#ddd';cx.lineWidth=3;cx.beginPath();cx.moveTo(-10,-15);cx.lineTo(10,-15);cx.stroke();
  let htxL=hX+(-10*Math.cos(bR)-(-15)*Math.sin(bR)),htyL=hY+(-10*Math.sin(bR)+(-15)*Math.cos(bR));
  cx.restore();

  let cr=(keys.Space||tPump||gpPump)&&state!=='gameover'?10:0;
  let hipX=sX2,hipY=sY2-5+cr,shX=hipX+11,shY=hipY-(18*s)+cr,hdX=shX+4,hdY=shY-(11*s);
  if(p.trk==='No-Hander'){shY+=10*tp;htxL=shX-15*tp;htyL=shY-20*tp}

  cx.strokeStyle=p.colC;cx.lineWidth=6*s;cx.lineCap='round';
  cx.beginPath();cx.moveTo(hipX,hipY);cx.lineTo(shX,shY);cx.stroke();
  cx.strokeStyle='#444';cx.lineWidth=5*s;
  cx.beginPath();cx.moveTo(hipX,hipY);cx.lineTo(bbX+7,bbY-8);cx.lineTo(bbX,bbY);cx.stroke();
  cx.strokeStyle=p.colC;cx.lineWidth=4.5*s;
  cx.beginPath();cx.moveTo(shX,shY);cx.lineTo(htxL,htyL);cx.stroke();
  cx.fillStyle='#FFA726';cx.fillRect(hdX-6*s,hdY-6*s,12*s,12*s);
  cx.fillStyle='#333';cx.fillRect(hdX-7*s,hdY-7*s,14*s,7*s);
  cx.restore();
}

function drawWeather(type){
  if(type==='none'||!wPts.length)return;
  let col=type==='snow'?'#EEF':type==='sand'?'#DC8':type==='rain'?'rgba(180,200,255,.4)':'#6A4';
  cx.fillStyle=col;
  wPts.forEach(pt=>{
    pt.y+=(type==='rain'?18:type==='snow'?1.5:2.5)*pt.s;
    pt.x+=(type==='snow'?Math.sin(pt.y*.01)*1.5:type==='rain'?3:Math.sin(pt.y*.015)*3);
    if(p.vx)pt.x-=p.vx*.003;
    if(pt.y>H){pt.y=-5;pt.x=Math.random()*W}
    if(pt.x<0)pt.x=W;if(pt.x>W)pt.x=0;
    cx.globalAlpha=pt.o;
    if(type==='rain'){cx.strokeStyle=col;cx.lineWidth=1.5;cx.beginPath();cx.moveTo(pt.x,pt.y);cx.lineTo(pt.x+1,pt.y+10);cx.stroke()}
    else{cx.fillRect(pt.x,pt.y,pt.s*(type==='leaves'?3:2),pt.s*(type==='leaves'?3:2))}
  });cx.globalAlpha=1;
}

function drawHUD(b){
  // Left panel
  cx.fillStyle='rgba(0,0,0,.45)';cx.fillRect(6,6,210,105);
  cx.fillStyle='#fff';cx.font='bold 22px sans-serif';cx.textAlign='left';
  cx.fillText('SCORE: '+Math.floor(p.sc),14,30);
  cx.font='14px sans-serif';cx.fillStyle='#ccc';
  cx.fillText(Math.floor(p.dist/100)+'m  |  '+Math.floor(p.spd/10)+' km/h',14,50);
  cx.fillText(b.name.toUpperCase(),14,67);

  // Feature 6: Flow multiplier bar
  let flowW=180,flowH=10,flowX=14,flowY=76;
  cx.fillStyle='#222';cx.fillRect(flowX,flowY,flowW,flowH);
  let flowPct=clamp((flowDisplay-1)/9,0,1);
  let flowCol=flowDisplay<2?'#888':flowDisplay<4?'#4af':flowDisplay<6?'#a4f':'#FFD700';
  cx.fillStyle=flowCol;cx.fillRect(flowX,flowY,flowW*flowPct,flowH);
  cx.fillStyle='#fff';cx.font='bold 10px sans-serif';
  cx.fillText('FLOW ×'+flowDisplay.toFixed(1),flowX,flowY-2);

  // Difficulty
  let diff=clamp((p.x-8000)/30000,0,3);
  cx.fillStyle='#333';cx.fillRect(flowX,flowY+flowH+4,flowW,6);
  cx.fillStyle=diff<1?'#4c4':diff<2?'#cc4':'#c44';
  cx.fillRect(flowX,flowY+flowH+4,flowW*(diff/3),6);
  cx.fillStyle='#888';cx.font='9px sans-serif';cx.fillText('DIFFICULTY',flowX,flowY+flowH+2);

  // Air combo
  if(p.cmb>1||p.jSc>0){
    cx.fillStyle='rgba(0,0,0,.45)';cx.fillRect(W/2-95,6,190,65);
    cx.fillStyle='#0ff';cx.textAlign='center';
    cx.font='bold 26px sans-serif';cx.fillText('AIR: '+p.jSc,W/2,32);
    cx.font='bold 18px sans-serif';cx.fillText('COMBO: '+p.cmb.toFixed(0)+'x',W/2,56);
  }

  // Slow-mo indicator
  if(timeScale<.95){cx.fillStyle='rgba(255,200,0,.4)';cx.font='bold 16px sans-serif';cx.textAlign='center';
    cx.fillText('SLOW MOTION',W/2,H-25)}

  // Collectibles counter
  cx.fillStyle='rgba(0,0,0,.45)';cx.fillRect(W-145,6,138,34);
  cx.fillStyle='#FFD700';cx.font='bold 14px sans-serif';cx.textAlign='right';
  cx.fillText('★'+p.collectedStars+'  ○'+p.collectedRings,W-14,28);

  cx.fillStyle='#fff';cx.font='12px sans-serif';cx.textAlign='left';
  cx.fillText('BEST: '+best,14,H-12);

  // Feature 1: Pump timing indicator arc
  if(p.gnd){
    let curv=tCurv(p.x);
    let goodPump=curv>.004&&Math.sin(tA(p.x))>.02;
    if(goodPump){
      let screenX=W/2+(p.x-cam.x)*(1/cam.zoom);
      let screenY=H/2+(p.y-cam.y-50)*(1/cam.zoom);
      cx.strokeStyle='rgba(0,255,100,.4)';cx.lineWidth=3;
      cx.beginPath();cx.arc(clamp(screenX,50,W-50),clamp(screenY,50,H-50),20,Math.PI,0);cx.stroke();
    }
  }

  // Touch zones
  if(isMobile()){
    cx.globalAlpha=.05;cx.fillStyle='#fff';
    cx.fillRect(0,0,W*.33,H);cx.fillRect(W*.67,0,W*.33,H*.5);cx.fillRect(W*.67,H*.5,W*.33,H*.5);
    cx.globalAlpha=.3;cx.fillStyle='#fff';cx.font='bold 14px sans-serif';cx.textAlign='center';
    cx.fillText('TRICKS',W*.165,H*.45);cx.font='10px sans-serif';
    cx.fillText('↑NoHand ↓Whip',W*.165,H*.45+16);cx.fillText('←Table →Turn',W*.165,H*.45+30);
    cx.font='bold 16px sans-serif';cx.fillText('SPIN',W*.835,H*.25);cx.fillText('PUMP',W*.835,H*.75);
    cx.globalAlpha=1;
  }
}

/*═══════════════ MENU (THPS3 STYLE) ═══════════════*/
function drawMenu(){
  menuAnim+=.016;cx.fillStyle='rgba(0,0,0,.82)';cx.fillRect(0,0,W,H);
  cx.strokeStyle='rgba(255,255,255,.03)';cx.lineWidth=1;
  for(let i=0;i<18;i++){let y=((i*H/18+menuAnim*12)%H+H)%H;cx.beginPath();cx.moveTo(0,y);cx.lineTo(W,y);cx.stroke()}

  let fs=Math.min(44,W*.06);
  cx.font=`bold ${fs}px sans-serif`;cx.textAlign='center';
  let tg=cx.createLinearGradient(W/2-180,0,W/2+180,0);
  tg.addColorStop(0,'#F60');tg.addColorStop(.5,'#FC0');tg.addColorStop(1,'#F60');
  cx.fillStyle=tg;cx.fillText('DOWNHILL RIDE',W/2,fs+12);
  cx.font='13px sans-serif';cx.fillStyle='#777';cx.fillText('Pump • Trick • Flow',W/2,fs+32);
  cx.fillStyle='#FFD700';cx.font='bold 15px sans-serif';cx.fillText('★ BEST: '+best,W/2,fs+54);

  let pW=Math.min(230,W*.27),pH=Math.min(200,H*.42),gap=18;
  let px1=W/2-pW-gap/2,px2=W/2+gap/2,pY=fs+65;

  drawPanel(px1,pY,pW,pH,'RIDER',CHARS,selC,true);
  drawPanel(px2,pY,pW,pH,'BIKE',BIKES,selB,false);

  cx.font='10px sans-serif';cx.fillStyle='#555';cx.textAlign='center';
  cx.fillText('Keys: ←→ Lean | Space Pump | Z Spin | WASDQE Tricks',W/2,pY+pH+88);
  cx.fillText('Mobile: Tilt=Lean | Right=Pump/Spin | Left=Swipe Tricks | Gamepad Supported',W/2,pY+pH+103);

  let tbW=Math.min(190,W*.2),tbH=32,tbX=W/2-tbW/2,tbY=pY+pH+6;
  cx.fillStyle=tiltOn?'rgba(0,160,70,.7)':'rgba(160,100,0,.7)';
  cx.fillRect(tbX,tbY,tbW,tbH);cx.strokeStyle='rgba(255,255,255,.2)';cx.lineWidth=1;cx.strokeRect(tbX,tbY,tbW,tbH);
  cx.fillStyle='#fff';cx.font='bold 13px sans-serif';cx.fillText(tiltOn?'✓ TILT ON':'📱 ENABLE TILT',W/2,tbY+tbH/2+4);

  let sbW=Math.min(250,W*.28),sbH=44,sbX=W/2-sbW/2,sbY=tbY+tbH+8;
  let pulse=.85+.15*Math.sin(menuAnim*4);
  cx.fillStyle=`rgba(255,${Math.floor(55*pulse)},0,${.65+.3*pulse})`;
  cx.fillRect(sbX,sbY,sbW,sbH);cx.strokeStyle='#FC0';cx.lineWidth=2;cx.strokeRect(sbX,sbY,sbW,sbH);
  cx.fillStyle='#fff';cx.font=`bold ${Math.min(22,sbW*.085)}px sans-serif`;cx.fillText('▶  START RIDE',W/2,sbY+sbH/2+7);

  menuRects={tilt:{x:tbX,y:tbY,w:tbW,h:tbH},start:{x:sbX,y:sbY,w:sbW,h:sbH},
    prevC:{x:px1,y:pY+pH-32,w:pW/2-4,h:28},nextC:{x:px1+pW/2+4,y:pY+pH-32,w:pW/2-4,h:28},
    prevB:{x:px2,y:pY+pH-32,w:pW/2-4,h:28},nextB:{x:px2+pW/2+4,y:pY+pH-32,w:pW/2-4,h:28}};
}

function drawPanel(x,y,w,h,title,items,sel,isChar){
  cx.fillStyle='rgba(25,25,35,.92)';cx.fillRect(x,y,w,h);
  cx.strokeStyle='rgba(255,255,255,.12)';cx.lineWidth=1;cx.strokeRect(x,y,w,h);
  cx.fillStyle='#aaa';cx.font='bold 12px sans-serif';cx.textAlign='center';cx.fillText(title,x+w/2,y+16);
  let item=items[sel];
  cx.fillStyle=item.col;cx.font='bold 16px sans-serif';cx.fillText(item.name,x+w/2,y+38);
  cx.fillStyle='#888';cx.font='11px sans-serif';cx.fillText(item.desc,x+w/2,y+55);

  let pvX=x+w/2,pvY=y+h*.46;
  cx.save();cx.translate(pvX,pvY);
  if(isChar){
    let sz=item.size||1;cx.strokeStyle=item.col;cx.lineWidth=5*sz;cx.lineCap='round';
    cx.beginPath();cx.moveTo(0,8);cx.lineTo(0,-12*sz);cx.stroke();
    cx.strokeStyle='#444';cx.lineWidth=4*sz;
    cx.beginPath();cx.moveTo(0,8);cx.lineTo(-8,20);cx.stroke();
    cx.beginPath();cx.moveTo(0,8);cx.lineTo(8,20);cx.stroke();
    cx.strokeStyle=item.col;cx.lineWidth=3.5*sz;
    cx.beginPath();cx.moveTo(0,-12*sz);cx.lineTo(-10,-3);cx.stroke();
    cx.beginPath();cx.moveTo(0,-12*sz);cx.lineTo(10,-3);cx.stroke();
    cx.fillStyle='#FFA726';cx.fillRect(-5*sz,-12*sz-12*sz,10*sz,10*sz);
    cx.fillStyle='#333';cx.fillRect(-6*sz,-12*sz-13*sz,12*sz,6*sz);
  }else{
    let wr=item.wr||12;cx.strokeStyle='#444';cx.lineWidth=4;
    cx.beginPath();cx.arc(-20,-wr,wr,0,Math.PI*2);cx.stroke();
    cx.beginPath();cx.arc(20,-wr,wr,0,Math.PI*2);cx.stroke();
    cx.strokeStyle=item.col;cx.lineWidth=3;
    cx.beginPath();cx.moveTo(10,-wr-18);cx.lineTo(-2,-wr);cx.lineTo(-20,-wr);cx.lineTo(-10,-wr-14);cx.lineTo(-2,-wr);
    cx.moveTo(-10,-wr-14);cx.lineTo(10,-wr-18);cx.stroke();
    cx.strokeStyle='#aaa';cx.lineWidth=2;
    cx.beginPath();cx.moveTo(10,-wr-18);cx.lineTo(20,-wr);cx.stroke();
    cx.beginPath();cx.moveTo(10,-wr-18);cx.lineTo(10,-wr-28);cx.stroke();
    cx.beginPath();cx.moveTo(4,-wr-28);cx.lineTo(16,-wr-28);cx.stroke();
  }
  cx.restore();

  let stats=isChar?[{n:'SPD',v:item.s1},{n:'AIR',v:item.s2},{n:'TRK',v:item.s3}]:
    [{n:'SPIN',v:item.s1},{n:'WT',v:item.s2},{n:'TOP',v:item.s3}];
  let barY=y+h*.7;
  stats.forEach((st,i)=>{let by=barY+i*16;
    cx.fillStyle='#666';cx.font='9px sans-serif';cx.textAlign='left';cx.fillText(st.n,x+8,by+9);
    cx.fillStyle='#333';cx.fillRect(x+42,by+1,w-55,8);
    cx.fillStyle=item.col;cx.fillRect(x+42,by+1,(w-55)*(st.v/5),8)});

  cx.fillStyle='rgba(255,255,255,.12)';
  cx.fillRect(x,y+h-32,w/2-4,28);cx.fillRect(x+w/2+4,y+h-32,w/2-4,28);
  cx.fillStyle='#fff';cx.font='bold 16px sans-serif';cx.textAlign='center';
  cx.fillText('◀',x+w/4,y+h-12);cx.fillText('▶',x+w*3/4,y+h-12);
}

function drawGO(){
  cx.fillStyle='rgba(0,0,0,.88)';cx.fillRect(0,0,W,H);
  cx.fillStyle='#F36';cx.font='bold 48px sans-serif';cx.textAlign='center';
  cx.fillText('WIPEOUT!',W/2,H*.25);
  cx.fillStyle='#fff';cx.font='22px sans-serif';
  cx.fillText('SCORE: '+Math.floor(p.sc),W/2,H*.25+45);
  cx.fillText(Math.floor(p.dist/100)+'m  |  ★'+p.collectedStars+'  ○'+p.collectedRings,W/2,H*.25+78);
  cx.fillStyle='#aaa';cx.font='16px sans-serif';
  cx.fillText('Peak Flow: ×'+flow.toFixed(1),W/2,H*.25+105);
  let bw=210,bh=44;
  cx.fillStyle='rgba(0,190,190,.7)';cx.fillRect(W/2-bw/2,H*.52,bw,bh);
  cx.fillStyle='#fff';cx.font='bold 20px sans-serif';cx.fillText('RESTART',W/2,H*.52+bh/2+6);
  cx.fillStyle='rgba(70,70,70,.7)';cx.fillRect(W/2-bw/2,H*.52+bh+10,bw,bh);
  cx.fillText('MAIN MENU',W/2,H*.52+bh*1.5+16);
  goRects={restart:{x:W/2-bw/2,y:H*.52,w:bw,h:bh},menu:{x:W/2-bw/2,y:H*.52+bh+10,w:bw,h:bh}};
}

/*═══════════════ INPUT ═══════════════*/
function isMobile(){return('ontouchstart'in window)||navigator.maxTouchPoints>0}
function inRect(x,y,r){return r&&x>=r.x&&x<=r.x+r.w&&y>=r.y&&y<=r.y+r.h}

addEventListener('keydown',e=>{keys[e.code]=true;
  if(state==='menu'){
    if(e.code==='ArrowLeft')selC=(selC+CHARS.length-1)%CHARS.length;
    if(e.code==='ArrowRight')selC=(selC+1)%CHARS.length;
    if(e.code==='ArrowUp')selB=(selB+BIKES.length-1)%BIKES.length;
    if(e.code==='ArrowDown')selB=(selB+1)%BIKES.length;
    if(e.code==='Enter'||e.code==='Space')startGame();
  }
  e.preventDefault()});
addEventListener('keyup',e=>{keys[e.code]=false});

function startGame(){SND.init();SND.resume();initP();state='play';SND.startMusic();clearCache()}

cv.addEventListener('click',e=>{handleUIClick(e.clientX,e.clientY)});

let activeTouches={};
cv.addEventListener('touchstart',e=>{e.preventDefault();
  for(let t of e.changedTouches){let tx=t.clientX,ty=t.clientY,id=t.identifier;
    activeTouches[id]={x:tx,y:ty,zone:null};
    if(state!=='play'){handleUIClick(tx,ty);continue}
    SND.init();SND.resume();
    if(tx>W*.65){if(ty<H*.5){tSpin=true;activeTouches[id].zone='spin'}else{tPump=true;activeTouches[id].zone='pump'}}
    else if(tx<W*.35){swpS={x:tx,y:ty,id};activeTouches[id].zone='trick'}
    else{tPump=true;activeTouches[id].zone='pump'}}
},{passive:false});

cv.addEventListener('touchmove',e=>{e.preventDefault();if(state!=='play')return;
  for(let t of e.changedTouches){if(!swpS||t.identifier!==swpS.id||p.gnd)continue;
    let dx=t.clientX-swpS.x,dy=t.clientY-swpS.y;
    if(Math.abs(dx)>28||Math.abs(dy)>28){
      if(Math.abs(dy)>Math.abs(dx)){dy<0?sTrk('No-Hander',100):sTrk('Tailwhip',150)}
      else{dx<0&&dy<-12?sTrk('Barspin',100):dx>0&&dy<-12?sTrk('X-Up',80):dx<0?sTrk('Tabletop',120):sTrk('Turndown',130)}
      swpS=null}}
},{passive:false});

cv.addEventListener('touchend',e=>{e.preventDefault();
  for(let t of e.changedTouches){let at=activeTouches[t.identifier];
    if(at){if(at.zone==='spin')tSpin=false;if(at.zone==='pump')tPump=false;delete activeTouches[t.identifier]}}
  tPump=false;tSpin=false;
  for(let t of e.touches){let at=activeTouches[t.identifier];
    if(at){if(at.zone==='spin')tSpin=true;if(at.zone==='pump')tPump=true}}
},{passive:false});

cv.addEventListener('touchcancel',e=>{e.preventDefault();tPump=false;tSpin=false;swpS=null;activeTouches={}},{passive:false});

function handleUIClick(x,y){
  if(state==='menu'){SND.init();SND.resume();
    if(inRect(x,y,menuRects.start))startGame();
    if(inRect(x,y,menuRects.tilt))requestTilt();
    if(inRect(x,y,menuRects.prevC))selC=(selC+CHARS.length-1)%CHARS.length;
    if(inRect(x,y,menuRects.nextC))selC=(selC+1)%CHARS.length;
    if(inRect(x,y,menuRects.prevB))selB=(selB+BIKES.length-1)%BIKES.length;
    if(inRect(x,y,menuRects.nextB))selB=(selB+1)%BIKES.length;
  }else if(state==='gameover'){
    if(inRect(x,y,goRects.restart))startGame();
    if(inRect(x,y,goRects.menu)){state='menu';SND.stopMusic()}
  }
}

function requestTilt(){
  if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function')
    DeviceOrientationEvent.requestPermission().then(r=>{if(r==='granted')enableTilt()}).catch(()=>{});
  else enableTilt()
}
function enableTilt(){tiltOn=true;addEventListener('deviceorientation',e=>{let g=e.gamma||0;tiltLean=clamp(g/30,-1.5,1.5)})}

function pollGamepad(){
  gpLean=0;gpPump=false;gpSpin=false;
  let gps=navigator.getGamepads?navigator.getGamepads():[];
  for(let i=0;i<gps.length;i++){let g=gps[i];if(!g)continue;
    let lx=g.axes[0]||0;if(Math.abs(lx)>.12)gpLean=lx*1.5;
    gpPump=g.buttons[0]&&g.buttons[0].pressed;
    gpSpin=g.buttons[1]&&g.buttons[1].pressed;
    if(!p.trk&&!p.gnd){
      if(g.buttons[2]&&g.buttons[2].pressed)sTrk('Tailwhip',150);
      if(g.buttons[3]&&g.buttons[3].pressed)sTrk('No-Hander',100)}
    break}
}

/*═══════════════ GAME LOOP ═══════════════*/
let lastT=performance.now();
function loop(t){
  let dt=Math.min(.08,(t-lastT)/1000);lastT=t;
  cx.setTransform(2,0,0,2,0,0); // Reset transform each frame
  update(dt);draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
