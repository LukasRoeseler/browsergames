<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gemini Speedcube - Opera Fix</title>
    <style>
        :root { --bg: #222; --panel: #333; --accent: #3498db; }
        * { touch-action: none; user-select: none; box-sizing: border-box; }
        
        body { 
            background: var(--bg); 
            color: white; 
            font-family: sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh;
            height: 100dvh; 
            overflow: hidden; 
        }

        #top-bar { padding: 8px; text-align: center; background: #111; font-weight: bold; color: #f1c40f; font-size: 0.9rem; }

        /* Würfelbereich schrumpft jetzt mit, falls unten Platz gebraucht wird */
        #main-container { 
            flex: 1; 
            display: flex; 
            position: relative; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden;
            min-height: 100px; 
        }
        
        .scene { width: 150px; height: 150px; perspective: 800px; z-index: 5; }
        .cube { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transform: rotateX(-20deg) rotateY(-30deg); transition: transform 0.05s linear; }
        .face { position: absolute; width: 150px; height: 150px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; background: #000; border: 2px solid #000; }
        
        .f { transform: translateZ(75px); } .b { transform: rotateY(180deg) translateZ(75px); }
        .u { transform: rotateX(90deg) translateZ(75px); } .d { transform: rotateX(-90deg) translateZ(75px); }
        .l { transform: rotateY(-90deg) translateZ(75px); } .r { transform: rotateY(90deg) translateZ(75px); }
        
        .sticker { border-radius: 2px; width: 100%; height: 100%; }
        .w { background: #fff; } .y { background: #fd0; } .g { background: #009b48; }
        .b-color { background: #0046ad; } .o { background: #ff5800; } .r-color { background: #b71234; }

        #shadow-wall { position: absolute; display: flex; gap: 8px; opacity: 0.4; bottom: 5px; pointer-events: none; }
        .mini-face { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: #000; padding: 1px; width: 40px; height: 40px; }

        /* RADIKALER FIX FÜR OPERA UNTEN */
        #controls { 
            display: grid; 
            grid-template-columns: repeat(6, 1fr); 
            gap: 5px; 
            padding: 10px; 
            /* 22% der Displayhöhe bleiben unten leer für die Opera-Leiste */
            padding-bottom: 22vh; 
            background: var(--panel); 
            border-top: 1px solid #444; 
        }

        button { 
            padding: 10px 0; 
            border: none; 
            border-radius: 4px; 
            background: #444; 
            color: white; 
            font-weight: bold; 
            font-size: 0.9rem; 
        }
        button:active { background: var(--accent); }
        .wide { grid-column: span 3; background: #27ae60; padding: 12px 0; margin-bottom: 2px; }
        .wide:nth-child(2) { background: #c0392b; }

        @media (orientation: landscape) {
            body { flex-direction: row; }
            #controls { 
                width: 200px; 
                height: 100%; 
                grid-template-columns: repeat(2, 1fr); 
                border-top: none; 
                border-left: 2px solid #444; 
                padding-bottom: 10px; 
            }
            #shadow-wall { right: 10px; flex-direction: column; bottom: auto; top: 50%; transform: translateY(-50%); }
            #top-bar { position: absolute; width: calc(100% - 200px); }
        }
    </style>
</head>
<body>

    <div id="top-bar">3x3 OPERA SAFE MODE</div>

    <div id="main-container">
        <div id="shadow-wall">
            <div id="shadow-b" class="mini-face"></div>
            <div id="shadow-l" class="mini-face"></div>
            <div id="shadow-d" class="mini-face"></div>
        </div>

        <div class="scene">
            <div class="cube" id="cube-visual">
                <div class="face u" id="face-u"></div>
                <div class="face d" id="face-d"></div>
                <div class="face f" id="face-f"></div>
                <div class="face b" id="face-b"></div>
                <div class="face l" id="face-l"></div>
                <div class="face r" id="face-r"></div>
            </div>
        </div>
    </div>

    <div id="controls">
        <button class="wide" onclick="scramble()">SCRAMBLE</button>
        <button class="wide" onclick="resetCube()">RESET</button>
        <button onclick="handleMove('U')">U</button>
        <button onclick="handleMove('D')">D</button>
        <button onclick="handleMove('L')">L</button>
        <button onclick="handleMove('R')">R</button>
        <button onclick="handleMove('F')">F</button>
        <button onclick="handleMove('B')">B</button>
        <button onclick="handleMove('U\'')">U'</button>
        <button onclick="handleMove('D\'')">D'</button>
        <button onclick="handleMove('L\'')">L'</button>
        <button onclick="handleMove('R\'')">R'</button>
        <button onclick="handleMove('F\'')">F'</button>
        <button onclick="handleMove('B\'')">B'</button>
    </div>

<script>
    let cubeState = {};
    let rotX = -20, rotY = -30, isDragging = false;
    let lastX, lastY;
    const sensitivity = 0.7; 

    function resetCube() {
        cubeState = {
            U: Array(9).fill('w'), D: Array(9).fill('y'),
            F: Array(9).fill('g'), B: Array(9).fill('b-color'),
            L: Array(9).fill('o'), R: Array(9).fill('r-color')
        };
        document.getElementById('top-bar').innerText = "SOLVED";
        render();
    }

    function render() {
        ['U','D','F','B','L','R'].forEach(f => {
            const html = cubeState[f].map(c => `<div class="sticker ${c}"></div>`).join('');
            document.getElementById(`face-${f.toLowerCase()}`).innerHTML = html;
            const shadow = document.getElementById(`shadow-${f.toLowerCase()}`);
            if(shadow) shadow.innerHTML = html;
        });
    }

    function rotateFaceCW(f) {
        const s = cubeState[f];
        cubeState[f] = [s[6], s[3], s[0], s[7], s[4], s[1], s[8], s[5], s[2]];
    }

    // Moves
    function moveU() {
        rotateFaceCW('U');
        const t = [...cubeState.F];
        cubeState.F[0] = cubeState.R[0]; cubeState.F[1] = cubeState.R[1]; cubeState.F[2] = cubeState.R[2];
        cubeState.R[0] = cubeState.B[0]; cubeState.R[1] = cubeState.B[1]; cubeState.R[2] = cubeState.B[2];
        cubeState.B[0] = cubeState.L[0]; cubeState.B[1] = cubeState.L[1]; cubeState.B[2] = cubeState.L[2];
        cubeState.L[0] = t[0]; cubeState.L[1] = t[1]; cubeState.L[2] = t[2];
    }
    function moveD() {
        rotateFaceCW('D');
        const t = [...cubeState.F];
        cubeState.F[6] = cubeState.L[6]; cubeState.F[7] = cubeState.L[7]; cubeState.F[8] = cubeState.L[8];
        cubeState.L[6] = cubeState.B[6]; cubeState.L[7] = cubeState.B[7]; cubeState.L[8] = cubeState.B[8];
        cubeState.B[6] = cubeState.R[6]; cubeState.B[7] = cubeState.R[7]; cubeState.B[8] = cubeState.R[8];
        cubeState.R[6] = t[6]; cubeState.R[7] = t[7]; cubeState.R[8] = t[8];
    }
    function moveF() {
        rotateFaceCW('F');
        const t = [...cubeState.U];
        cubeState.U[6] = cubeState.L[8]; cubeState.U[7] = cubeState.L[5]; cubeState.U[8] = cubeState.L[2];
        cubeState.L[8] = cubeState.D[2]; cubeState.L[5] = cubeState.D[1]; cubeState.L[2] = cubeState.D[0];
        cubeState.D[2] = cubeState.R[0]; cubeState.D[1] = cubeState.R[3]; cubeState.D[0] = cubeState.R[6];
        cubeState.R[0] = t[6]; cubeState.R[3] = t[7]; cubeState.R[6] = t[8];
    }
    function moveB() {
        rotateFaceCW('B');
        const t = [...cubeState.U];
        cubeState.U[0] = cubeState.R[2]; cubeState.U[1] = cubeState.R[5]; cubeState.U[2] = cubeState.R[8];
        cubeState.R[2] = cubeState.D[8]; cubeState.R[5] = cubeState.D[7]; cubeState.R[8] = cubeState.D[6];
        cubeState.D[8] = cubeState.L[6]; cubeState.D[7] = cubeState.L[3]; cubeState.D[6] = cubeState.L[0];
        cubeState.L[6] = t[2]; cubeState.L[3] = t[1]; cubeState.L[0] = t[0];
    }
    function moveL() {
        rotateFaceCW('L');
        const t = [...cubeState.U];
        cubeState.U[0] = cubeState.B[8]; cubeState.U[3] = cubeState.B[5]; cubeState.U[6] = cubeState.B[2];
        cubeState.B[8] = cubeState.D[0]; cubeState.B[5] = cubeState.D[3]; cubeState.B[2] = cubeState.D[6];
        cubeState.D[0] = cubeState.F[0]; cubeState.D[3] = cubeState.F[3]; cubeState.D[6] = cubeState.F[6];
        cubeState.F[0] = t[0]; cubeState.F[3] = t[3]; cubeState.F[6] = t[6];
    }
    function moveR() {
        rotateFaceCW('R');
        const t = [...cubeState.U];
        cubeState.U[2] = cubeState.F[2]; cubeState.U[5] = cubeState.F[5]; cubeState.U[8] = cubeState.F[8];
        cubeState.F[2] = cubeState.D[2]; cubeState.F[5] = cubeState.D[5]; cubeState.F[8] = cubeState.D[8];
        cubeState.D[2] = cubeState.B[6]; cubeState.D[5] = cubeState.B[3]; cubeState.D[8] = cubeState.B[0];
        cubeState.B[0] = t[8]; cubeState.B[3] = t[5]; cubeState.B[6] = t[2];
    }

    function handleMove(m) {
        let isPrime = m.includes("'");
        let base = m.replace("'", "");
        let times = isPrime ? 3 : 1;
        for(let i=0; i<times; i++) {
            if(base === 'U') moveU(); if(base === 'D') moveD();
            if(base === 'F') moveF(); if(base === 'B') moveB();
            if(base === 'L') moveL(); if(base === 'R') moveR();
        }
        render();
    }

    const container = document.getElementById('main-container');
    container.addEventListener('pointerdown', (e) => {
        if(e.target.tagName === 'BUTTON') return;
        isDragging = true;
        lastX = e.clientX;
        lastY = e.clientY;
    });

    window.addEventListener('pointerup', () => isDragging = false);
    window.addEventListener('pointermove', (e) => {
        if(!isDragging) return;
        const deltaX = e.clientX - lastX;
        const deltaY = e.clientY - lastY;
        rotY += deltaX * sensitivity;
        rotX -= deltaY * sensitivity;
        if(rotX > 85) rotX = 85;
        if(rotX < -85) rotX = -85;
        document.getElementById('cube-visual').style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
        lastX = e.clientX;
        lastY = e.clientY;
    });

    function scramble() {
        const ms = ['U','D','L','R','F','B',"U'","D'","L'","R'","F'","B'"];
        let seq = [];
        let lastMove = '';
        for(let i=0; i<15; i++) {
            let nextMove;
            do { nextMove = ms[Math.floor(Math.random()*12)]; } while (nextMove[0] === lastMove[0]);
            seq.push(nextMove);
            handleMove(nextMove);
            lastMove = nextMove;
        }
        document.getElementById('top-bar').innerText = seq.join(' ');
    }

    resetCube();
</script>
</body>
</html>
