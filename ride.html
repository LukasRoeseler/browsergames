<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pumped BMX: Procedural Worlds</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { 
        width: 100%; height: 100%; 
        background-color: #000; 
        overflow: hidden; 
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    #gameCanvas {
        display: block;
        width: 100%;
        height: 100%;
    }
    #ui-layer {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;
    }
    .btn {
        pointer-events: auto; position: absolute;
        background: rgba(0,0,0,0.5); border: 2px solid #fff; color: #fff;
        padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer;
        backdrop-filter: blur(4px);
    }
    #muteBtn { top: 20px; right: 20px; z-index: 100; }
    
    #portrait-lock {
        display: none; position: fixed; inset: 0; background: #111; color: #00e5ff;
        z-index: 9999; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px;
    }
    #portrait-lock svg { width: 80px; height: 80px; fill: currentColor; margin-bottom: 20px; animation: rotatePhone 2s infinite ease-in-out; }
    @keyframes rotatePhone { 0% { transform: rotate(0deg); } 50% { transform: rotate(-90deg); } 100% { transform: rotate(-90deg); } }
    @media screen and (orientation: portrait) { #gameCanvas, #ui-layer { display: none; } #portrait-lock { display: flex; } }
</style>
</head>
<body>

<div id="portrait-lock">
    <svg viewBox="0 0 24 24"><path d="M16 1H8C6.9 1 6 1.9 6 3v18c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V3c0-1.1-.9-2-2-2zm0 18H8V5h8v14z"/></svg>
    <h2>Rotate Device</h2><p>Landscape mode required.</p>
</div>

<canvas id="gameCanvas"></canvas>
<div id="ui-layer">
    <button id="muteBtn" class="btn">🔊 SOUND</button>
</div>

<script>
/** HIGH-RES CANVAS SETUP **/
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d', { alpha: false });
let W, H, DPR;

function resize() {
    DPR = window.devicePixelRatio || 1;
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    ctx.scale(DPR, DPR);
}
window.addEventListener('resize', resize);
resize();

/** PROCEDURAL AUDIO ENGINE **/
const audio = {
    ctx: null, master: null, muted: false,
    rollOsc: null, rollFilter: null, windNoise: null, windFilter: null,
    
    init() {
        if (this.ctx) return;
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        this.master = this.ctx.createGain();
        this.master.gain.value = 0.5;
        this.master.connect(this.ctx.destination);
        
        document.getElementById('muteBtn').addEventListener('click', () => {
            this.muted = !this.muted;
            this.master.gain.value = this.muted ? 0 : 0.5;
            document.getElementById('muteBtn').innerText = this.muted ? '🔇 MUTED' : '🔊 SOUND';
        });

        // Continuous Rolling Sound
        let bufferSize = this.ctx.sampleRate * 2;
        let noiseBuffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        let output = noiseBuffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;
        
        this.rollOsc = this.ctx.createBufferSource();
        this.rollOsc.buffer = noiseBuffer;
        this.rollOsc.loop = true;
        this.rollFilter = this.ctx.createBiquadFilter();
        this.rollFilter.type = 'lowpass';
        let rollGain = this.ctx.createGain();
        rollGain.gain.value = 0.8;
        this.rollOsc.connect(this.rollFilter).connect(rollGain).connect(this.master);
        this.rollOsc.start();

        // Wind Sound
        this.windNoise = this.ctx.createBufferSource();
        this.windNoise.buffer = noiseBuffer;
        this.windNoise.loop = true;
        this.windFilter = this.ctx.createBiquadFilter();
        this.windFilter.type = 'bandpass';
        this.windFilter.Q.value = 0.5;
        let windGain = this.ctx.createGain();
        windGain.gain.value = 1.2;
        this.windNoise.connect(this.windFilter).connect(windGain).connect(this.master);
        this.windNoise.start();
    },
    updateContinuous(speed, grounded, airborneTime) {
        if (!this.ctx) return;
        let safeSpeed = Math.max(0.1, speed);
        // Tire Rolling
        if (grounded) {
            this.rollFilter.frequency.setTargetAtTime(Math.min(2000, 100 + safeSpeed * 0.5), this.ctx.currentTime, 0.1);
        } else {
            this.rollFilter.frequency.setTargetAtTime(10, this.ctx.currentTime, 0.1);
        }
        // Wind
        let windFreq = airborneTime > 0 ? Math.min(3000, 300 + safeSpeed * 1.5) : 100;
        this.windFilter.frequency.setTargetAtTime(windFreq, this.ctx.currentTime, 0.2);
    },
    playImpact(velocity) {
        if (!this.ctx || this.muted) return;
        let osc = this.ctx.createOscillator();
        let gain = this.ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(150, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.2);
        gain.gain.setValueAtTime(Math.min(1, velocity * 0.001), this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.2);
        osc.connect(gain).connect(this.master);
        osc.start(); osc.stop(this.ctx.currentTime + 0.2);
    },
    playTrick() {
        if (!this.ctx || this.muted) return;
        let osc = this.ctx.createOscillator();
        let gain = this.ctx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(600, this.ctx.currentTime);
        osc.frequency.linearRampToValueAtTime(1200, this.ctx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);
        osc.connect(gain).connect(this.master);
        osc.start(); osc.stop(this.ctx.currentTime + 0.3);
    }
};

/** BIOMES & PROCEDURAL GENERATION **/
const hex2rgb = (hex) => {
    let v = parseInt(hex.slice(1), 16);
    return { r: (v >> 16) & 255, g: (v >> 8) & 255, b: v & 255 };
};
const lerpColor = (c1, c2, t) => {
    let r1 = hex2rgb(c1), r2 = hex2rgb(c2);
    let r = Math.round(r1.r + (r2.r - r1.r) * t);
    let g = Math.round(r1.g + (r2.g - r1.g) * t);
    let b = Math.round(r1.b + (r2.b - r1.b) * t);
    return `rgb(${r},${g},${b})`;
};

const BIOMES = [
    { name: "Forest", top: "#4CAF50", dirt: "#3E2723", skyT: "#1A237E", skyB: "#4DD0E1", weather: "leaves", bg: "trees" },
    { name: "Desert", top: "#FFC107", dirt: "#8D6E63", skyT: "#E65100", skyB: "#FFB300", weather: "sand", bg: "cacti" },
    { name: "Snowy Mountains", top: "#FFFFFF", dirt: "#607D8B", skyT: "#0D47A1", skyB: "#81D4FA", weather: "snow", bg: "pines" },
    { name: "Beach", top: "#FFE082", dirt: "#D84315", skyT: "#01579B", skyB: "#00BCD4", weather: "none", bg: "palms" },
    { name: "City Pumptrack", top: "#9E9E9E", dirt: "#424242", skyT: "#37474F", skyB: "#90A4AE", weather: "rain", bg: "city" }
];

function getBiome(x) {
    let cycle = 15000; // px per biome
    let pos = x % (cycle * BIOMES.length);
    let idx = Math.floor(pos / cycle);
    let nextIdx = (idx + 1) % BIOMES.length;
    let blend = (pos % cycle) / cycle;
    
    // Hard transition starts at 80% of the biome
    let t = Math.max(0, (blend - 0.8) * 5); 
    
    let b1 = BIOMES[idx];
    let b2 = BIOMES[nextIdx];
    
    return {
        name: t < 0.5 ? b1.name : b2.name,
        top: lerpColor(b1.top, b2.top, t),
        dirt: lerpColor(b1.dirt, b2.dirt, t),
        skyT: lerpColor(b1.skyT, b2.skyT, t),
        skyB: lerpColor(b1.skyB, b2.skyB, t),
        weather: t < 0.5 ? b1.weather : b2.weather,
        bg: t < 0.5 ? b1.bg : b2.bg
    };
}

// Deterministic random
function hash(n) { return (Math.sin(n * 12.9898) * 43758.5453) % 1; }

/** TERRAIN GENERATION **/
function tY(x) {
    let y = 400;
    // Downhill easy start
    if (x < 4000) {
        let t = Math.max(0, x / 4000);
        y += t * t * (3 - 2 * t) * 1000; 
    } else {
        y += 1000 + (x - 4000) * 0.05; // Endless slight downhill
    }
    
    // Smooth hills
    let amp = Math.min(1, x / 3000);
    let bump = Math.sin(x * 0.0015) * (200 * amp) +
               Math.sin(x * 0.004) * (90 * amp) +
               Math.sin(x * 0.01) * (40 * amp);
    
    // City pumptrack has harsher, rhythmic bumps
    let b = getBiome(x);
    if (b.bg === "city") {
        bump += Math.sin(x * 0.02) * 30;
    }
               
    return y - bump;
}
function tA(x) {
    let d = 2; return Math.atan2(tY(x + d) - tY(x - d), d * 2);
}
function normAngle(a) {
    while (a > Math.PI) a -= Math.PI * 2;
    while (a < -Math.PI) a += Math.PI * 2;
    return a;
}

/** GAME DATA & STATE **/
const GRAVITY = 1100;
const MIN_SPEED = 300;

const CHARS = [
    { name: "Pro", color: "#FF3366", mass: 1.0, size: 1.0 },
    { name: "Heavy", color: "#33CCFF", mass: 1.3, size: 1.15 },
    { name: "Grom", color: "#FFCC00", mass: 0.75, size: 0.85 }
];
const BIKES = [
    { name: "Dirt Jumper", color: "#FFF", agil: 4.5, spd: 1800, wr: 12 },
    { name: "Slopestyle", color: "#00E5FF", agil: 3.5, spd: 1950, wr: 14 },
    { name: "Downhill MTB", color: "#FF5500", agil: 2.2, spd: 2200, wr: 16 }
];

let state = 'menu'; 
let selChar = 0, selBike = 0, bestScore = localStorage.getItem('bmx_real_best') || 0;

let p = {}, cam = { x: 0, y: 0 };
let particles = [], floatTexts = [], weatherParticles = [];

let keys = {}, touchPump = false, touchSpin = false, tiltLean = 0, tiltEnabled = false, swipeStart = null;

function initPlayer() {
    let c = CHARS[selChar], b = BIKES[selBike];
    p = {
        x: 0, y: tY(0), vx: MIN_SPEED, vy: 0, spd: MIN_SPEED, ang: tA(0), av: 0,
        gnd: true, airTime: 0, mass: c.mass, size: c.size, colC: c.color,
        agil: b.agil, maxS: b.spd, wr: b.wr, colB: b.color,
        score: 0, dist: 0, combo: 1, jumpScore: 0, spins: 0, totalRot: 0,
        trick: null, trickT: 0, trickProg: 0
    };
    cam.x = p.x; cam.y = p.y - 100;
    particles = []; floatTexts = [];
    
    // Init Weather
    for(let i=0; i<100; i++) {
        weatherParticles.push({ x: Math.random()*W, y: Math.random()*H, s: Math.random()*3+1, o: Math.random() });
    }
}

/** PHYSICS & UPDATE **/
function update(dt) {
    if (state !== 'play') return;
    
    let pump = keys['Space'] || touchPump;
    let spinBtn = keys['KeyZ'] || touchSpin;
    let lean = (keys['ArrowRight'] ? 1 : 0) - (keys['ArrowLeft'] ? 1 : 0) + tiltLean;
    
    if (!p.trick && !p.gnd) {
        if (keys['KeyW']) startTrick('Tuck No-Hander', 100);
        else if (keys['KeyS']) startTrick('Tailwhip', 150);
        else if (keys['KeyA']) startTrick('Tabletop', 120);
        else if (keys['KeyD']) startTrick('Turndown', 130);
        else if (keys['KeyQ']) startTrick('Barspin', 100);
        else if (keys['KeyE']) startTrick('X-Up', 80);
    }
    
    if (p.trick) {
        p.trickT += dt * 1.5;
        p.trickProg = p.trickT <= 0.5 ? p.trickT * 2 : 1 - ((p.trickT - 0.5) * 2);
        if (p.trickT >= 1) {
            addScore(p.trickPts, p.trick);
            p.trick = null; p.trickProg = 0;
            audio.playTrick();
        }
    }

    if (p.gnd) {
        p.airTime = 0;
        let a = tA(p.x);
        let slope = Math.sin(a);
        let df = pump ? 2.5 : 0.8; 
        
        p.spd += GRAVITY * slope * df * dt;
        p.spd *= 0.999;
        if (p.spd < MIN_SPEED) p.spd += (MIN_SPEED - p.spd) * 5 * dt;
        if (p.spd > p.maxS) p.spd = p.maxS;
        
        p.vx = Math.cos(a) * p.spd;
        p.vy = Math.sin(a) * p.spd;
        p.x += p.vx * dt;
        p.y = tY(p.x);
        p.ang = a; p.av = 0;
        p.dist += p.vx * dt;
        p.score += p.vx * dt * 0.01;
        
        if (pump && p.spd > 800 && Math.random() < 0.3) spawnDust(p.x, p.y, getBiome(p.x).dirt);

        let nextY = tY(p.x + p.vx * 0.1);
        let projY = p.y + p.vy * 0.1;
        if (!pump && projY < nextY - 1) {
            p.gnd = false; p.totalRot = 0; p.spins = 0; p.jumpScore = 0;
        }
    } else {
        p.airTime += dt;
        p.vy += GRAVITY * p.mass * (pump ? 1.8 : 1.0) * dt;
        p.x += p.vx * dt; p.y += p.vy * dt;
        p.dist += p.vx * dt;
        
        p.av += lean * p.agil * dt * 12;
        if (spinBtn) p.av += (p.av >= 0 ? 1 : -1) * 18 * dt;
        p.av *= 0.98;
        
        let oldAng = p.ang;
        p.ang += p.av * dt;
        p.totalRot += (p.ang - oldAng);
        
        let currentSpins = Math.floor(Math.abs(p.totalRot) / (Math.PI * 2));
        if (currentSpins > p.spins) {
            p.spins = currentSpins;
            addScore(p.spins * 200, "360!");
            p.combo++;
            audio.playTrick();
        }

        let gy = tY(p.x);
        if (p.y >= gy) {
            let ga = tA(p.x);
            let diff = Math.abs(normAngle(p.ang - ga));
            
            if (p.trick && p.trickProg > 0.3) return gameOver("TRICK CRASH!");
            if (diff > 1.8 || Math.abs(normAngle(p.ang)) > 2.5) return gameOver("WIPEOUT!");
            
            p.gnd = true; p.y = gy; p.ang = ga;
            
            if (p.jumpScore > 0) {
                let t = Math.floor(p.jumpScore * p.combo);
                p.score += t;
                spawnText(`+${t} (${p.combo}x)`, p.x, p.y - 120, '#0f0');
            }
            p.combo = 1; p.trick = null; p.trickProg = 0;
            
            let mag = Math.sqrt(p.vx*p.vx + p.vy*p.vy);
            let penalty = Math.max(0.5, 1 - (diff / 1.8));
            p.spd = mag * penalty;
            if (pump) p.spd += 300; 
            
            audio.playImpact(p.vy);
            let b = getBiome(p.x);
            for(let i=0; i<15; i++) spawnDust(p.x, p.y, b.dirt);
        }
    }
    
    // Update Particles
    particles.forEach(pt => { pt.x += pt.vx * dt; pt.y += pt.vy * dt; pt.life -= dt; });
    particles = particles.filter(pt => pt.life > 0);
    floatTexts.forEach(ft => { ft.y -= 50 * dt; ft.life -= dt; });
    floatTexts = floatTexts.filter(ft => ft.life > 0);
    
    // Camera follow with lookahead
    let targetX = p.x + W * 0.3;
    let targetY = p.y - H * 0.2;
    cam.x += (targetX - cam.x) * 5 * dt;
    cam.y += (targetY - cam.y) * 8 * dt;

    audio.updateContinuous(p.spd, p.gnd, p.airTime);
}

function startTrick(n, pts) { p.trick = n; p.trickPts = pts; p.trickT = 0; p.combo += 0.5; }
function addScore(pts, n) { p.jumpScore += pts; spawnText(n, p.x, p.y - 60 - Math.random()*40, '#FFF'); }
function spawnDust(x, y, color) {
    particles.push({
        x: x + (Math.random()-0.5)*30, y: y + (Math.random()-0.5)*15,
        vx: (Math.random()-0.5)*60 - p.vx*0.1, vy: (Math.random()-1)*60,
        life: 0.3 + Math.random()*0.4, maxLife: 0.7, r: 2 + Math.random()*5, c: color
    });
}
function spawnText(txt, x, y, col) { floatTexts.push({ txt, x, y, col, life: 1.5, maxLife: 1.5 }); }

function gameOver(reason) {
    state = 'gameover'; p.score = Math.floor(p.score);
    if (p.score > bestScore) { bestScore = p.score; localStorage.setItem('bmx_real_best', bestScore); }
    spawnText(reason, p.x, p.y - 50, '#F00');
    p.vx *= 0.4; p.vy = -600; p.av = 15;
    audio.playImpact(1000);
}

/** HIGH-FIDELITY RENDERING **/
function draw() {
    let b = state === 'menu' ? BIOMES[0] : getBiome(cam.x);
    
    // Realistic Sky Gradient
    let skyG = ctx.createLinearGradient(0, 0, 0, H);
    skyG.addColorStop(0, b.skyT); skyG.addColorStop(1, b.skyB);
    ctx.fillStyle = skyG; ctx.fillRect(0, 0, W, H);
    
    // Sun / Moon
    ctx.fillStyle = b.bg === 'city' ? "rgba(255,255,200,0.8)" : "rgba(255, 240, 200, 0.9)";
    ctx.beginPath(); ctx.arc(W*0.7, H*0.3, 60, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 50; ctx.shadowColor = ctx.fillStyle; ctx.fill(); ctx.shadowBlur = 0;

    if (state === 'menu') return drawMenu();

    ctx.save();
    ctx.translate(W * 0.5 - cam.x, H * 0.6 - cam.y);

    // Parallax Layers (Clouds, Mountains, Midground)
    drawClouds(0.05);
    drawMountains(0.15, b);
    drawScenery(0.4, b);

    // Main Terrain
    let startX = cam.x - W; let endX = cam.x + W;
    ctx.beginPath(); ctx.moveTo(startX, cam.y + H);
    for (let x = startX; x <= endX; x += 20) ctx.lineTo(x, tY(x));
    ctx.lineTo(endX, cam.y + H); ctx.closePath();
    
    // Dirt Gradient
    let dirtG = ctx.createLinearGradient(0, cam.y - H/2, 0, cam.y + H);
    dirtG.addColorStop(0, b.dirt); dirtG.addColorStop(1, '#111');
    ctx.fillStyle = dirtG; ctx.fill();
    
    // Top Grass/Sand stroke
    ctx.lineWidth = 18; ctx.strokeStyle = b.top;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.stroke();
    // Inner shadow for depth
    ctx.lineWidth = 6; ctx.strokeStyle = "rgba(0,0,0,0.3)"; ctx.stroke();

    // Particles
    for (let pt of particles) {
        ctx.fillStyle = pt.c || "rgba(255,255,255,0.8)";
        ctx.globalAlpha = pt.life / pt.maxLife;
        ctx.beginPath(); ctx.arc(pt.x, pt.y, pt.r, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Player
    drawBikeAndRider();

    // Floating Texts
    for (let ft of floatTexts) {
        ctx.fillStyle = ft.col; ctx.globalAlpha = ft.life / ft.maxLife;
        ctx.font = "bold 28px 'Segoe UI'"; ctx.textAlign = "center";
        ctx.shadowColor = "#000"; ctx.shadowBlur = 4;
        ctx.fillText(ft.txt, ft.x, ft.y);
        ctx.shadowBlur = 0;
    }
    ctx.globalAlpha = 1;
    ctx.restore();

    drawWeather(b.weather);
    if (state === 'play') drawHUD(b);
    if (state === 'gameover') drawGameOver();
}

/** PROCEDURAL SCENERY **/
function drawClouds(speed) {
    ctx.fillStyle = "rgba(255,255,255,0.4)";
    let start = Math.floor((cam.x - W) * speed / 400) * 400;
    for (let x = start; x < start + W/speed + 800; x += 400) {
        let h = hash(x);
        if (h > 0.5) {
            let cx = x / speed; let cy = tY(cam.x)*speed + h*200 - 300;
            ctx.beginPath();
            ctx.arc(cx, cy, 40+h*20, 0, Math.PI*2);
            ctx.arc(cx+30, cy-10, 50+h*10, 0, Math.PI*2);
            ctx.arc(cx+60, cy, 30+h*30, 0, Math.PI*2);
            ctx.fill();
        }
    }
}
function drawMountains(speed, b) {
    let color = b.bg === 'snow' ? '#CFD8DC' : b.bg === 'desert' ? '#D84315' : '#37474F';
    ctx.fillStyle = color;
    ctx.beginPath();
    let startX = cam.x - W; let endX = cam.x + W;
    ctx.moveTo(startX, cam.y + H);
    for (let x = startX; x <= endX; x += 100) {
        let px = x * speed;
        let py = tY(cam.x) * speed + Math.sin(px * 0.002) * 400 + Math.sin(px * 0.007) * 100 - 200;
        ctx.lineTo(x, py);
    }
    ctx.lineTo(endX, cam.y + H); ctx.fill();
}
function drawScenery(speed, b) {
    let start = Math.floor((cam.x - W) * speed / 200) * 200;
    for (let x = start; x < start + W/speed + 400; x += 200) {
        let h = hash(x);
        if (h < 0.6) continue;
        let px = x / speed;
        let py = tY(px); // Stick to terrain height approximately
        
        ctx.save(); ctx.translate(px, py);
        if (b.bg === 'trees' || b.bg === 'pines') {
            ctx.fillStyle = '#3E2723'; ctx.fillRect(-5, -h*100-20, 10, h*100+20);
            ctx.fillStyle = b.bg === 'pines' ? '#B0BEC5' : '#2E7D32';
            ctx.beginPath(); ctx.moveTo(0, -h*150-50); ctx.lineTo(-40, -40); ctx.lineTo(40, -40); ctx.fill();
        } else if (b.bg === 'cacti') {
            ctx.fillStyle = '#2E7D32'; ctx.fillRect(-8, -h*80-20, 16, h*80+20);
            ctx.fillRect(-25, -h*60, 20, 12); ctx.fillRect(9, -h*40, 20, 12);
            ctx.fillRect(-25, -h*60-20, 12, 20); ctx.fillRect(17, -h*40-20, 12, 20);
        } else if (b.bg === 'palms') {
            ctx.fillStyle = '#795548'; ctx.beginPath(); ctx.moveTo(-5,0); ctx.quadraticCurveTo(-15, -h*100, 0, -h*150); ctx.lineTo(5, -h*150); ctx.quadraticCurveTo(-5, -h*100, 5, 0); ctx.fill();
            ctx.fillStyle = '#4CAF50';
            for(let i=0; i<5; i++) { ctx.beginPath(); ctx.ellipse(0, -h*150, 40, 10, i*Math.PI/2.5, 0, Math.PI*2); ctx.fill(); }
        } else if (b.bg === 'city') {
            ctx.fillStyle = h > 0.8 ? '#212121' : '#424242';
            let bw = 60 + h*40, bh = 150 + h*200;
            ctx.fillRect(-bw/2, -bh, bw, bh);
            ctx.fillStyle = '#FFEB3B';
            for(let wy=-bh+20; wy<-20; wy+=30) { if(hash(wy)>0.3) ctx.fillRect(-bw/2+10, wy, 15, 15); }
        }
        ctx.restore();
    }
}

/** REALISTIC BIKE & RIDER **/
function drawBikeAndRider() {
    ctx.save();
    ctx.translate(p.x, p.y);
    
    if (state === 'gameover') {
        p.y += p.vy * 0.016; p.vy += GRAVITY * 0.016; p.x += p.vx * 0.016; p.ang += p.av * 0.016;
    }
    ctx.rotate(p.ang);

    let wr = p.wr, wb = 34, s = p.size, tp = p.trickProg;
    let fRot = p.trick === 'Tailwhip' ? tp * Math.PI * 2 : 0;
    let bRot = p.trick === 'Barspin' ? tp * Math.PI * 2 : p.trick === 'Turndown' ? tp * Math.PI * 0.8 : p.trick === 'X-Up' ? tp * Math.PI : 0;
    let scY = p.trick === 'Tabletop' ? 1 - (tp * 0.7) : p.trick === 'Turndown' ? 1 - (tp * 0.4) : 1;

    ctx.scale(1, scY);
    
    // Wheels (Tires & Spokes)
    ctx.strokeStyle = '#333'; ctx.lineWidth = 6;
    ctx.beginPath(); ctx.arc(-wb, -wr, wr, 0, Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.arc(wb, -wr, wr, 0, Math.PI*2); ctx.stroke();
    ctx.strokeStyle = '#aaa'; ctx.lineWidth = 1;
    for(let i=0; i<6; i++) {
        let a = i*Math.PI/3 + p.x*0.05;
        ctx.beginPath(); ctx.moveTo(-wb, -wr); ctx.lineTo(-wb + Math.cos(a)*wr, -wr + Math.sin(a)*wr); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(wb, -wr); ctx.lineTo(wb + Math.cos(a)*wr, -wr + Math.sin(a)*wr); ctx.stroke();
    }

    let bbX = -4, bbY = -wr, hX = 18, hY = -wr - 28, sX = -18, sY = -wr - 22;

    // Frame
    ctx.save(); ctx.translate(hX, hY); ctx.rotate(fRot); ctx.translate(-hX, -hY);
    ctx.strokeStyle = p.colB; ctx.lineWidth = 5; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.beginPath(); ctx.moveTo(hX, hY); ctx.lineTo(bbX, bbY); ctx.lineTo(-wb, -wr); ctx.lineTo(sX, sY); ctx.lineTo(bbX, bbY);
    ctx.moveTo(sX, sY); ctx.lineTo(hX, hY); ctx.stroke();
    ctx.restore();

    // Fork & Bars
    ctx.save(); ctx.translate(hX, hY); ctx.rotate(bRot);
    ctx.strokeStyle = '#222'; ctx.lineWidth = 5;
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(wb - hX, -wr - hY); // fork
    ctx.moveTo(0,0); ctx.lineTo(0, -18); // stem
    ctx.strokeStyle = '#ddd'; ctx.moveTo(-12, -18); ctx.lineTo(12, -18); // bars
    ctx.stroke();
    let hlX = -12, hlY = -18, hrX = 12, hrY = -18;
    if (p.trick === 'X-Up') { hlX = 12; hrX = -12; }
    let htxL = hX + (hlX * Math.cos(bRot) - hlY * Math.sin(bRot));
    let htyL = hY + (hlX * Math.sin(bRot) + hlY * Math.cos(bRot));
    ctx.restore();

    // Rider Geometry
    let crouch = (keys['Space'] || touchPump) && state !== 'gameover' ? 12 : 0;
    let hipX = sX, hipY = sY - 8 + crouch;
    let shX = hipX + 14, shY = hipY - (24 * s) + crouch;
    let hdX = shX + 6, hdY = shY - (14 * s);
    let kneeX = bbX + 10, kneeY = bbY - 10; // Simple IK estimation

    if (p.trick === 'Tuck No-Hander') { shY += 12 * tp; htxL = shX - 18 * tp; htyL = shY - 24 * tp; }

    ctx.strokeStyle = p.colC; ctx.lineWidth = 8 * s; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    // Torso
    ctx.beginPath(); ctx.moveTo(hipX, hipY); ctx.lineTo(shX, shY); ctx.stroke();
    // Leg (Thigh -> Knee -> Pedal)
    ctx.strokeStyle = '#333';
    ctx.beginPath(); ctx.moveTo(hipX, hipY); ctx.lineTo(kneeX, kneeY); ctx.lineTo(bbX, bbY); ctx.stroke();
    // Arm
    ctx.strokeStyle = p.colC; ctx.lineWidth = 6 * s;
    ctx.beginPath(); ctx.moveTo(shX, shY); ctx.lineTo(htxL, htyL); ctx.stroke();
    
    // Helmet
    ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(hdX, hdY, 10 * s, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#FF9800'; ctx.beginPath(); ctx.arc(hdX+2, hdY, 6 * s, -0.5, 1.5); ctx.fill(); // Visor

    ctx.restore();
}

/** WEATHER EFFECTS **/
function drawWeather(type) {
    if (type === 'none') return;
    ctx.fillStyle = type === 'snow' ? '#FFF' : type === 'sand' ? '#FFD54F' : type === 'rain' ? 'rgba(200,200,255,0.5)' : '#8BC34A';
    weatherParticles.forEach(pt => {
        pt.y += (type === 'rain' ? 20 : type === 'snow' ? 2 : 3) * pt.s;
        pt.x += (type === 'rain' ? 5 : type === 'snow' ? Math.sin(pt.y*0.01)*2 : Math.sin(pt.y*0.02)*5) - p.vx*0.005;
        if (pt.y > H) { pt.y = -10; pt.x = Math.random() * W; }
        if (pt.x < 0) pt.x = W; if (pt.x > W) pt.x = 0;
        
        ctx.globalAlpha = pt.o;
        if (type === 'rain') {
            ctx.beginPath(); ctx.moveTo(pt.x, pt.y); ctx.lineTo(pt.x+2, pt.y+15); ctx.strokeStyle=ctx.fillStyle; ctx.lineWidth=2; ctx.stroke();
        } else {
            ctx.beginPath(); ctx.arc(pt.x, pt.y, pt.s * (type==='leaves'?2:1), 0, Math.PI*2); ctx.fill();
        }
    });
    ctx.globalAlpha = 1;
}

/** UI & HUD **/
function drawHUD(b) {
    ctx.fillStyle = '#fff'; ctx.shadowColor = '#000'; ctx.shadowBlur = 4;
    ctx.font = 'bold 28px "Segoe UI"'; ctx.textAlign = 'left';
    ctx.fillText(`SCORE: ${Math.floor(p.score)}`, 20, 40);
    ctx.font = '20px "Segoe UI"';
    ctx.fillText(`DIST: ${Math.floor(p.dist / 100)}m  |  BIOME: ${b.name.toUpperCase()}`, 20, 75);
    ctx.fillText(`SPEED: ${Math.floor(p.spd / 10)} km/h`, 20, 105);

    if (p.combo > 1 || p.jumpScore > 0) {
        ctx.fillStyle = '#00E5FF'; ctx.textAlign = 'center';
        ctx.font = 'bold 36px "Segoe UI"'; ctx.fillText(`AIR: ${p.jumpScore}`, W/2, 60);
        ctx.font = 'bold 24px "Segoe UI"'; ctx.fillText(`COMBO: ${p.combo}x`, W/2, 95);
    }
    ctx.shadowBlur = 0;

    if (('ontouchstart' in window) || navigator.maxTouchPoints > 0) {
        ctx.fillStyle = 'rgba(255,255,255,0.05)'; ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 2;
        ctx.fillRect(0, 0, W/3, H); ctx.strokeRect(0, 0, W/3, H);
        ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.font = '16px "Segoe UI"'; ctx.textAlign = 'center';
        ctx.fillText("SWIPE TRICKS", W/6, H/2);
        ctx.fillText("↑ No-Hand  ↓ Whip", W/6, H/2 + 25);
        ctx.fillText("← Table  → Turn", W/6, H/2 + 50);

        ctx.fillStyle = 'rgba(0, 229, 255, 0.05)'; ctx.fillRect(W*2/3, 0, W/3, H/2); ctx.strokeRect(W*2/3, 0, W/3, H/2);
        ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.font = 'bold 24px "Segoe UI"'; ctx.fillText("HOLD SPIN", W*5/6, H/4);

        ctx.fillStyle = 'rgba(255, 51, 102, 0.05)'; ctx.fillRect(W*2/3, H/2, W/3, H/2); ctx.strokeRect(W*2/3, H/2, W/3, H/2);
        ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.fillText("HOLD PUMP", W*5/6, H*3/4);
    }
}

function drawMenu() {
    ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#00E5FF'; ctx.font = 'bold 56px "Segoe UI"'; ctx.textAlign = 'center';
    ctx.shadowColor = '#00E5FF'; ctx.shadowBlur = 20;
    ctx.fillText("PROCEDURAL BMX", W/2, 90); ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff'; ctx.font = '22px "Segoe UI"'; ctx.fillText(`HIGH SCORE: ${bestScore}`, W/2, 135);

    ctx.font = 'bold 20px "Segoe UI"'; ctx.fillText("SELECT RIDER", W/4, 200);
    CHARS.forEach((c, i) => {
        ctx.fillStyle = i === selChar ? c.color : '#333'; ctx.fillRect(W/4 - 120, 230 + i*55, 240, 45);
        ctx.fillStyle = '#fff'; ctx.fillText(c.name, W/4, 260 + i*55);
    });

    ctx.fillText("SELECT BIKE", W*3/4, 200);
    BIKES.forEach((b, i) => {
        ctx.fillStyle = i === selBike ? b.color : '#333'; ctx.fillRect(W*3/4 - 120, 230 + i*55, 240, 45);
        ctx.fillStyle = i === selBike ? '#000' : '#fff'; ctx.fillText(b.name, W*3/4, 260 + i*55);
    });

    ctx.fillStyle = tiltEnabled ? '#4CAF50' : '#FF9800'; ctx.fillRect(W/2 - 140, H - 170, 280, 50);
    ctx.fillStyle = '#fff'; ctx.fillText(tiltEnabled ? "TILT ENABLED" : "ENABLE TILT (MOBILE)", W/2, H - 137);

    ctx.fillStyle = '#FF3366'; ctx.fillRect(W/2 - 120, H - 100, 240, 60);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 28px "Segoe UI"'; ctx.fillText("START RIDE", W/2, H - 60);
}

function drawGameOver() {
    ctx.fillStyle = 'rgba(0,0,0,0.85)'; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#FF3366'; ctx.font = 'bold 64px "Segoe UI"'; ctx.textAlign = 'center';
    ctx.fillText("WIPEOUT!", W/2, H/3);
    ctx.fillStyle = '#fff'; ctx.font = '28px "Segoe UI"';
    ctx.fillText(`FINAL SCORE: ${Math.floor(p.score)}`, W/2, H/3 + 60);
    ctx.fillText(`DISTANCE: ${Math.floor(p.dist/100)}m`, W/2, H/3 + 100);

    ctx.fillStyle = '#00E5FF'; ctx.fillRect(W/2 - 120, H/2 + 60, 240, 55);
    ctx.fillStyle = '#000'; ctx.font = 'bold 24px "Segoe UI"'; ctx.fillText("RESTART", W/2, H/2 + 96);
    ctx.fillStyle = '#333'; ctx.fillRect(W/2 - 120, H/2 + 135, 240, 55);
    ctx.fillStyle = '#fff'; ctx.fillText("MAIN MENU", W/2, H/2 + 171);
}

/** INPUT & CONTROLS **/
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

canvas.addEventListener('mousedown', handleUI);
canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (state !== 'play') handleUI(e.touches[0]);
    else {
        audio.init(); // Ensure audio unlocks on mobile
        Array.from(e.touches).forEach(t => {
            if (t.clientX > W * 2/3) { if (t.clientY < H / 2) touchSpin = true; else touchPump = true; } 
            else if (t.clientX < W / 3) swipeStart = { x: t.clientX, y: t.clientY, id: t.identifier };
        });
    }
}, {passive: false});

function handleUI(e) {
    let x = e.clientX || e.pageX, y = e.clientY || e.pageY;
    audio.init(); // Unlock audio context
    if (state === 'menu') {
        CHARS.forEach((c, i) => { if (x > W/4-120 && x < W/4+120 && y > 230+i*55 && y < 275+i*55) selChar = i; });
        BIKES.forEach((b, i) => { if (x > W*3/4-120 && x < W*3/4+120 && y > 230+i*55 && y < 275+i*55) selBike = i; });
        if (x > W/2-140 && x < W/2+140 && y > H-170 && y < H-120) {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(r => { if (r == 'granted') enableTilt(); }).catch(console.error);
            } else enableTilt();
        }
        if (x > W/2-120 && x < W/2+120 && y > H-100 && y < H-40) { initPlayer(); state = 'play'; }
    } else if (state === 'gameover') {
        if (x > W/2-120 && x < W/2+120 && y > H/2+60 && y < H/2+115) { initPlayer(); state = 'play'; }
        if (x > W/2-120 && x < W/2+120 && y > H/2+135 && y < H/2+190) state = 'menu';
    }
}

function enableTilt() {
    tiltEnabled = true;
    window.addEventListener('deviceorientation', (e) => {
        let t = e.beta; if (t > 30) t = 30; if (t < -30) t = -30; tiltLean = t / 30;
    });
}

canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (state !== 'play' || !swipeStart || p.gnd) return;
    Array.from(e.touches).forEach(t => {
        if (t.identifier === swipeStart.id) {
            let dx = t.clientX - swipeStart.x, dy = t.clientY - swipeStart.y;
            if (Math.abs(dx) > 30 || Math.abs(dy) > 30) {
                if (Math.abs(dy) > Math.abs(dx)) { dy < 0 ? startTrick('Tuck No-Hander', 100) : startTrick('Tailwhip', 150); } 
                else { dx < 0 && dy < -15 ? startTrick('Barspin', 100) : dx > 0 && dy < -15 ? startTrick('X-Up', 80) : dx < 0 ? startTrick('Tabletop', 120) : startTrick('Turndown', 130); }
                swipeStart = null;
            }
        }
    });
}, {passive: false});

canvas.addEventListener('touchend', (e) => {
    e.preventDefault(); touchPump = false; touchSpin = false;
    Array.from(e.touches).forEach(t => { if (t.clientX > W * 2/3) { t.clientY < H / 2 ? touchSpin = true : touchPump = true; } });
}, {passive: false});

/** GAME LOOP **/
let lastTime = performance.now();
function loop(time) {
    let dt = Math.min(0.1, (time - lastTime) / 1000);
    lastTime = time;
    update(dt); draw();
    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
